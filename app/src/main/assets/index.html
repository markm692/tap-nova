<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tap Nova</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0518;font-family:'Segoe UI',system-ui,sans-serif;color:#fff}
#game{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;padding:12px 16px env(safe-area-inset-bottom)}

/* Top bar */
.top-bar{text-align:center;padding:6px 0}
.currency-name{font-size:11px;letter-spacing:3px;color:#a89cdb;text-transform:uppercase}
.currency-value{font-size:40px;font-weight:700;color:#fff5d4;text-shadow:0 0 20px rgba(255,200,60,.3)}
.rate{font-size:13px;color:#6dba6d;margin-top:2px}
.nova-info{font-size:12px;color:#ff8866;margin-top:2px}

/* Combo bar */
.combo-bar-wrap{height:22px;display:flex;align-items:center;gap:8px;margin:4px 0}
.combo-label{font-size:13px;font-weight:700;color:#fbbf24;white-space:nowrap;min-width:50px}
.combo-track{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.combo-fill{height:100%;width:0%;background:linear-gradient(90deg,#f59e0b,#ef4444);border-radius:3px;transition:width .15s}
.combo-bar-wrap.hidden{opacity:0}

/* Orb area */
.orb-area{flex:2;display:flex;align-items:center;justify-content:center;position:relative;min-height:0}
#orb{width:170px;height:170px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#c084fc,#7c3aed 50%,#4c1d95);box-shadow:0 0 40px rgba(139,92,246,.4),0 0 80px rgba(139,92,246,.2),inset 0 -8px 20px rgba(0,0,0,.3);cursor:pointer;transition:transform .08s ease;position:relative;z-index:2}
#orb:active{transform:scale(.88)}
#orb .label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.glow{position:absolute;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.2),transparent 70%);animation:pulse 2s ease-in-out infinite;z-index:1}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.12);opacity:1}}

/* Floating text */
.floater{position:absolute;font-size:24px;font-weight:700;color:#fde68a;text-shadow:0 0 8px rgba(253,230,138,.5);pointer-events:none;z-index:10;animation:floatUp .8s ease-out forwards}
.floater.crit{font-size:36px;color:#ff4444;text-shadow:0 0 16px rgba(255,60,60,.8),0 0 30px rgba(255,60,60,.4);animation:floatUpCrit .9s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-100px) scale(.8)}}
@keyframes floatUpCrit{0%{opacity:1;transform:translateY(0) scale(1.5)}20%{transform:translateY(-15px) scale(1.2)}100%{opacity:0;transform:translateY(-120px) scale(.7)}}

/* Screen flash */
.screen-flash{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0}
@keyframes flash{0%{opacity:.4}100%{opacity:0}}

/* Screen shake */
.shake{animation:shake .15s ease}
@keyframes shake{0%,100%{transform:translate(0)}25%{transform:translate(-4px,2px)}50%{transform:translate(3px,-3px)}75%{transform:translate(-2px,3px)}}

/* Golden Meteor */
.meteor{position:absolute;width:50px;height:50px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fef08a,#f59e0b 50%,#b45309);box-shadow:0 0 20px rgba(245,158,11,.6),0 0 40px rgba(245,158,11,.3);cursor:pointer;z-index:20;animation:meteorFloat 3s ease-in-out infinite;pointer-events:auto}
.meteor::after{content:'';position:absolute;top:-4px;left:-4px;right:-4px;bottom:-4px;border-radius:50%;border:2px solid rgba(254,240,138,.5);animation:meteorRing 1s ease-in-out infinite}
@keyframes meteorFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-10px) rotate(180deg)}}
@keyframes meteorRing{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.3);opacity:1}}
.meteor-label{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;color:#fef08a;white-space:nowrap;text-shadow:0 0 6px rgba(245,158,11,.8)}
.meteor-timer{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:#fbbf24;white-space:nowrap}

/* Panels */
.sep{height:1px;background:linear-gradient(90deg,transparent,rgba(139,92,246,.3),transparent);margin:6px 0}

/* Tabs */
.tab-bar{display:flex;gap:4px;margin-bottom:6px}
.tab{flex:1;padding:6px 0;text-align:center;font-size:12px;font-weight:600;letter-spacing:1px;color:#7c6cb5;background:rgba(20,12,40,.6);border:1px solid rgba(100,80,180,.2);border-radius:8px;cursor:pointer;transition:all .15s}
.tab.active{color:#fff;background:rgba(60,40,120,.6);border-color:rgba(139,92,246,.5)}
.tab-panel{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.tab-panel.active{display:flex;flex-direction:column}
.tab-panel::-webkit-scrollbar{display:none}

/* Shop items */
.shop{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:12px}
.shop::-webkit-scrollbar{display:none}
.section-title{font-size:11px;letter-spacing:2px;color:#7c6cb5;text-align:center;margin:6px 0 4px}

.btn{width:100%;padding:10px 14px;margin-bottom:5px;background:rgba(30,20,60,.8);border:1px solid rgba(100,80,180,.35);border-radius:12px;color:#fff;font-size:13px;text-align:left;cursor:pointer;transition:background .15s,border-color .15s;display:flex;justify-content:space-between;align-items:center}
.btn:active{background:rgba(50,30,90,.9);border-color:rgba(120,100,200,.6)}
.btn.disabled{opacity:.35;pointer-events:none}
.btn .info{display:flex;flex-direction:column;gap:1px}
.btn .name{font-weight:600;font-size:14px}
.btn .detail{font-size:11px;color:#a89cdb}
.btn .cost{font-size:13px;color:#fde68a;font-weight:600;white-space:nowrap}

.btn.prestige{background:rgba(130,20,30,.7);border-color:rgba(255,100,80,.5);text-align:center;justify-content:center;margin-top:6px}
.btn.prestige .name{color:#ffd4cc;font-size:15px}
.btn.prestige .detail{color:#ff9988;font-size:12px}

/* Achievements */
.achiev{padding:10px 14px;margin-bottom:5px;background:rgba(30,20,60,.6);border:1px solid rgba(100,80,180,.2);border-radius:10px;display:flex;gap:12px;align-items:center}
.achiev.done{border-color:rgba(245,158,11,.4);background:rgba(60,40,20,.4)}
.achiev-icon{font-size:24px;width:36px;text-align:center;flex-shrink:0}
.achiev-info{flex:1;min-width:0}
.achiev-name{font-size:13px;font-weight:600}
.achiev-desc{font-size:11px;color:#a89cdb;margin-top:1px}
.achiev-reward{font-size:10px;color:#fbbf24;margin-top:2px}
.achiev-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:4px;overflow:hidden}
.achiev-bar-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#c084fc);border-radius:2px;transition:width .3s}
.achiev.done .achiev-bar-fill{background:linear-gradient(90deg,#f59e0b,#fbbf24)}

/* Toast */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(30,20,60,.95);border:1px solid rgba(245,158,11,.5);border-radius:12px;padding:10px 20px;text-align:center;z-index:100;opacity:0;pointer-events:none;transition:all .3s ease}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-title{font-size:14px;font-weight:700;color:#fbbf24}
.toast-desc{font-size:11px;color:#a89cdb;margin-top:2px}

/* Offline banner */
.offline-banner{position:fixed;top:0;left:0;right:0;background:rgba(20,10,40,.97);border-bottom:1px solid rgba(139,92,246,.4);padding:20px;text-align:center;z-index:100;animation:slideDown .4s ease}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
.offline-banner h3{color:#c084fc;margin-bottom:6px}
.offline-banner p{color:#fde68a;font-size:18px}
.offline-banner button{margin-top:12px;padding:8px 32px;background:#7c3aed;border:none;border-radius:8px;color:#fff;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<div id="game">
  <div class="top-bar">
    <div class="currency-name">Stardust</div>
    <div class="currency-value" id="dustVal">0</div>
    <div class="rate" id="rateVal">0/s</div>
    <div class="nova-info" id="novaInfo"></div>
  </div>

  <div class="combo-bar-wrap hidden" id="comboWrap">
    <div class="combo-label" id="comboLabel">x1</div>
    <div class="combo-track"><div class="combo-fill" id="comboFill"></div></div>
  </div>

  <div class="orb-area" id="orbArea">
    <div class="glow" id="glow"></div>
    <div id="orb"><div class="label">TAP</div></div>
  </div>

  <div class="sep"></div>

  <div class="tab-bar">
    <div class="tab active" data-tab="shop">SHOP</div>
    <div class="tab" data-tab="achievements">ACHIEVEMENTS</div>
  </div>

  <div class="tab-panel active" data-panel="shop">
    <div class="shop" id="shop"></div>
  </div>

  <div class="tab-panel" data-panel="achievements">
    <div class="shop" id="achievList"></div>
  </div>
</div>

<div class="screen-flash" id="screenFlash"></div>
<div class="toast" id="toast"><div class="toast-title" id="toastTitle"></div><div class="toast-desc" id="toastDesc"></div></div>

<script>
// =========================================================
// STATE
// =========================================================
const S = {
  dust: 0, lifetimeDust: 0, allTimeDust: 0, novaCrystals: 0,
  tapLevel: 0, prestigeCount: 0, totalTaps: 0,
  gens: [
    {name:"Asteroid Miner",   count:0, baseCost:10,       baseRate:0.5},
    {name:"Space Station",    count:0, baseCost:100,      baseRate:4},
    {name:"Lunar Colony",     count:0, baseCost:1200,     baseRate:30},
    {name:"Dyson Ring",       count:0, baseCost:15000,    baseRate:200},
    {name:"Warp Conduit",     count:0, baseCost:200000,   baseRate:1500},
    {name:"Galaxy Harvester", count:0, baseCost:3300000,  baseRate:12000},
  ],
  // Combo
  comboCount: 0, comboTimer: 0, comboMultiplier: 1,
  // Achievements
  achieved: {},
  // Meteor
  meteorActive: false,
  // Stats
  critCount: 0, meteorsCollected: 0,
};

// =========================================================
// NUMBER FORMATTING
// =========================================================
const SUFFIXES = ["","K","M","B","T","Qa","Qi","Sx","Sp","Oc","No","Dc"];
function fmt(n) {
  if (n < 1000) return Math.floor(n).toString();
  const tier = Math.min(Math.floor(Math.log10(Math.abs(n)) / 3), SUFFIXES.length - 1);
  const sc = n / Math.pow(1000, tier);
  return (sc >= 100 ? Math.floor(sc) : sc >= 10 ? sc.toFixed(1) : sc.toFixed(2)) + SUFFIXES[tier];
}

// =========================================================
// CORE CALCULATIONS
// =========================================================
function achievBonus() {
  let bonus = 0;
  for (const a of ACHIEVEMENTS) {
    if (S.achieved[a.id]) bonus += a.bonus;
  }
  return 1 + bonus;
}
function prestigeMult() { return 1 + S.novaCrystals * 0.1; }
function globalMult() { return prestigeMult() * achievBonus(); }
function tapPower() { return (1 + S.tapLevel * 0.5) * globalMult(); }
function genCost(i) { return S.gens[i].baseCost * Math.pow(1.15, S.gens[i].count); }
function genRate(i) { return S.gens[i].baseRate * S.gens[i].count * globalMult(); }
function totalRate() { let r = 0; for (let i = 0; i < S.gens.length; i++) r += genRate(i); return r; }
function tapUpgradeCost() { return 10 * Math.pow(1.8, S.tapLevel); }
function prestigeGain() { return S.lifetimeDust < 1e6 ? 0 : Math.floor(Math.sqrt(S.lifetimeDust / 1e6)); }

// =========================================================
// COMBO SYSTEM
// =========================================================
const COMBO_DECAY = 1.2; // seconds to decay
const COMBO_TIERS = [
  {taps: 0,  mult: 1,  label: "x1"},
  {taps: 5,  mult: 1.5, label: "x1.5"},
  {taps: 15, mult: 2,  label: "x2"},
  {taps: 30, mult: 3,  label: "x3"},
  {taps: 50, mult: 5,  label: "x5"},
  {taps: 80, mult: 8,  label: "x8"},
  {taps: 120,mult: 12, label: "x12!"},
];

function getComboTier() {
  let tier = COMBO_TIERS[0];
  for (const t of COMBO_TIERS) {
    if (S.comboCount >= t.taps) tier = t;
  }
  return tier;
}

function getNextComboTier() {
  for (const t of COMBO_TIERS) {
    if (S.comboCount < t.taps) return t;
  }
  return null;
}

function addCombo() {
  S.comboCount++;
  S.comboTimer = COMBO_DECAY;
  const tier = getComboTier();
  S.comboMultiplier = tier.mult;
}

function updateCombo(dt) {
  if (S.comboTimer > 0) {
    S.comboTimer -= dt;
    if (S.comboTimer <= 0) {
      S.comboCount = 0;
      S.comboTimer = 0;
      S.comboMultiplier = 1;
    }
  }
  // Update UI
  const wrap = document.getElementById("comboWrap");
  const label = document.getElementById("comboLabel");
  const fill = document.getElementById("comboFill");

  if (S.comboCount > 0) {
    wrap.classList.remove("hidden");
    const tier = getComboTier();
    const next = getNextComboTier();
    label.textContent = tier.label;
    label.style.color = tier.mult >= 5 ? "#ef4444" : tier.mult >= 2 ? "#f59e0b" : "#fbbf24";
    if (next) {
      const progress = (S.comboCount - (tier.taps || 0)) / (next.taps - (tier.taps || 0));
      fill.style.width = (progress * 100) + "%";
    } else {
      fill.style.width = "100%";
    }
    // Decay visualization
    fill.style.opacity = Math.max(0.3, S.comboTimer / COMBO_DECAY);
  } else {
    wrap.classList.add("hidden");
  }
}

// =========================================================
// CRITICAL TAPS
// =========================================================
const CRIT_CHANCE = 0.05;
const CRIT_MULTIPLIER = 10;

function rollCrit() {
  return Math.random() < CRIT_CHANCE;
}

function screenShake() {
  const game = document.getElementById("game");
  game.classList.remove("shake");
  void game.offsetWidth; // reflow
  game.classList.add("shake");
}

function screenFlash(color) {
  const el = document.getElementById("screenFlash");
  el.style.background = color;
  el.style.animation = "none";
  void el.offsetWidth;
  el.style.animation = "flash .3s ease-out forwards";
}

// =========================================================
// GOLDEN METEOR
// =========================================================
let meteorEl = null;
let meteorTimeout = null;
let meteorExpireTimeout = null;

function scheduleMeteor() {
  const delay = (30 + Math.random() * 60) * 1000; // 30-90 seconds
  meteorTimeout = setTimeout(spawnMeteor, delay);
}

function spawnMeteor() {
  if (S.meteorActive) return;
  S.meteorActive = true;

  const area = document.getElementById("orbArea");
  const rect = area.getBoundingClientRect();

  meteorEl = document.createElement("div");
  meteorEl.className = "meteor";

  // Random position within orb area
  const x = 20 + Math.random() * (rect.width - 90);
  const y = 10 + Math.random() * (rect.height - 90);
  meteorEl.style.left = x + "px";
  meteorEl.style.top = y + "px";

  // Reward type
  const rewardMult = 30 + Math.floor(Math.random() * 70); // 30-100x current tap
  const labelEl = document.createElement("div");
  labelEl.className = "meteor-label";
  labelEl.textContent = "TAP ME!";
  meteorEl.appendChild(labelEl);

  const timerEl = document.createElement("div");
  timerEl.className = "meteor-timer";
  timerEl.textContent = "5s";
  meteorEl.appendChild(timerEl);

  meteorEl.addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    collectMeteor(rewardMult);
  });

  area.appendChild(meteorEl);

  // Countdown
  let timeLeft = 5;
  const countdownInterval = setInterval(() => {
    timeLeft--;
    if (timerEl) timerEl.textContent = timeLeft + "s";
    if (timeLeft <= 0) clearInterval(countdownInterval);
  }, 1000);

  // Expire after 5 seconds
  meteorExpireTimeout = setTimeout(() => {
    removeMeteor();
    scheduleMeteor();
  }, 5000);
}

function collectMeteor(mult) {
  if (!S.meteorActive) return;
  const reward = tapPower() * mult;
  S.dust += reward;
  S.lifetimeDust += reward;
  S.allTimeDust += reward;
  S.meteorsCollected++;

  // Big flash
  screenFlash("rgba(245, 158, 11, 0.5)");
  screenShake();
  if (navigator.vibrate) navigator.vibrate([50, 30, 50]);

  // Floating text
  const f = document.createElement("div");
  f.className = "floater crit";
  f.textContent = "+" + fmt(reward);
  f.style.color = "#fbbf24";
  f.style.left = "50%";
  f.style.top = "40%";
  f.style.transform = "translateX(-50%)";
  document.getElementById("orbArea").appendChild(f);
  setTimeout(() => f.remove(), 900);

  showToast("METEOR CAUGHT!", "+" + fmt(reward) + " Stardust");

  clearTimeout(meteorExpireTimeout);
  removeMeteor();
  scheduleMeteor();
  checkAchievements();
}

function removeMeteor() {
  if (meteorEl) {
    meteorEl.remove();
    meteorEl = null;
  }
  S.meteorActive = false;
}

// =========================================================
// ACHIEVEMENTS
// =========================================================
const ACHIEVEMENTS = [
  {id:"tap100",     name:"First Steps",      desc:"Tap 100 times",              check:()=>S.totalTaps>=100,       bonus:0.05, icon:"\u2B50"},
  {id:"tap1000",    name:"Tap Addict",        desc:"Tap 1,000 times",            check:()=>S.totalTaps>=1000,      bonus:0.10, icon:"\uD83D\uDD25"},
  {id:"tap10000",   name:"Finger Fury",       desc:"Tap 10,000 times",           check:()=>S.totalTaps>=10000,     bonus:0.15, icon:"\uD83D\uDCAA"},
  {id:"dust1k",     name:"Dust Collector",     desc:"Earn 1K total Stardust",     check:()=>S.allTimeDust>=1e3,     bonus:0.05, icon:"\u2728"},
  {id:"dust1m",     name:"Stardust Magnate",   desc:"Earn 1M total Stardust",     check:()=>S.allTimeDust>=1e6,     bonus:0.10, icon:"\uD83D\uDCAB"},
  {id:"dust1b",     name:"Cosmic Tycoon",      desc:"Earn 1B total Stardust",     check:()=>S.allTimeDust>=1e9,     bonus:0.15, icon:"\uD83C\uDF0C"},
  {id:"gen1",       name:"Automation",         desc:"Buy first generator",        check:()=>S.gens[0].count>=1,     bonus:0.05, icon:"\u2699\uFE0F"},
  {id:"gen50",      name:"Factory Floor",      desc:"Own 50 total generators",    check:()=>totalGens()>=50,        bonus:0.10, icon:"\uD83C\uDFED"},
  {id:"crit10",     name:"Lucky Strikes",      desc:"Land 10 critical taps",      check:()=>S.critCount>=10,        bonus:0.05, icon:"\uD83C\uDFAF"},
  {id:"crit100",    name:"Crit Machine",       desc:"Land 100 critical taps",     check:()=>S.critCount>=100,       bonus:0.10, icon:"\u26A1"},
  {id:"meteor5",    name:"Meteor Hunter",      desc:"Catch 5 golden meteors",     check:()=>S.meteorsCollected>=5,  bonus:0.10, icon:"\u2604\uFE0F"},
  {id:"meteor25",   name:"Cosmic Catcher",     desc:"Catch 25 golden meteors",    check:()=>S.meteorsCollected>=25, bonus:0.15, icon:"\uD83E\uDE90"},
  {id:"prestige1",  name:"Supernova",          desc:"Prestige for the first time",check:()=>S.prestigeCount>=1,     bonus:0.10, icon:"\uD83D\uDCA5"},
  {id:"prestige5",  name:"Serial Exploder",    desc:"Prestige 5 times",           check:()=>S.prestigeCount>=5,     bonus:0.15, icon:"\uD83C\uDF1F"},
  {id:"combo5",     name:"Combo Starter",      desc:"Reach x5 combo",             check:()=>S.comboMultiplier>=5,   bonus:0.05, icon:"\uD83D\uDD17"},
  {id:"combo12",    name:"MAXIMUM COMBO",      desc:"Reach x12 combo",            check:()=>S.comboMultiplier>=12,  bonus:0.15, icon:"\uD83C\uDF2A\uFE0F"},
];

function totalGens() { return S.gens.reduce((s, g) => s + g.count, 0); }

function checkAchievements() {
  for (const a of ACHIEVEMENTS) {
    if (!S.achieved[a.id] && a.check()) {
      S.achieved[a.id] = true;
      showToast("Achievement: " + a.name, a.desc + " | +" + (a.bonus * 100) + "% all");
      screenFlash("rgba(245, 158, 11, 0.3)");
      if (navigator.vibrate) navigator.vibrate([30, 20, 30, 20, 30]);
    }
  }
}

function buildAchievements() {
  const el = document.getElementById("achievList");
  let html = "";
  const totalBonus = ((achievBonus() - 1) * 100).toFixed(0);
  html += `<div class="section-title">TOTAL BONUS: +${totalBonus}%</div>`;

  for (const a of ACHIEVEMENTS) {
    const done = S.achieved[a.id];
    let progress = 0;
    // Approximate progress for display
    if (!done) {
      if (a.id.startsWith("tap"))    progress = Math.min(1, S.totalTaps / parseInt(a.desc.match(/[\d,]+/)[0].replace(/,/g,"")));
      else if (a.id.startsWith("dust")) {
        const target = a.desc.includes("1K") ? 1e3 : a.desc.includes("1M") ? 1e6 : 1e9;
        progress = Math.min(1, S.allTimeDust / target);
      }
      else if (a.id.startsWith("crit"))   progress = Math.min(1, S.critCount / parseInt(a.desc.match(/\d+/)[0]));
      else if (a.id.startsWith("meteor")) progress = Math.min(1, S.meteorsCollected / parseInt(a.desc.match(/\d+/)[0]));
      else if (a.id.startsWith("prestige")) progress = Math.min(1, S.prestigeCount / parseInt(a.desc.match(/\d+/)?.[0] || "1"));
      else if (a.id === "gen1")  progress = Math.min(1, S.gens[0].count);
      else if (a.id === "gen50") progress = Math.min(1, totalGens() / 50);
      else if (a.id === "combo5") progress = Math.min(1, S.comboMultiplier / 5);
      else if (a.id === "combo12") progress = Math.min(1, S.comboMultiplier / 12);
    }

    html += `<div class="achiev${done ? " done" : ""}">
      <div class="achiev-icon">${a.icon}</div>
      <div class="achiev-info">
        <div class="achiev-name">${a.name}</div>
        <div class="achiev-desc">${a.desc}</div>
        <div class="achiev-reward">${done ? "UNLOCKED" : "Reward"}: +${(a.bonus * 100).toFixed(0)}% all production</div>
        <div class="achiev-bar"><div class="achiev-bar-fill" style="width:${done ? 100 : (progress * 100)}%"></div></div>
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

// =========================================================
// TOAST NOTIFICATIONS
// =========================================================
let toastTimer = null;
function showToast(title, desc) {
  const toast = document.getElementById("toast");
  document.getElementById("toastTitle").textContent = title;
  document.getElementById("toastDesc").textContent = desc;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 2500);
}

// =========================================================
// TABS
// =========================================================
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("pointerdown", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.querySelector(`[data-panel="${tab.dataset.tab}"]`).classList.add("active");
    if (tab.dataset.tab === "achievements") buildAchievements();
  });
});

// =========================================================
// SAVE / LOAD
// =========================================================
const SAVE_KEY = "tapnova_save_v2";
function save() {
  const d = {
    dust: S.dust, lifetimeDust: S.lifetimeDust, allTimeDust: S.allTimeDust,
    novaCrystals: S.novaCrystals, tapLevel: S.tapLevel,
    prestigeCount: S.prestigeCount, totalTaps: S.totalTaps,
    critCount: S.critCount, meteorsCollected: S.meteorsCollected,
    gens: S.gens.map(g => g.count), achieved: S.achieved,
    ts: Date.now()
  };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(d)); } catch(e) {}
}
function load() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return 0;
    const d = JSON.parse(raw);
    S.dust = d.dust || 0;
    S.lifetimeDust = d.lifetimeDust || 0;
    S.allTimeDust = d.allTimeDust || 0;
    S.novaCrystals = d.novaCrystals || 0;
    S.tapLevel = d.tapLevel || 0;
    S.prestigeCount = d.prestigeCount || 0;
    S.totalTaps = d.totalTaps || 0;
    S.critCount = d.critCount || 0;
    S.meteorsCollected = d.meteorsCollected || 0;
    S.achieved = d.achieved || {};
    if (d.gens) d.gens.forEach((c, i) => { if (S.gens[i]) S.gens[i].count = c; });
    return d.ts ? (Date.now() - d.ts) / 1000 : 0;
  } catch(e) { return 0; }
}

// =========================================================
// OFFLINE PROGRESS
// =========================================================
function applyOffline(elapsed) {
  const cap = 7200;
  elapsed = Math.min(elapsed, cap);
  const rate = totalRate();
  if (rate <= 0 || elapsed < 60) return;
  const earned = rate * elapsed;
  S.dust += earned;
  S.lifetimeDust += earned;
  S.allTimeDust += earned;
  showOfflineBanner(earned, elapsed);
}
function showOfflineBanner(earned, elapsed) {
  const div = document.createElement("div");
  div.className = "offline-banner";
  const mins = Math.floor(elapsed / 60);
  div.innerHTML = `<h3>Welcome Back!</h3><p>+${fmt(earned)} Stardust</p><p style="font-size:13px;color:#a89cdb">${mins} min${mins !== 1 ? "s" : ""} away</p><button onclick="this.parentElement.remove()">Collect</button>`;
  document.body.appendChild(div);
}

// =========================================================
// TAP HANDLING
// =========================================================
const orbArea = document.getElementById("orbArea");
const orb = document.getElementById("orb");

orb.addEventListener("pointerdown", e => {
  e.preventDefault();
  S.totalTaps++;
  addCombo();

  const isCrit = rollCrit();
  let amount = tapPower() * S.comboMultiplier;

  if (isCrit) {
    amount *= CRIT_MULTIPLIER;
    S.critCount++;
    screenShake();
    screenFlash("rgba(255, 60, 60, 0.35)");
    if (navigator.vibrate) navigator.vibrate([40, 20, 60]);
  } else {
    if (navigator.vibrate) navigator.vibrate(20);
  }

  S.dust += amount;
  S.lifetimeDust += amount;
  S.allTimeDust += amount;

  // Floating text
  const f = document.createElement("div");
  f.className = isCrit ? "floater crit" : "floater";
  f.textContent = (isCrit ? "CRIT +" : "+") + fmt(amount);
  const rect = orbArea.getBoundingClientRect();
  f.style.left = (e.clientX - rect.left - 30 + (Math.random() * 40 - 20)) + "px";
  f.style.top = (e.clientY - rect.top - 20) + "px";
  orbArea.appendChild(f);
  setTimeout(() => f.remove(), isCrit ? 900 : 800);

  // Dynamic orb glow based on combo
  updateOrbVisuals();
  updateUI();
  checkAchievements();
});

function updateOrbVisuals() {
  const mult = S.comboMultiplier;
  const glow = document.getElementById("glow");
  if (mult >= 8) {
    orb.style.boxShadow = "0 0 50px rgba(239,68,68,.5),0 0 100px rgba(239,68,68,.3),inset 0 -8px 20px rgba(0,0,0,.3)";
    glow.style.background = "radial-gradient(circle,rgba(239,68,68,.3),transparent 70%)";
  } else if (mult >= 3) {
    orb.style.boxShadow = "0 0 50px rgba(245,158,11,.4),0 0 90px rgba(245,158,11,.2),inset 0 -8px 20px rgba(0,0,0,.3)";
    glow.style.background = "radial-gradient(circle,rgba(245,158,11,.25),transparent 70%)";
  } else {
    orb.style.boxShadow = "0 0 40px rgba(139,92,246,.4),0 0 80px rgba(139,92,246,.2),inset 0 -8px 20px rgba(0,0,0,.3)";
    glow.style.background = "radial-gradient(circle,rgba(139,92,246,.2),transparent 70%)";
  }
}

// =========================================================
// SHOP
// =========================================================
const shop = document.getElementById("shop");

function buildShop() {
  let html = "";

  // Tap upgrade
  const tCost = tapUpgradeCost();
  const tDis = S.dust < tCost ? " disabled" : "";
  html += `<div class="btn${tDis}" data-action="tap">
    <div class="info"><div class="name">Tap Power Lv.${S.tapLevel + 1}</div>
    <div class="detail">+${fmt(tapPower())} per tap (x${S.comboMultiplier} combo)</div></div>
    <div class="cost">${fmt(tCost)}</div></div>`;

  html += `<div class="section-title" style="margin-top:8px">GENERATORS</div>`;

  for (let i = 0; i < S.gens.length; i++) {
    const g = S.gens[i];
    const cost = genCost(i);
    const dis = S.dust < cost ? " disabled" : "";
    html += `<div class="btn${dis}" data-action="gen" data-idx="${i}">
      <div class="info"><div class="name">${g.name} <span style="color:#a89cdb">x${g.count}</span></div>
      <div class="detail">+${fmt(g.baseRate * globalMult())}/s each</div></div>
      <div class="cost">${fmt(cost)}</div></div>`;
  }

  // Prestige
  const pg = prestigeGain();
  if (pg > 0) {
    html += `<div class="btn prestige" data-action="prestige">
      <div class="info"><div class="name">GO SUPERNOVA</div>
      <div class="detail">Reset for +${fmt(pg)} Nova Crystal${pg > 1 ? "s" : ""} (+${fmt(pg * 10)}% all)</div></div></div>`;
  }

  shop.innerHTML = html;
}

shop.addEventListener("pointerdown", e => {
  const btn = e.target.closest(".btn");
  if (!btn || btn.classList.contains("disabled")) return;
  const action = btn.dataset.action;

  if (action === "tap") {
    const cost = tapUpgradeCost();
    if (S.dust >= cost) { S.dust -= cost; S.tapLevel++; }
  } else if (action === "gen") {
    const i = parseInt(btn.dataset.idx);
    const cost = genCost(i);
    if (S.dust >= cost) { S.dust -= cost; S.gens[i].count++; }
  } else if (action === "prestige") {
    const gain = prestigeGain();
    if (gain <= 0) return;
    if (!confirm("Go Supernova?\n\nReset progress for +" + fmt(gain) + " Nova Crystal(s).\nEach crystal = +10% to ALL production.")) return;
    S.novaCrystals += gain;
    S.prestigeCount++;
    S.dust = 0; S.lifetimeDust = 0; S.tapLevel = 0;
    S.gens.forEach(g => g.count = 0);
    S.comboCount = 0; S.comboTimer = 0; S.comboMultiplier = 1;
    screenFlash("rgba(255, 200, 100, 0.5)");
    screenShake();
    showToast("SUPERNOVA!", "+" + fmt(gain) + " Nova Crystals earned");
    checkAchievements();
  }
  updateUI();
  checkAchievements();
});

// =========================================================
// UI UPDATE
// =========================================================
const dustVal = document.getElementById("dustVal");
const rateVal = document.getElementById("rateVal");
const novaInfo = document.getElementById("novaInfo");

function updateUI() {
  dustVal.textContent = fmt(S.dust);
  rateVal.textContent = fmt(totalRate()) + "/s";
  const nc = S.novaCrystals;
  const ab = ((achievBonus() - 1) * 100).toFixed(0);
  let infoText = "";
  if (nc > 0) infoText += "Nova: " + fmt(nc) + " (+"+fmt(nc*10)+"%)";
  if (parseInt(ab) > 0) infoText += (infoText ? " | " : "") + "Achievements: +" + ab + "%";
  novaInfo.textContent = infoText;
  buildShop();
}

// =========================================================
// GAME LOOP
// =========================================================
let lastTick = performance.now();
let achievCheckTimer = 0;

function tick(now) {
  const dt = (now - lastTick) / 1000;
  lastTick = now;

  // Passive income
  const rate = totalRate();
  if (rate > 0) {
    S.dust += rate * dt;
    S.lifetimeDust += rate * dt;
    S.allTimeDust += rate * dt;
  }

  // Combo decay
  updateCombo(dt);

  // Periodic achievement check
  achievCheckTimer += dt;
  if (achievCheckTimer >= 2) {
    achievCheckTimer = 0;
    checkAchievements();
  }

  updateUI();
  requestAnimationFrame(tick);
}

// =========================================================
// INIT
// =========================================================
const offlineSec = load();
if (offlineSec > 0) applyOffline(offlineSec);
updateUI();
updateOrbVisuals();
requestAnimationFrame(tick);
scheduleMeteor();

// Auto-save every 15s + on pause
setInterval(save, 15000);
document.addEventListener("visibilitychange", () => { if (document.hidden) save(); });
</script>
</body>
</html>
