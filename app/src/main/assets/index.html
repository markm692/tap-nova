<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tap City</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0a1628;font-family:'Segoe UI',system-ui,sans-serif;color:#fff}
#game{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;padding:8px 12px env(safe-area-inset-bottom)}

.top-bar{text-align:center;padding:3px 0}
.currency-name{font-size:9px;letter-spacing:3px;color:#8badc9;text-transform:uppercase}
.currency-value{font-size:34px;font-weight:700;color:#fff5d4;text-shadow:0 0 20px rgba(255,200,60,.3)}
.rate{font-size:11px;color:#6dba6d;margin-top:1px}
.nova-info{font-size:10px;color:#ff8866;margin-top:1px}
.buff-bar{font-size:9px;color:#60a5fa;margin-top:1px;min-height:12px}

.combo-bar-wrap{height:18px;display:flex;align-items:center;gap:6px;margin:2px 0}
.combo-label{font-size:11px;font-weight:700;color:#fbbf24;white-space:nowrap;min-width:36px}
.combo-track{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.combo-fill{height:100%;width:0%;background:linear-gradient(90deg,#f59e0b,#ef4444);border-radius:2px;transition:width .15s}
.combo-bar-wrap.hidden{opacity:0}

.orb-area{flex:2;position:relative;min-height:0;overflow:hidden;cursor:pointer}

/* Sea background */
.city-sky{position:absolute;inset:0;z-index:0;background:linear-gradient(180deg,#0a4a8a 0%,#1565c0 30%,#1976d2 50%,#2196f3 70%,#42a5f5 100%)}
.city-stars-bg{display:none}
.city-sun{display:none}
/* Animated wave overlay */
.sea-waves{position:absolute;bottom:0;left:0;right:0;height:40%;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 8px,rgba(255,255,255,.03) 8px,rgba(255,255,255,.03) 9px);
  animation:waveShift 3s linear infinite}
@keyframes waveShift{from{background-position:0 0}to{background-position:0 18px}}

/* City drawn on particle canvas — no separate element needed */
.bldg-windows{display:flex;flex-wrap:wrap;gap:2px;padding:3px 2px;justify-content:center;align-content:flex-start}
.bldg-win{width:5px;height:6px;border-radius:1px}
.bldg-win.lit{box-shadow:0 0 4px rgba(253,230,138,.5)}
.bldg-antenna{width:2px;height:10px;background:#64748b;position:absolute;top:-10px;left:50%;transform:translateX(-50%)}
.bldg-antenna::after{content:'';position:absolute;top:-3px;left:-2px;width:6px;height:6px;border-radius:50%;background:#ef4444;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.crane{position:absolute;top:-22px;left:50%;transform:translateX(-50%);width:2px;height:22px;background:#94a3b8}
.crane::before{content:'';position:absolute;top:0;left:-10px;width:22px;height:2px;background:#94a3b8}
.crane::after{content:'';position:absolute;top:2px;right:-10px;width:1px;height:14px;background:#64748b;border-bottom:3px solid #fbbf24}

/* Tap label overlay */
.tap-hint{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,.2);z-index:5;text-shadow:0 1px 4px rgba(0,0,0,.5)}

/* Legacy orb - hidden but kept for JS refs */
#orb{display:none}
.glow{display:none}

.floater{position:absolute;font-size:20px;font-weight:700;color:#fde68a;text-shadow:0 0 8px rgba(253,230,138,.5);pointer-events:none;z-index:10;animation:floatUp .8s ease-out forwards}
.floater.crit{font-size:30px;color:#ff4444;text-shadow:0 0 16px rgba(255,60,60,.8),0 0 30px rgba(255,60,60,.4);animation:floatUpCrit .9s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(.8)}}
@keyframes floatUpCrit{0%{opacity:1;transform:translateY(0) scale(1.5)}20%{transform:translateY(-15px) scale(1.2)}100%{opacity:0;transform:translateY(-100px) scale(.7)}}

.screen-flash{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0}
@keyframes flash{0%{opacity:.4}100%{opacity:0}}
.shake{animation:shake .15s ease}
@keyframes shake{0%,100%{transform:translate(0)}25%{transform:translate(-4px,2px)}50%{transform:translate(3px,-3px)}75%{transform:translate(-2px,3px)}}

.investor{position:absolute;width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fef08a,#f59e0b 50%,#b45309);box-shadow:0 0 20px rgba(245,158,11,.6);cursor:pointer;z-index:20;animation:investorFloat 3s ease-in-out infinite;pointer-events:auto}
.investor::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(254,240,138,.5);animation:investorRing 1s ease-in-out infinite}
@keyframes investorFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes investorRing{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.3);opacity:1}}
.investor-label{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:#fef08a;white-space:nowrap}
.investor-timer{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:8px;color:#fbbf24;white-space:nowrap}

.boss-bar{position:absolute;bottom:8px;left:8px;right:8px;z-index:30;background:rgba(10,18,35,.92);border:1px solid rgba(239,68,68,.5);border-radius:10px;padding:6px 10px;text-align:center}
.boss-name{font-size:12px;font-weight:700;color:#ef4444}
.boss-hp-track{height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin:3px 0;overflow:hidden}
.boss-hp-fill{height:100%;background:linear-gradient(90deg,#ef4444,#f59e0b);border-radius:3px;transition:width .1s}
.boss-timer{font-size:9px;color:#fbbf24}

/* Mini-game overlay */
.minigame-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center}
.minigame-overlay.show{display:flex}
.mg-title{font-size:20px;font-weight:700;color:#60a5fa;margin-bottom:8px}
.mg-subtitle{font-size:12px;color:#8badc9;margin-bottom:12px}
.mg-area{width:280px;height:280px;position:relative;border:2px solid rgba(59,130,246,.3);border-radius:16px;background:rgba(10,18,35,.8);overflow:hidden}
.mg-score{font-size:16px;font-weight:700;color:#fde68a;margin-top:10px}
.mg-timer{font-size:13px;color:#fbbf24;margin-top:4px}
.mg-star{position:absolute;width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fef08a,#f59e0b);box-shadow:0 0 12px rgba(245,158,11,.5);cursor:pointer;transition:transform .1s;display:flex;align-items:center;justify-content:center;font-size:18px}
.mg-star:active{transform:scale(.8)}
.mg-node{position:absolute;width:50px;height:50px;border-radius:50%;border:3px solid rgba(59,130,246,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .2s}
.mg-node.lit{background:rgba(59,130,246,.4);border-color:#60a5fa;box-shadow:0 0 15px rgba(59,130,246,.5)}
.mg-node.wrong{background:rgba(239,68,68,.3);border-color:#ef4444}
.mg-node.correct{background:rgba(74,222,128,.3);border-color:#4ade80}
.mg-result{font-size:18px;font-weight:700;margin-top:12px}
.mg-close{margin-top:12px;padding:8px 28px;background:#3b82f6;border:none;border-radius:8px;color:#fff;font-size:14px;cursor:pointer}

.sep{height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.3),transparent);margin:3px 0}

.tab-bar{display:flex;gap:2px;margin-bottom:3px}
.tab{flex:1;padding:4px 0;text-align:center;font-size:9px;font-weight:600;letter-spacing:.5px;color:#6b8ab5;background:rgba(12,22,42,.6);border:1px solid rgba(50,80,140,.2);border-radius:6px;cursor:pointer;transition:all .15s;position:relative}
.tab.active{color:#fff;background:rgba(30,60,100,.6);border-color:rgba(59,130,246,.5)}
.tab-notif{position:absolute;top:1px;right:4px;width:6px;height:6px;border-radius:50%;background:#ef4444;display:none}

.tab-panel{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.tab-panel.active{display:flex;flex-direction:column}
.tab-panel::-webkit-scrollbar{display:none}
.shop{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
.shop::-webkit-scrollbar{display:none}
.section-title{font-size:9px;letter-spacing:2px;color:#6b8ab5;text-align:center;margin:4px 0 2px}

.btn{width:100%;padding:7px 10px;margin-bottom:3px;background:rgba(18,30,52,.8);border:1px solid rgba(50,80,140,.35);border-radius:10px;color:#fff;font-size:11px;text-align:left;cursor:pointer;transition:background .15s;display:flex;justify-content:space-between;align-items:center}
.btn:active{background:rgba(50,30,90,.9)}
.btn.disabled{opacity:.35;pointer-events:none}
.btn .info{display:flex;flex-direction:column;gap:1px}
.btn .name{font-weight:600;font-size:12px}
.btn .detail{font-size:9px;color:#8badc9}
.btn .cost{font-size:11px;color:#fde68a;font-weight:600;white-space:nowrap}

.btn.prestige{background:rgba(130,20,30,.7);border-color:rgba(255,100,80,.5);text-align:center;justify-content:center;margin-top:3px}
.btn.prestige .name{color:#ffd4cc;font-size:13px}
.btn.prestige .detail{color:#ff9988;font-size:10px}
.btn.new city{background:rgba(20,80,100,.7);border-color:rgba(56,189,248,.5);text-align:center;justify-content:center;margin-top:3px}
.btn.new city .name{color:#7dd3fc;font-size:13px}
.btn.new city .detail{color:#38bdf8;font-size:10px}

.btn.wheel-btn{background:rgba(20,50,80,.6);border-color:rgba(96,165,250,.4);text-align:center;justify-content:center}
.btn.wheel-btn .name{color:#60a5fa}
.btn.wheel-btn.ready{border-color:rgba(96,165,250,.8);animation:wp 1.5s ease-in-out infinite}
@keyframes wp{0%,100%{box-shadow:none}50%{box-shadow:0 0 12px rgba(96,165,250,.3)}}

.btn.mg-btn{background:rgba(20,60,80,.6);border-color:rgba(56,189,248,.4);text-align:center;justify-content:center}
.btn.mg-btn .name{color:#38bdf8}
.btn.mg-btn.ready{border-color:rgba(56,189,248,.8);animation:mgp 1.5s ease-in-out infinite}
@keyframes mgp{0%,100%{box-shadow:none}50%{box-shadow:0 0 12px rgba(56,189,248,.3)}}

.achiev{padding:6px 10px;margin-bottom:3px;background:rgba(18,30,52,.6);border:1px solid rgba(50,80,140,.2);border-radius:8px;display:flex;gap:8px;align-items:center}
.achiev.done{border-color:rgba(245,158,11,.4);background:rgba(60,40,20,.4)}
.achiev-icon{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.achiev-info{flex:1;min-width:0}
.achiev-name{font-size:11px;font-weight:600}
.achiev-desc{font-size:9px;color:#8badc9}
.achiev-reward{font-size:8px;color:#fbbf24;margin-top:1px}
.achiev-bar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:2px;overflow:hidden}
.achiev-bar-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#60a5fa);border-radius:2px;transition:width .3s}
.achiev.done .achiev-bar-fill{background:linear-gradient(90deg,#f59e0b,#fbbf24)}

.skill{padding:6px 10px;margin-bottom:3px;background:rgba(18,30,52,.6);border:1px solid rgba(50,80,140,.2);border-radius:8px;display:flex;gap:8px;align-items:center;cursor:pointer}
.skill.owned{border-color:rgba(74,222,128,.4);background:rgba(20,60,30,.3)}
.skill.affordable{border-color:rgba(96,165,250,.5)}
.skill-icon{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.skill-info{flex:1}
.skill-name{font-size:11px;font-weight:600}
.skill-desc{font-size:9px;color:#8badc9}
.skill-cost{font-size:10px;color:#ff8866;font-weight:600;white-space:nowrap}
.skill.owned .skill-cost{color:#4ade80}

/* Orb stages visual */
.orb-stage{padding:6px 10px;margin-bottom:3px;background:rgba(18,30,52,.6);border:1px solid rgba(50,80,140,.2);border-radius:8px;display:flex;gap:10px;align-items:center}
.orb-stage.current{border-color:rgba(96,165,250,.5);background:rgba(30,60,100,.3)}
.orb-stage.locked{opacity:.4}
.orb-preview{width:32px;height:32px;border-radius:50%;flex-shrink:0}
.orb-stage-info{flex:1}
.orb-stage-name{font-size:11px;font-weight:600}
.orb-stage-req{font-size:9px;color:#8badc9}

/* Rival leaderboard */
.rival{padding:6px 10px;margin-bottom:3px;background:rgba(18,30,52,.6);border:1px solid rgba(50,80,140,.2);border-radius:8px;display:flex;gap:10px;align-items:center}
.rival.you{border-color:rgba(59,130,246,.5);background:rgba(30,60,100,.3)}
.rival-rank{font-size:16px;font-weight:700;width:26px;text-align:center;color:#8badc9;flex-shrink:0}
.rival.you .rival-rank{color:#60a5fa}
.rival-info{flex:1}
.rival-name{font-size:11px;font-weight:600}
.rival-dust{font-size:9px;color:#8badc9}
.rival-rate{font-size:9px;color:#6dba6d}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.wheel-modal{background:rgba(12,22,42,.97);border:2px solid rgba(59,130,246,.5);border-radius:16px;padding:16px;text-align:center;width:88%;max-width:320px}
.wheel-title{font-size:16px;font-weight:700;color:#60a5fa;margin-bottom:10px}
.wheel-container{position:relative;width:220px;height:220px;margin:0 auto 12px}
.wheel-canvas{width:220px;height:220px}
.wheel-pointer{position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:16px solid #fbbf24;z-index:2}
.wheel-result{font-size:14px;font-weight:700;color:#fde68a;margin:6px 0;min-height:20px}
.wheel-spin-btn{padding:8px 30px;background:#3b82f6;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.wheel-spin-btn:disabled{opacity:.4}
.wheel-close{margin-top:8px;padding:5px 20px;background:transparent;border:1px solid rgba(59,130,246,.4);border-radius:6px;color:#8badc9;font-size:12px;cursor:pointer}

.streak-modal{background:rgba(12,22,42,.97);border:2px solid rgba(245,158,11,.5);border-radius:16px;padding:20px;text-align:center;width:88%;max-width:320px}
.streak-title{font-size:16px;font-weight:700;color:#fbbf24;margin-bottom:3px}
.streak-subtitle{font-size:12px;color:#8badc9;margin-bottom:12px}
.streak-days{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.streak-day{width:34px;height:40px;border-radius:6px;background:rgba(18,30,52,.8);border:1px solid rgba(50,80,140,.3);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8px;color:#6b8ab5}
.streak-day.claimed{background:rgba(60,40,20,.6);border-color:rgba(245,158,11,.5);color:#fbbf24}
.streak-day.today{border-color:#fbbf24;box-shadow:0 0 6px rgba(245,158,11,.3)}
.streak-day .day-num{font-weight:700;font-size:10px}
.streak-claim{padding:8px 30px;background:#f59e0b;border:none;border-radius:8px;color:#000;font-size:14px;font-weight:700;cursor:pointer}
.streak-claim:disabled{opacity:.4}

.toast{position:fixed;top:40px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(18,30,52,.95);border:1px solid rgba(245,158,11,.5);border-radius:10px;padding:6px 14px;text-align:center;z-index:100;opacity:0;pointer-events:none;transition:all .3s ease;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-title{font-size:12px;font-weight:700;color:#fbbf24}
.toast-desc{font-size:9px;color:#8badc9;margin-top:1px}

.offline-banner{position:fixed;top:0;left:0;right:0;background:rgba(10,18,35,.97);border-bottom:1px solid rgba(59,130,246,.4);padding:14px;text-align:center;z-index:100;animation:slideDown .4s ease}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
.offline-banner h3{color:#60a5fa;margin-bottom:3px;font-size:15px}
.offline-banner p{color:#fde68a;font-size:15px}
.offline-banner button{margin-top:8px;padding:6px 24px;background:#3b82f6;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer}

/* Weekly challenge banner */
.weekly{padding:6px 10px;margin-bottom:3px;background:rgba(20,60,40,.5);border:1px solid rgba(74,222,128,.3);border-radius:8px;text-align:center}
.weekly-title{font-size:10px;color:#4ade80;font-weight:600}
.weekly-progress{font-size:9px;color:#8badc9;margin-top:2px}
.weekly-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:3px;overflow:hidden}
.weekly-bar-fill{height:100%;background:linear-gradient(90deg,#059669,#4ade80);border-radius:2px;transition:width .3s}

/* Artifacts */
.artifact{padding:6px 10px;margin-bottom:3px;border-radius:8px;display:flex;gap:8px;align-items:center;background:rgba(18,30,52,.6);border:1px solid rgba(50,80,140,.2)}
.artifact.common{border-color:rgba(148,163,184,.4)}
.artifact.rare{border-color:rgba(56,189,248,.5);background:rgba(20,40,60,.5)}
.artifact.epic{border-color:rgba(37,99,235,.5);background:rgba(20,35,55,.5)}
.artifact.legendary{border-color:rgba(245,158,11,.6);background:rgba(60,40,20,.5);box-shadow:0 0 8px rgba(245,158,11,.15)}
.artifact-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.artifact-info{flex:1}
.artifact-name{font-size:11px;font-weight:600}
.artifact-effect{font-size:9px;color:#8badc9}
.artifact-rarity{font-size:8px;font-weight:700;text-transform:uppercase}
.artifact.common .artifact-rarity{color:#94a3b8}
.artifact.rare .artifact-rarity{color:#38bdf8}
.artifact.epic .artifact-rarity{color:#2563eb}
.artifact.legendary .artifact-rarity{color:#f59e0b}

/* Prestige challenges */
.challenge{padding:6px 10px;margin-bottom:3px;background:rgba(18,30,52,.6);border:1px solid rgba(50,80,140,.2);border-radius:8px}
.challenge.done{border-color:rgba(74,222,128,.4);background:rgba(20,60,30,.3)}
.challenge-name{font-size:11px;font-weight:600}
.challenge-desc{font-size:9px;color:#8badc9;margin-top:1px}
.challenge-reward{font-size:8px;color:#fbbf24}
.challenge-bar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:3px;overflow:hidden}
.challenge-bar-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#4ade80);border-radius:2px;transition:width .3s}

/* Music toggle */
.music-toggle{position:fixed;top:6px;right:8px;z-index:90;background:rgba(18,30,52,.8);border:1px solid rgba(50,80,140,.3);border-radius:6px;padding:3px 8px;font-size:10px;color:#8badc9;cursor:pointer}
.music-toggle.on{color:#60a5fa;border-color:rgba(96,165,250,.5)}

/* Artifact drop toast */
.drop-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) scale(0);background:rgba(12,22,42,.95);border:2px solid;border-radius:12px;padding:10px 20px;text-align:center;z-index:110;transition:transform .3s ease;pointer-events:none}
.drop-toast.show{transform:translateX(-50%) scale(1)}
.drop-toast.common{border-color:#94a3b8}
.drop-toast.rare{border-color:#38bdf8}
.drop-toast.epic{border-color:#2563eb;box-shadow:0 0 20px rgba(37,99,235,.3)}
.drop-toast.legendary{border-color:#f59e0b;box-shadow:0 0 30px rgba(245,158,11,.4)}
.drop-icon{font-size:28px}
.drop-name{font-size:14px;font-weight:700;margin-top:4px}
.drop-effect{font-size:10px;color:#8badc9;margin-top:2px}
</style>
</head>
<body>
<div id="game">
  <div class="top-bar">
    <div class="currency-name">Cash</div>
    <div class="currency-value" id="dustVal">0</div>
    <div class="rate" id="rateVal">0/s</div>
    <div class="nova-info" id="novaInfo"></div>
    <div class="buff-bar" id="buffBar"></div>
  </div>
  <div class="combo-bar-wrap hidden" id="comboWrap">
    <div class="combo-label" id="comboLabel">x1</div>
    <div class="combo-track"><div class="combo-fill" id="comboFill"></div></div>
  </div>
  <div class="orb-area" id="orbArea">
    <div class="city-sky" id="citySky"></div>
    <div class="sea-waves"></div>
    <div class="city-sun" id="citySun"></div>
    <div class="city-stars-bg" id="cityStarsBg"></div>
    <canvas id="particleCanvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:15"></canvas>
    <div class="glow" id="glow"></div>
    <div id="orb"></div>
    <!-- city draws on particleCanvas -->

function osc(type,freq,dur,vol,freqEnd,delay){
const c=ac(),t=c.currentTime+(delay||0),o=c.createOscillator(),g=c.createGain();
o.type=type;o.frequency.setValueAtTime(freq,t);
if(freqEnd)o.frequency.exponentialRampToValueAtTime(freqEnd,t+dur*.8);
g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+dur);
}

// City draws on particle canvas (shared) — city first, particles on top
let cCanvas=null,cCtx=null; // set after pCanvas is created
const TW=22,TH=11; // tile width/height (2:1 isometric)
const GRID=30; // 30x30 grid

// Camera: zoom + pan
let camZoom=.45,camPanX=0,camPanY=0;
let camMinZoom=.25,camMaxZoom=1.5;
// Touch tracking for pinch-zoom and pan
let touches={},lastPinchDist=0,isPanning=false,lastPanX=0,lastPanY=0;
// Building configs per generator type
const BLDG_COLORS=[
  {front:"#d4a574",side:"#b8956a",roof:"#c53030",h:10},    // Small House
  {front:"#92400e",side:"#78350f",roof:"#b45309",h:18},
  {front:"#64748b",side:"#475569",roof:"#94a3b8",h:35},
  {front:"#4a5568",side:"#2d3748",roof:"#718096",h:22},
  {front:"#0284c7",side:"#0369a1",roof:"#38bdf8",h:45},
  {front:"#1e3a5f",side:"#172554",roof:"#3b82f6",h:55},
  {front:"#334155",side:"#1e293b",roof:"#64748b",h:70},
];
let lastCityHash="";

function isoToScreen(col,row,ox,oy){return{x:ox+(col-row)*TW/2,y:oy+(col+row)*TH/2};}

function drawTile(ctx,sx,sy,color,outline){
  ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+TW/2,sy+TH/2);ctx.lineTo(sx,sy+TH);ctx.lineTo(sx-TW/2,sy+TH/2);ctx.closePath();
  ctx.fillStyle=color;ctx.fill();
  if(outline){ctx.strokeStyle=outline;ctx.lineWidth=.5;ctx.stroke();}
}

function drawBuilding(ctx,sx,sy,w,h,colors,isNight){
  const hw=w/2;
  ctx.beginPath();ctx.moveTo(sx-hw,sy+TH/2);ctx.lineTo(sx,sy+TH);ctx.lineTo(sx,sy+TH-h);ctx.lineTo(sx-hw,sy+TH/2-h);ctx.closePath();
  ctx.fillStyle=colors.side;ctx.fill();
  ctx.beginPath();ctx.moveTo(sx+hw,sy+TH/2);ctx.lineTo(sx,sy+TH);ctx.lineTo(sx,sy+TH-h);ctx.lineTo(sx+hw,sy+TH/2-h);ctx.closePath();
  ctx.fillStyle=colors.front;ctx.fill();
  ctx.beginPath();ctx.moveTo(sx,sy+TH-h);ctx.lineTo(sx+hw,sy+TH/2-h);ctx.lineTo(sx,sy-h);ctx.lineTo(sx-hw,sy+TH/2-h);ctx.closePath();
  ctx.fillStyle=colors.roof;ctx.fill();
  const litC=isNight?.65:.12;
  const winOn=isNight?"rgba(255,240,150,.8)":"rgba(180,220,255,.4)";
  const winOff=isNight?"rgba(40,50,70,.6)":"rgba(100,130,160,.25)";
  // Window area: skip top portion (roof overlap) and bottom edge
  const roofClear=TH/2+3; // clear the isometric roof overhang
  const winAreaH=Math.max(0,h-roofClear-3);
  const ww=3,wh=3;
  const wSpaceY=wh+3,wSpaceX=ww+3;
  const wRows=Math.max(0,Math.floor(winAreaH/wSpaceY));
  const wCols=Math.max(1,Math.floor(hw/wSpaceX));
  const seed=Math.floor(sx*7+sy*13);
  const slopeR=TH/(2*hw);
  for(let wr=0;wr<wRows;wr++){for(let wc=0;wc<wCols;wc++){
    const wHash=((seed+wr*31+wc*17)&0xFFFF)/65536;
    ctx.fillStyle=wHash<litC?winOn:winOff;
    const wy=sy+TH-h+roofClear+wr*wSpaceY;
    // Right face windows — skew follows right face slope (down to right)
    const rx=sx+3+wc*6;
    if(rx+ww<sx+hw){
      const ry=wy+(rx-sx)*slopeR;
      ctx.beginPath();
      ctx.moveTo(rx,ry);ctx.lineTo(rx+ww,ry-ww*slopeR);
      ctx.lineTo(rx+ww,ry-ww*slopeR+wh);ctx.lineTo(rx,ry+wh);
      ctx.fill();
    }
    // Left face windows — skew follows left face slope (down to left)
    const lx=sx-3-wc*6-ww;
    if(lx>sx-hw){
      const ly=wy+(sx-lx-ww)*slopeR;
      ctx.beginPath();
      ctx.moveTo(lx,ly);ctx.lineTo(lx+ww,ly+ww*slopeR);
      ctx.lineTo(lx+ww,ly+ww*slopeR+wh);ctx.lineTo(lx,ly+wh);
      ctx.fill();
    }
  }}
  ctx.strokeStyle="rgba(0,0,0,.15)";ctx.lineWidth=.5;
  ctx.beginPath();ctx.moveTo(sx-hw,sy+TH/2);ctx.lineTo(sx-hw,sy+TH/2-h);ctx.lineTo(sx,sy-h);ctx.lineTo(sx+hw,sy+TH/2-h);ctx.lineTo(sx+hw,sy+TH/2);ctx.stroke();
}

// Island shape: -1=water, 0=land, 9=beach
// Deterministic noise for organic coastline
function islandNoise(r,c){return((Math.sin(r*12.9898+c*78.233)*43758.5453)%1+1)%1;}
let islandMask=null;
function buildIslandMask(){
  islandMask=Array.from({length:GRID},()=>Array(GRID).fill(-1));
  const mid=GRID/2-.5;
  const rx=GRID*.42,ry=GRID*.42; // ellipse radii
  for(let r=0;r<GRID;r++){for(let c=0;c<GRID;c++){
    const dx=(c-mid)/rx,dy=(r-mid)/ry;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const noise=islandNoise(r,c)*.25; // coastline irregularity
    if(dist<.75+noise)islandMask[r][c]=0; // land
    else if(dist<.92+noise)islandMask[r][c]=9; // beach
  }}
}
buildIslandMask();

function rebuildGrid(){
  cityGrid=Array.from({length:GRID},()=>Array(GRID).fill(0));
  // Apply island mask
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    if(islandMask[r][c]===-1)cityGrid[r][c]=-1; // water
    else if(islandMask[r][c]===9)cityGrid[r][c]=9; // beach
  }
  // Roads: grid pattern every 3 tiles on land (not beach/water)
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){
    if(cityGrid[r][c]===0&&(r%3===1||c%3===1))cityGrid[r][c]=8; // road
  }
  // Collect buildable land slots
  let slots=[];
  for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++)if(cityGrid[r][c]===0)slots.push({r,c});
  const mid=Math.floor(GRID/2);
  slots.sort((a,b)=>(Math.abs(a.r-mid)+Math.abs(a.c-mid))-(Math.abs(b.r-mid)+Math.abs(b.c-mid)));
  // Place tallest buildings first so they get center slots
  let si=0;
  const genOrder=[...S.gens.keys()].sort((a,b)=>BLDG_COLORS[b].h-BLDG_COLORS[a].h);
  genOrder.forEach(gi=>{
    const gen=S.gens[gi];
    const num=Math.min(gen.count,gi<2?Math.ceil(gen.count/2):Math.ceil(gen.count/3),30);
    for(let b=0;b<num&&si<slots.length;b++){cityGrid[slots[si].r][slots[si].c]=gi+1;si++;}
  });
}

const DAY_CYCLE=120;
let dayTimer=0,lastDayPhase="";
function getDayProgress(){return(dayTimer%DAY_CYCLE)/DAY_CYCLE;}
function getDayPhase(){
  const p=getDayProgress();
  if(p<.15)return"dawn";if(p<.45)return"day";if(p<.6)return"dusk";return"night";
}
function lerpColor(a,b,t){
  const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16);
  const r1=(pa>>16)&255,g1=(pa>>8)&255,b1=pa&255;
  const r2=(pb>>16)&255,g2=(pb>>8)&255,b2=pb&255;
  const r=Math.round(r1+(r2-r1)*t),g=Math.round(g1+(g2-g1)*t),b3=Math.round(b1+(b2-b1)*t);
  return"#"+((1<<24)+(r<<16)+(g<<8)+b3).toString(16).slice(1);
}
const SKY_KEYS=[
  {p:0,top:"#1a1040",mid:"#d97706",bot:"#fef3c7",stars:.1},
  {p:.15,top:"#1565c0",mid:"#42a5f5",bot:"#e3f2fd",stars:0},
  {p:.3,top:"#1e88e5",mid:"#90caf9",bot:"#e3f2fd",stars:0},
  {p:.45,top:"#1565c0",mid:"#64b5f6",bot:"#bbdefb",stars:0},
  {p:.55,top:"#4a1a5a",mid:"#c2185b",bot:"#ff8f00",stars:.15},
  {p:.65,top:"#1a1045",mid:"#4a1a5a",bot:"#ef6c00",stars:.4},
  {p:.75,top:"#050a18",mid:"#0a1628",bot:"#152a45",stars:1},
  {p:.9,top:"#050a18",mid:"#0f1830",bot:"#152a45",stars:1},
  {p:1,top:"#1a1040",mid:"#d97706",bot:"#fef3c7",stars:.1},
];
function interpSkyKey(p){
  let a=SKY_KEYS[0],b=SKY_KEYS[1];
  for(let i=0;i<SKY_KEYS.length-1;i++){if(p>=SKY_KEYS[i].p&&p<=SKY_KEYS[i+1].p){a=SKY_KEYS[i];b=SKY_KEYS[i+1];break;}}
  const t=(p-a.p)/(b.p-a.p||1);
  return{top:lerpColor(a.top,b.top,t),mid:lerpColor(a.mid,b.mid,t),bot:lerpColor(a.bot,b.bot,t),stars:a.stars+(b.stars-a.stars)*t};
}
function updateDayNight(dt){
  dayTimer+=dt;
  const phase=getDayPhase();
  const p=getDayProgress();
  // Sea color shifts with time of day
  const sky=document.getElementById("citySky");
  if(sky){
    const isNight=phase==="night"||phase==="dusk";
    const isDawn=phase==="dawn";
    if(isNight)sky.style.background="linear-gradient(180deg,#051530 0%,#0a2a50 30%,#0d3060 50%,#103868 100%)";
    else if(isDawn)sky.style.background="linear-gradient(180deg,#1a3a6a 0%,#2565a0 30%,#1976d2 60%,#42a5f5 100%)";
    else sky.style.background="linear-gradient(180deg,#0a4a8a 0%,#1565c0 30%,#1976d2 50%,#2196f3 70%,#42a5f5 100%)";
  }
  // Phase change triggers city redraw for window lighting
  if(phase!==lastDayPhase){lastDayPhase=phase;lastCityHash="";}
}
function renderCity(force){
  if(!cCanvas||!cCtx){if(cityDrawCount<3){window._dbg&&window._dbg("renderCity: no canvas","#f84");cityDrawCount++;}return;}
  const w=cCanvas.width,h=cCanvas.height;
  if(w<10||h<10)return;

  // Rebuild grid only when generators change
  const genHash=S.gens.map(g=>g.count).join(",");
  if(genHash!==lastCityHash||force){lastCityHash=genHash;rebuildGrid();}

  if(cityDrawCount<3){window._dbg&&window._dbg("renderCity: w="+w+" h="+h+" zoom="+camZoom.toFixed(2),"#0ff");cityDrawCount++;}
  const ctx=cCtx;
  ctx.clearRect(0,0,w,h);

  // Apply camera: zoom + pan
  ctx.save();
  ctx.translate(w/2,h/2);
  ctx.scale(camZoom,camZoom);
  ctx.translate(-w/2+camPanX,-h/2+camPanY);

  // Grid origin: center the grid, bottom at canvas bottom (before zoom)
  const gridBottomOffset=(GRID-1)*TH+TH;
  const ox=w/2,oy=h-gridBottomOffset-5;
  const phase=getDayPhase();
  const isNight=phase==="night"||phase==="dusk";

  // Brighter ground colors so tiles are visible
  const gA=isNight?"#1e3a1e":"#3a7a3a";
  const gB=isNight?"#224022":"#448844";
  const beachA=isNight?"#5a4a2a":"#d4b86a";
  const beachB=isNight?"#4a3a20":"#c8a858";
  const waterA=isNight?"#0a2040":"#1976d2";
  const waterB=isNight?"#0c2848":"#1e88e5";

  // Draw all tiles back-to-front
  for(let row=0;row<GRID;row++){
    for(let col=0;col<GRID;col++){
      const p=isoToScreen(col,row,ox,oy);
      const cell=cityGrid[row][col];
      const alt=(row+col)%2===0;

      // Tile type
      if(cell===-1){drawTile(ctx,p.x,p.y,alt?waterA:waterB,null);continue;}
      if(cell===9){drawTile(ctx,p.x,p.y,alt?beachA:beachB,"rgba(255,255,255,.04)");continue;}
      if(cell===8){
        drawTile(ctx,p.x,p.y,isNight?"#2a2a2a":"#707070","rgba(255,255,255,.05)");
        ctx.fillStyle=isNight?"rgba(251,191,36,.25)":"rgba(251,191,36,.45)";
        ctx.fillRect(p.x-1,p.y+TH/2-1,2,2);
        continue;
      }
      drawTile(ctx,p.x,p.y,alt?gA:gB,"rgba(255,255,255,.06)");

      // Building on this tile
      if(cell>=1&&cell<=7){
        const bc=BLDG_COLORS[cell-1];
        const count=S.gens[cell-1].count;
        const hScale=.5+Math.min(count,20)/20*.5;
        drawBuilding(ctx,p.x,p.y,TW*.8,Math.round(bc.h*hScale),bc,isNight);
      }
    }
  }
  ctx.restore(); // end camera transform
}

function spawnParticles(x,y,count,color,speed,size){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const spd=speed*(.5+Math.random());
    particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,life:1,decay:.02+Math.random()*.02,size:size*(.5+Math.random()),color});
  }
}
function spawnRing(x,y,color){
  particles.push({x,y,vx:0,vy:0,life:1,decay:.015,size:20,color,ring:true,ringSize:10});
}
function updateParticles(dt){
  // Don't clear — city is already drawn on this canvas. Just draw particles on top.
  particles=particles.filter(p=>{
    p.life-=p.decay;if(p.life<=0)return false;
    p.x+=p.vx;p.y+=p.vy;p.vy+=.3;// gravity
    if(p.ring){
      p.ringSize+=3;
      pCtx.beginPath();pCtx.arc(p.x,p.y,p.ringSize,0,Math.PI*2);
      pCtx.strokeStyle=p.color.replace(/[\d.]+\)$/,p.life*.6+")");
      pCtx.lineWidth=2;pCtx.stroke();
    }else{
      pCtx.globalAlpha=p.life;
      pCtx.fillStyle=p.color;
      pCtx.beginPath();pCtx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);pCtx.fill();
    }
    pCtx.globalAlpha=1;
    return true;
  });
}

let musicNodes=null;
const musicToggle=document.getElementById("musicToggle");
function startMusic(){
  if(musicNodes)return;
  const ctx=ac();
  const master=ctx.createGain();master.gain.value=.08;master.connect(ctx.destination);
  const chords=[
    [[130.81,164.81,196],[110,138.59,164.81]],// C3,E3,G3 / A2,C#3,E3
    [[146.83,185,220],[123.47,155.56,185]],// D3,F#3,A3 / B2,D#3,F#3
    [[164.81,207.65,246.94],[138.59,174.61,207.65]],// E3,G#3,B3 / C#3,F3,G#3
  ];
  const stageChord=chords[Math.min(Math.floor(S.orbStage/3),chords.length-1)];
  const oscs=[];
  stageChord.forEach((chord,ci)=>{
    chord.forEach(freq=>{
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.type=ci===0?"sine":"triangle";
      o.frequency.value=freq;
      g.gain.value=.3;
      // Slow LFO
      const lfo=ctx.createOscillator();const lfoG=ctx.createGain();
      lfo.frequency.value=.1+Math.random()*.15;lfoG.gain.value=freq*.02;
      lfo.connect(lfoG);lfoG.connect(o.frequency);lfo.start();
      o.connect(g);g.connect(master);o.start();
      oscs.push({o,g,lfo});
    });
  });
  // Slow chord transition
  let chordIdx=0;
  const chordInterval=setInterval(()=>{
    chordIdx=(chordIdx+1)%stageChord.length;
    const chord=stageChord[chordIdx];
    oscs.forEach((n,i)=>{
      const freq=chord[i%chord.length];
      n.o.frequency.exponentialRampToValueAtTime(freq,ac().currentTime+4);
    });
  },8000);
  musicNodes={oscs,master,chordInterval};
}
function stopMusic(){
  if(!musicNodes)return;
  clearInterval(musicNodes.chordInterval);
  musicNodes.oscs.forEach(n=>{n.o.stop();n.lfo.stop();});
  musicNodes.master.disconnect();
  musicNodes=null;
}
musicToggle.addEventListener("click",()=>{
  S.musicOn=!S.musicOn;
  if(S.musicOn){startMusic();musicToggle.textContent="MUSIC ON";musicToggle.classList.add("on");}
  else{stopMusic();musicToggle.textContent="MUSIC OFF";musicToggle.classList.remove("on");}
});

function load(){try{let raw=localStorage.getItem(SAVE_KEY)||localStorage.getItem("tapnova_save_v4")||localStorage.getItem("tapnova_save_v3")||localStorage.getItem("tapnova_save_v2");if(!raw)return 0;const d=JSON.parse(raw);for(const k of["dust","lifetimeDust","allTimeDust","cityStars","mayorPoints","tapLevel","prestigeCount","ascensionCount","totalTaps","critCount","investorsCollected","wheelCooldown","wheelSpins","dailyStreak","bossesHandled","mgCooldown","mgPlayed","rivalSeed","weeklyTarget","weeklyProgress","orbStage"])S[k]=d[k]||0;S.lastClaimDay=d.lastClaimDay||"";S.weeklyWeek=d.weeklyWeek||"";S.achieved=d.achieved||{};S.skills=d.skills||{};S.artifacts=d.artifacts||[];S.artifactDrops=d.artifactDrops||0;S.pChallenges=d.pChallenges||[];S.pChallengesDone=d.pChallengesDone||0;S.musicOn=d.musicOn||false;if(d.gens)d.gens.forEach((c,i)=>{if(S.gens[i])S.gens[i].count=c;});return d.ts?(Date.now()-d.ts)/1e3:0;}catch(e){return 0;}}

// =============================================================================
// OFFLINE
// =============================================================================
function applyOffline(elapsed){const cap=7200;elapsed=Math.min(elapsed,cap);S.wheelCooldown=Math.max(0,S.wheelCooldown-elapsed);S.mgCooldown=Math.max(0,S.mgCooldown-elapsed);const rate=totalRate();if(rate<=0||elapsed<60)return;const earned=rate*elapsed*artifactOffline();S.dust+=earned;S.lifetimeDust+=earned;S.allTimeDust+=earned;S.weeklyProgress+=earned;const div=document.createElement("div");div.className="offline-banner";const m=Math.floor(elapsed/60);div.innerHTML=`<h3>Welcome Back!</h3><p>+${fmt(earned)} Cash</p><p style="font-size:12px;color:#8badc9">${m} min${m!==1?"s":""} away</p><button onclick="this.parentElement.remove()">Collect</button>`;document.body.appendChild(div);}

// =============================================================================
// TAP HANDLING
// =============================================================================
const orbArea=document.getElementById("orbArea"),orb=document.getElementById("orb");
function doTap(x,y,isAuto){
  S.totalTaps++;runTaps++;if(!isAuto)addCombo();
  const isMega=rollMega(),isCrit=isMega||rollCrit();
  let amount=tapPower()*(isAuto?1:S.comboMultiplier);
  if(isMega)amount*=500;else if(isCrit)amount*=getCritMult();
  if(isCrit){S.critCount++;runCrits++;screenShake();screenFlash(isMega?"rgba(255,200,0,0.5)":"rgba(255,60,60,0.35)");SFX.crit();if(navigator.vibrate)navigator.vibrate(isMega?[60,30,60,30,60]:[40,20,60]);
    // Crit particles
    const pr=orbArea.getBoundingClientRect();spawnParticles(x+40,y+20,isMega?25:14,isMega?"rgba(255,200,0,0.9)":"rgba(255,80,80,0.8)",isMega?8:5,isMega?5:3);if(isMega)spawnRing(x+40,y+20,"rgba(255,200,0,0.6)");
  }else if(!isAuto){SFX.tap();if(navigator.vibrate)navigator.vibrate(20);
    // Tap particles
    const cm=S.comboMultiplier;const pc=cm>=5?"rgba(239,68,68,0.7)":cm>=2?"rgba(245,158,11,0.7)":"rgba(96,165,250,0.6)";
    spawnParticles(x+40,y+20,3+Math.floor(cm),pc,2+cm*.3,2);
  }
  S.dust+=amount;S.lifetimeDust+=amount;S.allTimeDust+=amount;S.weeklyProgress+=amount;
  if(S.challengeActive&&!isAuto)hitBoss();
  // Artifact drop chance: 0.15% per tap, higher at combo
  if(!isAuto)tryArtifactDrop(.0015*(1+S.comboMultiplier*.05));
  if(!isAuto||Math.random()<.1){const f=document.createElement("div");f.className=isCrit?"floater crit":"floater";f.textContent=(isMega?"MEGA +":isCrit?"CRIT +":"+")+fmt(amount);if(isMega)f.style.color="#fef08a";f.style.left=(x+(Math.random()*40-20))+"px";f.style.top=(y-20)+"px";orbArea.appendChild(f);setTimeout(()=>f.remove(),isCrit?900:800);}
}
// Tap on city area (replaces orb tap)
// Tap (single finger, no drag)
let tapStart=null,tapMoved=false;
orbArea.addEventListener("pointerdown",e=>{
  if(e.target.closest(".investor"))return;
  e.preventDefault();
  tapStart={x:e.clientX,y:e.clientY,t:Date.now()};tapMoved=false;
});
orbArea.addEventListener("pointermove",e=>{
  if(!tapStart)return;
  if(Math.abs(e.clientX-tapStart.x)>8||Math.abs(e.clientY-tapStart.y)>8)tapMoved=true;
});
orbArea.addEventListener("pointerup",e=>{
  if(tapStart&&!tapMoved&&Date.now()-tapStart.t<300){
    const r=orbArea.getBoundingClientRect();
    doTap(e.clientX-r.left-30,e.clientY-r.top,false);updateUI();checkAchievements();
  }
  tapStart=null;
});

// Pinch-zoom and pan via touch events
orbArea.addEventListener("touchstart",e=>{
  if(e.touches.length===2){
    e.preventDefault();
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    lastPinchDist=Math.sqrt(dx*dx+dy*dy);
  }else if(e.touches.length===1){
    isPanning=true;
    lastPanX=e.touches[0].clientX;lastPanY=e.touches[0].clientY;
  }
},{passive:false});
orbArea.addEventListener("touchmove",e=>{
  if(e.touches.length===2){
    e.preventDefault();
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(lastPinchDist>0){
      const scale=dist/lastPinchDist;
      camZoom=Math.max(camMinZoom,Math.min(camMaxZoom,camZoom*scale));
      lastCityHash=""; // force redraw
    }
    lastPinchDist=dist;
    isPanning=false;
  }else if(e.touches.length===1&&isPanning){
    const dx=e.touches[0].clientX-lastPanX;
    const dy=e.touches[0].clientY-lastPanY;
    camPanX+=dx/camZoom;camPanY+=dy/camZoom;
    lastPanX=e.touches[0].clientX;lastPanY=e.touches[0].clientY;
    lastCityHash=""; // force redraw
    tapMoved=true; // prevent tap
  }
},{passive:false});
orbArea.addEventListener("touchend",e=>{
  lastPinchDist=0;isPanning=false;
},{passive:false});
function updateOrbVisuals(){
  // Combo override: flash sky temporarily handled by screenFlash, not sky override
  // Day/night cycle handles sky via updateDayNight()
  renderCity();
}

// =============================================================================
// SHOP
// =============================================================================
const shop=document.getElementById("shop");
function buildShop(){
  let h="";
  // Wheel
  const wr=S.wheelCooldown<=0;
  h+=`<div class="btn wheel-btn${wr?" ready":""}" data-action="wheel"><div class="info"><div class="name">Lucky Wheel</div><div class="detail">${wr?"Free spin!":"CD: "+Math.ceil(S.wheelCooldown)+"s"}</div></div></div>`;
  // Mini-game
  const mr=S.mgCooldown<=0;
  h+=`<div class="btn mg-btn${mr?" ready":""}" data-action="minigame"><div class="info"><div class="name">Mini-Game</div><div class="detail">${mr?"Play now!":"CD: "+Math.ceil(S.mgCooldown)+"s"}</div></div></div>`;
  // Tap upgrade
  const tc=tapUpgradeCost();
  h+=`<div class="btn${S.dust<tc?" disabled":""}" data-action="tap"><div class="info"><div class="name">Tap Lv.${S.tapLevel+1}</div><div class="detail">+${fmt(tapPower())}/tap</div></div><div class="cost">${fmt(tc)}</div></div>`;
  h+=`<div class="section-title">GENERATORS</div>`;
  for(let i=0;i<S.gens.length;i++){const g=S.gens[i],c=genCost(i);h+=`<div class="btn${S.dust<c?" disabled":""}" data-action="gen" data-idx="${i}"><div class="info"><div class="name">${g.name} <span style="color:#8badc9">x${g.count}</span></div><div class="detail">+${fmt(g.baseRate*globalMult())}/s</div></div><div class="cost">${fmt(c)}</div></div>`;}
  // Prestige
  const pg=prestigeGain();
  if(pg>0)h+=`<div class="btn prestige" data-action="prestige"><div class="info"><div class="name">GO SUPERSTAR</div><div class="detail">+${fmt(pg)} Crystal${pg>1?"s":""}</div></div></div>`;
  // New City
  const ag=ascensionGain();
  if(ag>0)h+=`<div class="btn ascend" data-action="newcity"><div class="info"><div class="name">NEW CITY</div><div class="detail">Reset ALL for +${fmt(ag)} Mayor Points (+${fmt(ag*25)}% all)</div></div></div>`;
  // Prestige challenges
  if(S.pChallenges.length>0){
    h+=`<div class="section-title">RUN CHALLENGES</div>`;
    for(const c of S.pChallenges){
      h+=`<div class="challenge${c.completed?" done":""}"><div class="challenge-name">${c.completed?"\u2714 ":""}${c.name}</div><div class="challenge-desc">${c.desc}</div><div class="challenge-reward">${c.completed?"Completed!":"Reward: +"+c.reward+" CS"}</div></div>`;
    }
  }
  shop.innerHTML=h;
  document.getElementById("wheelNotif").style.display=wr?"block":"none";
}
shop.addEventListener("pointerdown",e=>{
  const btn=e.target.closest(".btn");if(!btn||btn.classList.contains("disabled"))return;
  const a=btn.dataset.action;
  if(a==="wheel"){document.getElementById("wheelOverlay").classList.add("show");document.getElementById("wheelSpinBtn").disabled=S.wheelCooldown>0;document.getElementById("wheelResult").textContent=S.wheelCooldown>0?"CD: "+Math.ceil(S.wheelCooldown)+"s":"";drawWheel();}
  else if(a==="minigame"){if(S.mgCooldown>0)return;if(Math.random()<.5)startStarCatch();else startPatternMemory();}
  else if(a==="tap"){const c=tapUpgradeCost();if(S.dust>=c){S.dust-=c;S.tapLevel++;SFX.buy();}}
  else if(a==="gen"){const i=parseInt(btn.dataset.idx),c=genCost(i);if(S.dust>=c){S.dust-=c;S.gens[i].count++;SFX.buy();}}
  else if(a==="prestige"){const g=prestigeGain();if(g<=0)return;if(!confirm("New District?\n+"+fmt(g)+" City Star(s)"))return;S.cityStars+=g;S.prestigeCount++;S.dust=0;S.lifetimeDust=0;S.tapLevel=0;S.gens.forEach(g=>g.count=0);S.comboCount=0;S.comboTimer=0;S.comboMultiplier=1;resetRunStats();rollPrestigeChallenges();tryArtifactDrop(1);screenFlash("rgba(255,200,100,0.5)");screenShake();SFX.prestige();showToast("NEW DISTRICT!","+"+fmt(g)+" Crystals");}
  else if(a==="newcity"){const g=ascensionGain();if(g<=0)return;if(!confirm("NEW CITY?\n\nResets EVERYTHING (dust, generators, city stars, skills).\nYou keep: Mayor Points, Achievements.\n\n+"+fmt(g)+" Mayor Points (+"+fmt(g*25)+"% permanent)"))return;S.mayorPoints+=g;S.ascensionCount++;S.dust=0;S.lifetimeDust=0;S.allTimeDust=0;S.cityStars=0;S.tapLevel=0;S.prestigeCount=0;S.gens.forEach(g=>g.count=0);S.skills={};S.comboCount=0;S.comboTimer=0;S.comboMultiplier=1;resetRunStats();rollPrestigeChallenges();tryArtifactDrop(1);screenFlash("rgba(56,189,248,0.5)");screenShake();SFX.ascend();showToast("NEW CITY!","+"+fmt(g)+" Mayor Points");}
  updateUI();checkAchievements();
});

// =============================================================================
// UI UPDATE
// =============================================================================
const dustVal=document.getElementById("dustVal"),rateVal=document.getElementById("rateVal"),novaInfo=document.getElementById("novaInfo");
function updateUI(){
  dustVal.textContent=fmt(S.dust);rateVal.textContent=fmt(totalRate())+"/s";
  let info=[];
  if(S.cityStars>0)info.push("NC:"+fmt(S.cityStars));
  if(S.mayorPoints>0)info.push("CE:"+fmt(S.mayorPoints)+" (+"+fmt(S.mayorPoints*25)+"%)");
  novaInfo.textContent=info.join(" | ");
  buildShop();
}

// =============================================================================
// GAME LOOP
// =============================================================================
let lastTick=performance.now(),achievTimer=0,autoAccum=0,orbStageTimer=0;
function tick(now){
  const dt=(now-lastTick)/1e3;lastTick=now;
  const rate=totalRate();
  if(rate>0){S.dust+=rate*dt;S.lifetimeDust+=rate*dt;S.allTimeDust+=rate*dt;S.weeklyProgress+=rate*dt;}
  // Auto-tap
  const ar=getAutoTapRate();
  if(ar>0){autoAccum+=dt;const t=Math.floor(autoAccum*ar);if(t>0){autoAccum-=t/ar;const cx=orbArea.getBoundingClientRect();for(let i=0;i<t;i++)doTap(cx.width/2-30+Math.random()*20,cx.height/2-20,true);}}
  // Burst buff
  const burst=S.buffs.find(b=>b.type==="autoburst");
  if(burst){const t=Math.floor(dt*burst.value);const cx=orbArea.getBoundingClientRect();for(let i=0;i<t;i++)doTap(cx.width/2-30+Math.random()*20,cx.height/2-20,true);}
  updateCombo(dt);updateBuffs(dt);updateBoss(dt);
  if(S.wheelCooldown>0)S.wheelCooldown=Math.max(0,S.wheelCooldown-dt);
  if(S.mgCooldown>0)S.mgCooldown=Math.max(0,S.mgCooldown-dt);
  // City + stage + day/night
  orbStageTimer+=dt;if(orbStageTimer>=3){orbStageTimer=0;updateOrbStage();}
  updateDayNight(dt);
  try{renderCity();}catch(e){console.error("renderCity:",e);}
  try{updateParticles(dt);}catch(e){}
  flickerWindows(dt);
  runTime+=dt;
  achievTimer+=dt;if(achievTimer>=2){achievTimer=0;checkAchievements();checkPrestigeChallenges();}
  updateUI();requestAnimationFrame(tick);
}

// =============================================================================
// INIT
// =============================================================================
window._dbg&&window._dbg("=== INIT START ===","#ff0");
const offlineSec=load();
window._dbg&&window._dbg("load() done, offline="+offlineSec+"s","#0ff");
initRivals();initWeekly();
if(offlineSec>0)applyOffline(offlineSec);
window._dbg&&window._dbg("applyOffline done","#0ff");
updateOrbStage();applyOrbVisuals();initCityStars();updateUI();
window._dbg&&window._dbg("updateUI done, canvas="+cCanvas?.width+"x"+cCanvas?.height,"#0ff");
// Force city render after layout is complete
setTimeout(()=>{
  window._dbg&&window._dbg("delayed renderCity: pCanvas="+pCanvas?.width+"x"+pCanvas?.height,"#ff0");
  cityNeedsRedraw=true;renderCity(true);
  window._dbg&&window._dbg("renderCity done","#0f0");
},100);
if(S.pChallenges.length===0)rollPrestigeChallenges();
if(S.musicOn){startMusic();musicToggle.textContent="MUSIC ON";musicToggle.classList.add("on");}
requestAnimationFrame(tick);
scheduleInvestor();scheduleBoss();
setTimeout(()=>checkDailyStreak(),500);
setInterval(save,15e3);
document.addEventListener("visibilitychange",()=>{if(document.hidden)save();});
</script>
