<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Creator Content Machine</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0f172a;font-family:'Segoe UI',system-ui,sans-serif;color:#fff}
#game{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;padding:8px 12px env(safe-area-inset-bottom)}

.top-bar{text-align:center;padding:4px 0}
.currency-name{font-size:9px;letter-spacing:4px;color:#94a3b8}
.currency-value{font-size:36px;font-weight:800;color:#f06292;text-shadow:0 0 20px rgba(240,98,146,.3);font-family:'Courier New',monospace}
.currency-value::before{content:'';font-size:20px;vertical-align:top;margin-right:2px;color:#e040fb}
.rate{font-size:11px;color:#e040fb;margin-top:1px}
.prestige-info{font-size:10px;color:#fbbf24;margin-top:1px}
.buff-bar{font-size:9px;color:#a78bfa;min-height:12px}

.combo-wrap{height:18px;display:flex;align-items:center;gap:6px;margin:2px 10px}
.combo-label{font-size:11px;font-weight:700;color:#fbbf24;min-width:36px}
.combo-track{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.combo-fill{height:100%;width:0%;background:linear-gradient(90deg,#fbbf24,#ef4444);border-radius:2px;transition:width .15s}
.combo-wrap.hidden{opacity:0}

.tap-area{height:100px;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;overflow:hidden}
.tap-circle{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#e040fb,#ab47bc);box-shadow:0 0 30px rgba(224,64,251,.3);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:transform .08s;z-index:2}
.tap-circle:active{transform:scale(.88)}
.tap-icon{font-size:20px}
.tap-label{font-size:9px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,.7)}
.floater{position:absolute;font-weight:700;pointer-events:none;z-index:10;animation:floatUp .7s ease-out forwards}
.floater.crit{font-size:24px;color:#fbbf24;text-shadow:0 0 10px rgba(251,191,36,.5);animation:floatUpCrit .8s ease-out forwards}
.floater:not(.crit){font-size:16px;color:#f06292}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
@keyframes floatUpCrit{0%{opacity:1;transform:translateY(0) scale(1.2)}100%{opacity:0;transform:translateY(-80px) scale(.8)}}

.screen-flash{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0}
@keyframes flash{0%{opacity:.4}100%{opacity:0}}
.shake{animation:shake .12s ease}
@keyframes shake{0%,100%{transform:translate(0)}25%{transform:translate(-3px,2px)}50%{transform:translate(2px,-2px)}75%{transform:translate(-2px,1px)}}

.sep{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);margin:3px 0}

.tab-bar{display:flex;gap:2px;margin-bottom:2px}
.tab{flex:1;padding:4px 0;text-align:center;font-size:9px;font-weight:600;color:#64748b;background:rgba(15,23,42,.6);border:1px solid rgba(30,41,59,.5);border-radius:6px;cursor:pointer;position:relative}
.tab.active{color:#fff;background:rgba(30,41,59,.8);border-color:rgba(240,98,146,.3)}
.tab-notif{position:absolute;top:2px;right:6px;width:5px;height:5px;border-radius:50%;background:#ef4444;display:none}
.tab-panel{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.tab-panel.active{display:flex;flex-direction:column}
.tab-panel::-webkit-scrollbar{display:none}
.biz-list{flex:1;overflow-y:auto;padding-bottom:8px}
.biz-list::-webkit-scrollbar{display:none}
.section-title{font-size:9px;letter-spacing:2px;color:#475569;text-align:center;margin:5px 0 2px}

/* Business card — the CORE visual */
.biz{width:100%;padding:8px 10px;margin-bottom:3px;background:rgba(30,41,59,.5);border:1px solid rgba(51,65,85,.4);border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;position:relative;overflow:hidden}
.biz:active{background:rgba(51,65,85,.5)}
.biz.locked{opacity:.25;pointer-events:none;filter:grayscale(1)}
.biz.ready{border-color:rgba(240,98,146,.6);background:rgba(20,60,30,.3)}
.biz.ready .biz-collect{display:block}
.biz-icon{font-size:22px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:rgba(15,23,42,.5);border-radius:8px;flex-shrink:0;position:relative}
.biz-mgr-badge{position:absolute;bottom:-2px;right:-2px;font-size:8px;background:#e040fb;border-radius:50%;width:14px;height:14px;display:flex;align-items:center;justify-content:center;display:none}
.biz.managed .biz-mgr-badge{display:flex}
.biz-body{flex:1;min-width:0}
.biz-top{display:flex;justify-content:space-between;align-items:center}
.biz-name{font-size:12px;font-weight:600}
.biz-count{font-size:10px;color:#94a3b8}
.biz-payout{font-size:10px;color:#e040fb;margin-top:1px}
.biz-milestone{font-size:8px;color:#fbbf24;margin-top:1px}
.biz-timer-bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;margin-top:4px;overflow:hidden}
.biz-timer-fill{height:100%;background:linear-gradient(90deg,#e040fb,#f06292);border-radius:3px;width:0%;transition:width .1s linear}
.biz.ready .biz-timer-fill{background:linear-gradient(90deg,#fbbf24,#f59e0b);width:100%!important}
.biz-cost{font-size:11px;color:#fbbf24;font-weight:600;flex-shrink:0;text-align:right}
.biz-cost-label{font-size:8px;color:#64748b}
.biz-collect{display:none;position:absolute;right:10px;top:50%;transform:translateY(-50%);background:#e040fb;color:#000;font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:1px;animation:pulse-collect 1s ease-in-out infinite}
@keyframes pulse-collect{0%,100%{transform:translateY(-50%) scale(1)}50%{transform:translateY(-50%) scale(1.1)}}
.biz-unlock{font-size:9px;color:#64748b;text-align:center;padding:4px}

/* Buy/AI Writer buttons */
.buy-row{display:flex;gap:3px;margin-bottom:3px}
.buy-btn{flex:1;padding:6px;text-align:center;border-radius:8px;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s}
.buy-btn.buy{background:rgba(224,64,251,.1);border:1px solid rgba(224,64,251,.3);color:#f06292}
.buy-btn.buy.disabled{opacity:.3;pointer-events:none}
.buy-btn.mgr{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);color:#a78bfa}
.buy-btn.mgr.disabled{opacity:.3;pointer-events:none}
.buy-btn.mgr.owned{background:rgba(224,64,251,.1);border-color:rgba(224,64,251,.3);color:#f06292}

/* Special buttons */
.btn-sp{width:100%;padding:8px;margin-bottom:3px;border-radius:8px;text-align:center;cursor:pointer;font-size:11px;font-weight:600}
.btn-ipo{background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.3);color:#a78bfa}
.btn-global{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.3);color:#60a5fa}
.btn-wheel{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);color:#fbbf24}
.btn-wheel.ready{animation:wpulse 2s ease-in-out infinite}
@keyframes wpulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 12px rgba(251,191,36,.2)}}
.btn-mini{background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.25);color:#38bdf8}

/* Skill/Achievement/Rival (same as before) */
.item{padding:7px 10px;margin-bottom:3px;background:rgba(30,41,59,.4);border:1px solid rgba(51,65,85,.3);border-radius:8px;display:flex;gap:8px;align-items:center}
.item.done{border-color:rgba(251,191,36,.3)}
.item.owned{border-color:rgba(240,98,146,.3);background:rgba(20,60,30,.15)}
.item.affordable{border-color:rgba(139,92,246,.4)}
.item-icon{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.item-info{flex:1}.item-name{font-size:11px;font-weight:600}.item-desc{font-size:9px;color:#94a3b8}
.item-val{font-size:10px;font-weight:600;color:#fbbf24;flex-shrink:0}
.item.owned .item-val{color:#f06292}
.item-bar{height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin-top:2px;overflow:hidden}
.item-bar-fill{height:100%;background:#e040fb;border-radius:2px}
.item.done .item-bar-fill{background:#fbbf24}

.weekly{padding:6px 10px;margin-bottom:3px;background:rgba(20,60,40,.3);border:1px solid rgba(240,98,146,.2);border-radius:8px;text-align:center;font-size:10px;color:#e040fb}
.weekly-bar{height:4px;background:rgba(255,255,255,.05);border-radius:2px;margin-top:3px;overflow:hidden}
.weekly-bar-fill{height:100%;background:#e040fb;border-radius:2px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#1e293b;border:1px solid rgba(51,65,85,.8);border-radius:14px;padding:18px;text-align:center;width:88%;max-width:300px}
.modal h3{font-size:15px;color:#f06292;margin-bottom:6px}
.modal .btn-p{padding:7px 20px;background:#e040fb;border:none;border-radius:6px;color:#000;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px}
.modal .btn-s{padding:5px 16px;background:transparent;border:1px solid rgba(100,116,139,.4);border-radius:6px;color:#94a3b8;font-size:11px;cursor:pointer;margin-top:6px;margin-left:4px}

.wheel-container{position:relative;width:180px;height:180px;margin:8px auto}
.wheel-canvas{width:180px;height:180px}
.wheel-pointer{position:absolute;top:-5px;left:50%;transform:translateX(-50%);border-left:7px solid transparent;border-right:7px solid transparent;border-top:12px solid #fbbf24;z-index:2}
.wheel-result{font-size:13px;font-weight:700;color:#f06292;margin:4px 0;min-height:18px}

.streak-days{display:flex;gap:3px;justify-content:center;margin:10px 0}
.streak-day{width:30px;height:36px;border-radius:5px;background:rgba(15,23,42,.6);border:1px solid rgba(51,65,85,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8px;color:#64748b}
.streak-day.claimed{border-color:rgba(251,191,36,.4);color:#fbbf24}
.streak-day.today{border-color:#fbbf24;box-shadow:0 0 5px rgba(251,191,36,.2)}

.toast{position:fixed;top:36px;left:50%;transform:translateX(-50%) translateY(-20px);background:#1e293b;border:1px solid rgba(251,191,36,.4);border-radius:10px;padding:6px 14px;text-align:center;z-index:100;opacity:0;pointer-events:none;transition:all .3s;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-title{font-size:11px;font-weight:700;color:#fbbf24}
.toast-desc{font-size:9px;color:#94a3b8}

.offline-banner{position:fixed;top:0;left:0;right:0;background:rgba(15,23,42,.97);border-bottom:1px solid rgba(240,98,146,.3);padding:14px;text-align:center;z-index:100;animation:slideDown .4s ease}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
@keyframes invBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

.drop-toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%) scale(0);background:#1e293b;border:2px solid;border-radius:12px;padding:8px 16px;text-align:center;z-index:110;transition:transform .3s;pointer-events:none}
.drop-toast.show{transform:translateX(-50%) scale(1)}
.drop-toast.common{border-color:#94a3b8}.drop-toast.rare{border-color:#38bdf8}.drop-toast.epic{border-color:#a855f7}.drop-toast.legendary{border-color:#f59e0b;box-shadow:0 0 15px rgba(245,158,11,.3)}
</style>
</head>
<body>
<div id="game">
  <div class="top-bar">
    <div class="currency-name">Followers</div>
    <div class="currency-value" id="dustVal">0</div>
    <div class="rate" id="rateVal">0/s</div>
    <div class="prestige-info" id="novaInfo"></div>
    <div class="buff-bar" id="buffBar"></div>
  </div>
  <div class="combo-wrap hidden" id="comboWrap">
    <div class="combo-label" id="comboLabel">x1</div>
    <div class="combo-track"><div class="combo-fill" id="comboFill"></div></div>
  </div>
  <div class="tap-area" id="orbArea">
    <div class="tap-circle" id="orb"><div class="tap-icon">📱</div><div class="tap-label">POST</div></div>
  </div>
  <div class="sep"></div>
  <div class="tab-bar">
    <div class="tab active" data-tab="shop">CONTENT<div class="tab-notif" id="wheelNotif"></div></div>
    <div class="tab" data-tab="skills">PERKS</div>
    <div class="tab" data-tab="rivals">RIVALS</div>
    <div class="tab" data-tab="more">MORE</div>
  </div>
  <div class="tab-panel active" data-panel="shop"><div class="biz-list" id="shop"></div></div>
  <div class="tab-panel" data-panel="skills"><div class="biz-list" id="skillList"></div></div>
  <div class="tab-panel" data-panel="rivals"><div class="biz-list" id="rivalList"></div></div>
  <div class="tab-panel" data-panel="more"><div class="biz-list" id="moreList"></div></div>
</div>
<div class="screen-flash" id="screenFlash"></div>
<div class="toast" id="toast"><div class="toast-title" id="toastTitle"></div><div class="toast-desc" id="toastDesc"></div></div>
<div class="drop-toast" id="dropToast"><div class="drop-icon" id="dropIcon"></div><div class="drop-name" id="dropName"></div><div class="drop-effect" id="dropEffect"></div></div>
<div class="modal-overlay" id="wheelOverlay"><div class="modal"><h3>CONTENT ROULETTE</h3><div class="wheel-container"><div class="wheel-pointer"></div><canvas class="wheel-canvas" id="wheelCanvas" width="180" height="180"></canvas></div><div class="wheel-result" id="wheelResult"></div><button class="btn-p" id="wheelSpinBtn">SPIN!</button><button class="btn-s" id="wheelClose">Close</button></div></div>
<div class="modal-overlay" id="streakOverlay"><div class="modal"><h3 id="streakTitle">Daily Upload!</h3><p id="streakSubtitle" style="font-size:11px;color:#94a3b8;margin-bottom:6px"></p><div class="streak-days" id="streakDays"></div><button class="btn-p" id="streakClaim">Claim</button></div></div>

<script>
// === DEBUG ===
(function(){
  const d=document.createElement("div");
  d.style.cssText="position:fixed;bottom:0;left:0;right:0;max-height:45%;overflow-y:auto;background:rgba(0,0,0,.95);color:#0f0;font:11px monospace;padding:8px;z-index:9999;display:none;user-select:text;-webkit-user-select:text";
  document.body.appendChild(d);
  const t=document.createElement("div");
  t.textContent="DBG";
  t.style.cssText="position:fixed;bottom:4px;right:4px;background:#ef4444;color:#fff;font:bold 10px sans-serif;padding:3px 7px;border-radius:4px;z-index:10000;cursor:pointer";
  document.body.appendChild(t);
  let v=false;
  t.addEventListener("click",()=>{v=!v;d.style.display=v?"block":"none";});
  function log(m,c){const e=document.createElement("div");e.style.cssText="color:"+(c||"#0f0")+";margin:1px 0;user-select:text;-webkit-user-select:text";e.textContent=new Date().toLocaleTimeString()+": "+m;d.appendChild(e);d.scrollTop=d.scrollHeight;if(d.children.length>150)d.removeChild(d.firstChild);}
  window._dbg=log;
  window.onerror=function(m,s,l,c,e){log("ERROR L"+l+": "+m,"#f44");return false;};
  window.addEventListener("unhandledrejection",function(e){log("PROMISE: "+e.reason,"#f84");});
  const oLog=console.log,oErr=console.error;
  console.log=function(){oLog.apply(console,arguments);log(Array.from(arguments).join(" "),"#0f0");};
  console.error=function(){oErr.apply(console,arguments);log(Array.from(arguments).join(" "),"#f44");};
  log("Debug ready","#0ff");
})();

// === BIZ CONFIG ===
const BIZ=[
{name:"Blog Post",icon:"D83DDCDD",baseCost:4,basePayout:1,baseTime:.6,unlock:0,mgrCost:100},
{name:"TikTok",icon:"D83DDCF1",baseCost:60,basePayout:15,baseTime:3,unlock:50,mgrCost:2e3},
{name:"YouTube Channel",icon:"D83CDFAC",baseCost:720,basePayout:100,baseTime:6,unlock:500,mgrCost:5e4},
{name:"Podcast",icon:"D83CDFA4",baseCost:8640,basePayout:1200,baseTime:12,unlock:5e3,mgrCost:5e5},
{name:"Merch Store",icon:"D83DDC55",baseCost:1036800,basePayout:1e4,baseTime:24,unlock:1e5,mgrCost:5e6},
{name:"Online Course",icon:"D83CDF93",baseCost:29859840,basePayout:1e5,baseTime:48,unlock:1e6,mgrCost:5e7},
{name:"Media Agency",icon:"D83CDFE2",baseCost:859963392,basePayout:1e6,baseTime:96,unlock:25e6,mgrCost:1e9},
];
const MILESTONES=[25,50,100,200,300,400];

// === STATE ===
const S={dust:0,lifetimeDust:0,allTimeDust:0,shares:0,legacy:0,
tapLevel:0,prestigeCount:0,ascensionCount:0,totalTaps:0,
gens:BIZ.map(()=>({count:0,timer:0,running:false})),
managers:BIZ.map(()=>false),
comboCount:0,comboTimer:0,comboMultiplier:1,
achieved:{},critCount:0,investorsCollected:0,
wheelCooldown:0,wheelSpins:0,buffs:[],
dailyStreak:0,lastClaimDay:"",todayClaimed:false,
skills:{},bossesHandled:0,
challengeActive:false,challengeHP:0,challengeMaxHP:0,challengeTimer:0,challengeReward:0,challengeName:"",
mgCooldown:0,mgPlayed:0,
rivalSeed:0,weeklyTarget:0,weeklyProgress:0,weeklyWeek:"",
artifacts:[],artifactDrops:0,pChallenges:[],pChallengesDone:0,
};

// === ACHIEVEMENTS ===
const ACHIEVEMENTS=[
{id:"tap100",name:"Getting Started",desc:"Tap 100x",check:()=>S.totalTaps>=100,bonus:.05,icon:"\uD83D\uDC4A"},
{id:"tap1k",name:"Hustler",desc:"Tap 1,000x",check:()=>S.totalTaps>=1e3,bonus:.1,icon:"\uD83D\uDD25"},
{id:"earn1k",name:"First 1K",desc:"Earn $1K",check:()=>S.allTimeDust>=1e3,bonus:.05,icon:"\uD83D\uDCB5"},
{id:"earn1m",name:"1M Followers",desc:"Earn $1M",check:()=>S.allTimeDust>=1e6,bonus:.1,icon:"\uD83D\uDCB0"},
{id:"earn1b",name:"1B Followers",desc:"Earn $1B",check:()=>S.allTimeDust>=1e9,bonus:.15,icon:"\uD83D\uDC8E"},
{id:"biz1",name:"First Post",desc:"Make your first post",check:()=>S.gens[0].count>=1,bonus:.05,icon:"D83CDFAC"},
{id:"biz50",name:"Content Machine",desc:"Own 50 content channels",check:()=>totalGens()>=50,bonus:.1,icon:"D83CDFE2"},
{id:"mgr1",name:"First Editor",desc:"Hire a manager",check:()=>S.managers.some(m=>m),bonus:.05,icon:"\uD83D\uDC68\u200D\uD83D\uDCBC"},
{id:"ipo1",name:"GO VIRAL!",desc:"Go viral",check:()=>S.prestigeCount>=1,bonus:.1,icon:"\uD83D\uDCC8"},
{id:"combo5",name:"Momentum",desc:"x5 combo",check:()=>S.comboMultiplier>=5,bonus:.05,icon:"\uD83D\uDD17"},
{id:"combo12",name:"UNSTOPPABLE",desc:"x12 combo",check:()=>S.comboMultiplier>=12,bonus:.15,icon:"\uD83C\uDF2A"},
{id:"crisis5",name:"PR Expert",desc:"Handle 5 crises",check:()=>S.bossesHandled>=5,bonus:.1,icon:"\uD83D\uDEE1"},
{id:"streak7",name:"Dedicated",desc:"7-day streak",check:()=>S.dailyStreak>=7,bonus:.15,icon:"\uD83D\uDCC5"},
{id:"global1",name:"Media Mogul",desc:"Go Global",check:()=>S.ascensionCount>=1,bonus:.2,icon:"\uD83C\uDF0D"},
];
function totalGens(){return S.gens.reduce((s,g)=>s+g.count,0);}
function checkAchievements(){for(const a of ACHIEVEMENTS)if(!S.achieved[a.id]&&a.check()){S.achieved[a.id]=true;showToast(a.name,a.desc+" | +"+(a.bonus*100)+"%");screenFlash("rgba(251,191,36,0.3)");SFX.achievement();}}

// === SFX ===
let audioCtx=null;
function ac(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume();return audioCtx;}
function osc(t,f,d,v,fe,dl){const c=ac(),tm=c.currentTime+(dl||0),o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.setValueAtTime(f,tm);if(fe)o.frequency.exponentialRampToValueAtTime(fe,tm+d*.8);g.gain.setValueAtTime(v,tm);g.gain.exponentialRampToValueAtTime(.001,tm+d);o.connect(g);g.connect(c.destination);o.start(tm);o.stop(tm+d);}
const SFX={
tap(){osc("sine",660+Math.random()*120,.08,.15,400);},
crit(){osc("sine",150,.2,.3,50);osc("triangle",1800,.15,.1,2400);},
comboUp(t){for(let i=0;i<3;i++)osc("square",500+t*80+i*150,.1,.07,0,i*.06);},
buy(){osc("triangle",880,.1,.12,1100);},
payout(){osc("sine",1200,.06,.1,800);osc("sine",1500,.06,.08,1000,.05);}, // cha-ching!
achievement(){[523,659,784,1047].forEach((f,i)=>osc("triangle",f,.2,.1,0,i*.1));},
prestige(){for(let i=0;i<5;i++)osc("sawtooth",100+i*50,.5,.04,2e3+i*200);setTimeout(()=>osc("sine",80,.5,.25,30),350);},
wheelSpin(){for(let i=0;i<12;i++)setTimeout(()=>osc("sine",400+i*50,.06,.05),i*(150+i*15));},

orb.addEventListener("pointerdown",e=>{e.preventDefault();const r=orbArea.getBoundingClientRect();doTap(e.clientX-r.left-15,e.clientY-r.top,false);checkAchievements();});

// === CONTENT PAYOUT & COLLECTION ===
function collectBiz(i){const g=S.gens[i];if(g.count===0||g.timer<bizTime(i))return;const payout=bizPayout(i);S.dust+=payout;S.lifetimeDust+=payout;S.allTimeDust+=payout;S.weeklyProgress+=payout;g.timer=0;g.running=S.managers[i]; // restart if managed
SFX.payout();if(navigator.vibrate)navigator.vibrate(10);checkUnlocks();}

let lastUnlockCheck="";
function checkUnlocks(){const nu=nextUnlock();if(nu>=0&&isUnlocked(nu)&&!lastUnlockCheck.includes(String(nu))){lastUnlockCheck+=nu;SFX.unlock();showToast("NEW CONTENT!",BIZ[nu].name+" unlocked!");screenFlash("rgba(240,98,146,0.3)");}}

// === SHOP ===
const shop=document.getElementById("shop");
function buildShop(){try{
  let h="";
  // Wheel & mini-game
  const wr=S.wheelCooldown<=0;
  h+=`<div class="btn-sp btn-wheel${wr?" ready":""}" data-a="wheel">${wr?"CONTENT ROULETTE":"Spin ("+Math.ceil(S.wheelCooldown)+"s)"}</div>`;
  // Tap upgrade
  const tc=tapUpgradeCost();
  h+=`<div class="buy-row"><div class="buy-btn buy${S.dust<tc?" disabled":""}" data-a="tap">Tap Lv.${S.tapLevel+1} — $${fmt(tc)}</div></div>`;
  h+=`<div class="section-title">YOUR CONTENT</div>`;
  // Business cards
  for(let i=0;i<BIZ.length;i++){
    const b=BIZ[i],g=S.gens[i];
    const unlocked=isUnlocked(i);
    const cost=bizCost(i);
    const canBuy=S.dust>=cost;
    const timeFull=g.count>0&&g.timer>=bizTime(i);
    const managed=S.managers[i];
    const nm=nextMilestone(i);
    const ms=milestoneMult(i);
    if(!unlocked){h+=`<div class="biz locked"><div class="biz-icon">\uD83D\uDD12</div><div class="biz-body"><div class="biz-top"><div class="biz-name">???</div></div><div class="biz-unlock">Unlock at $${fmt(b.unlock)} lifetime revenue</div></div></div>`;continue;}
    h+=`<div class="biz${timeFull?" ready":""}${managed?" managed":""}" data-biz="${i}">
      <div class="biz-icon">${b.icon}<div class="biz-mgr-badge">\uD83D\uDC64</div></div>
      <div class="biz-body">
        <div class="biz-top"><div class="biz-name">${b.name} <span class="biz-count">x${g.count}</span></div></div>
        <div class="biz-payout">${g.count>0?""+fmt(bizPayout(i))+" / "+bizTime(i).toFixed(1)+"s":""+fmt(b.basePayout)+" each"}</div>
        ${nm?`<div class="biz-milestone">${ms>1?ms+"x | ":""}Next ${ms+1}x at ${nm}</div>`:""}
        <div class="biz-timer-bar"><div class="biz-timer-fill" id="tf${i}" style="width:${g.count>0?(Math.min(g.timer/bizTime(i),1)*100):0}%"></div></div>
      </div>
      <div style="text-align:right">
        <div class="biz-cost">$${fmt(cost)}</div>
        <div class="biz-cost-label">${canBuy?"BUY":"need more"}</div>
      </div>
      ${timeFull?'<div class="biz-collect">COLLECT</div>':""}
    </div>`;
    // AI Writer button
    if(g.count>0&&!managed){
      h+=`<div class="buy-row"><div class="buy-btn mgr${S.dust<b.mgrCost?" disabled":""}" data-a="mgr" data-i="${i}">\uD83D\uDC64 Hire AI Writer — $${fmt(b.mgrCost)}</div></div>`;
    }
  }
  // Prestige
  const pg=prestigeGain();
  if(pg>0)h+=`<div class="btn-sp btn-ipo" data-a="ipo">GO VIRAL! +${fmt(pg)} Share${pg>1?"s":""} (+${fmt(pg*10)}%)</div>`;
  const ag=ascensionGain();
  if(ag>0)h+=`<div class="btn-sp btn-global" data-a="global">START A NETWORK +${fmt(ag)} Influence (+${fmt(ag*25)}%)</div>`;
  shop.innerHTML=h;
  document.getElementById("wheelNotif").style.display=wr?"block":"none";
}catch(e){window._dbg("buildShop CRASH: "+e.message+" "+e.stack,"#f44");shop.innerHTML='<div style="color:#ef4444;padding:10px;font-size:11px">Error: '+e.message+'</div>';}}
shop.addEventListener("pointerdown",e=>{
  // Collect payout
  const biz=e.target.closest("[data-biz]");
  if(biz){const i=parseInt(biz.dataset.biz);const g=S.gens[i];
    // If clicking the cost/buy area, or business has 0 count — buy it
    const clickedCost=e.target.closest(".biz-cost")||e.target.closest(".biz-cost-label");
    if(clickedCost||g.count===0){
      const c=bizCost(i);
      if(S.dust>=c){S.dust-=c;g.count++;if(g.count===1)g.running=true;SFX.buy();checkUnlocks();}
    }
    // Otherwise start/collect timer
    else if(g.timer>=bizTime(i)){collectBiz(i);}
    else if(!g.running&&g.count>0){g.running=true;g.timer=0;}
    return;}
  const btn=e.target.closest("[data-a]");if(!btn)return;
  const a=btn.dataset.a;
  if(a==="wheel"){document.getElementById("wheelOverlay").classList.add("show");document.getElementById("wheelSpinBtn").disabled=S.wheelCooldown>0;document.getElementById("wheelResult").textContent="";drawW();}
  else if(a==="tap"){const c=tapUpgradeCost();if(S.dust>=c){S.dust-=c;S.tapLevel++;SFX.buy();}}
  else if(a==="mgr"){const i=parseInt(btn.dataset.i);if(S.dust>=BIZ[i].mgrCost){S.dust-=BIZ[i].mgrCost;S.managers[i]=true;S.gens[i].running=true;SFX.achievement();showToast("AI Writer Hired!",BIZ[i].name+" auto-posts!");}}
  else if(a==="hire"){const i=parseInt(btn.dataset.i);const c=employeeCost(i);if(S.gens[i].employees<BIZ[i].maxEmployees&&S.dust>=c){S.dust-=c;S.gens[i].employees++;SFX.buy();showToast("Employee Hired!",BIZ[i].name+" +15% speed");}}
  else if(a==="reloc"){const i=parseInt(btn.dataset.i);const g=S.gens[i];if(g.location<LOCATIONS.length-1){const c=BIZ[i].baseCost*RELOCATE_COST_MULT*Math.pow(3,g.location);if(S.dust>=c){S.dust-=c;g.location++;SFX.achievement();showToast("Relocated!",BIZ[i].name+" \u2192 "+LOCATIONS[g.location].name+" ("+LOCATIONS[g.location].mult+"x revenue)");}}}
  else if(btn.closest("[data-a='buy']")){const i=parseInt(btn.dataset.i);const c=bizCost(i);if(S.dust>=c){S.dust-=c;S.gens[i].count++;if(S.gens[i].count===1)S.gens[i].running=true;SFX.buy();checkUnlocks();}}
  else if(a==="ipo"){const g=prestigeGain();if(!confirm("GO VIRAL?\n+"+fmt(g)+" Clout"))return;S.shares+=g;S.prestigeCount++;S.dust=0;S.lifetimeDust=0;S.tapLevel=0;S.gens.forEach(g=>{g.count=0;g.timer=0;g.running=false;});S.managers=BIZ.map(()=>false);S.comboCount=0;S.comboTimer=0;S.comboMultiplier=1;SFX.prestige();showToast("GO VIRAL!","+"+fmt(g)+" Clout");tryDrop(1);}
  else if(a==="global"){const g=ascensionGain();if(!confirm("START A NETWORK?\nResets ALL.\n+"+fmt(g)+" Influence"))return;S.legacy+=g;S.ascensionCount++;S.dust=0;S.lifetimeDust=0;S.allTimeDust=0;S.shares=0;S.tapLevel=0;S.prestigeCount=0;S.gens.forEach(g=>{g.count=0;g.timer=0;g.running=false;});S.managers=BIZ.map(()=>false);S.skills={};SFX.ascend();showToast("GLOBAL!","+"+fmt(g)+" Influence");tryDrop(1);}
  checkAchievements();
});

// === OTHER TABS ===
function buildSkills(){const el=document.getElementById("skillList");let h=`<div class="section-title">SHARES: ${fmt(S.shares)}</div>`;for(const sk of SKILLS){const owned=hs(sk.id),locked=sk.req&&!hs(sk.req),can=!owned&&!locked&&S.shares>=sk.cost;h+=`<div class="item${owned?" owned":""}${can?" affordable":""}${locked?" locked":""}" data-sk="${sk.id}"><div class="item-icon">${sk.icon}</div><div class="item-info"><div class="item-name">${sk.name}</div><div class="item-desc">${sk.desc}</div></div><div class="item-val">${owned?"OWNED":sk.cost}</div></div>`;}el.innerHTML=h;}
document.getElementById("skillList").addEventListener("pointerdown",e=>{const el=e.target.closest("[data-sk]");if(!el)return;const id=el.dataset.sk,sk=SKILLS.find(s=>s.id===id);if(!sk||hs(id)||(sk.req&&!hs(sk.req))||S.shares<sk.cost)return;S.shares-=sk.cost;S.skills[id]=true;SFX.achievement();showToast("Perk!",sk.name);buildSkills();save();});

const RIVALS=["TikTokTina","VlogKing","PodcastPro","ReelsMaster","StreamerKid"];
function initRivals(){if(!S.rivalSeed)S.rivalSeed=Date.now();}
function initWeekly(){const w="w"+Math.floor(Date.now()/(7*864e5));if(S.weeklyWeek!==w){S.weeklyWeek=w;S.weeklyProgress=0;S.weeklyTarget=Math.max(1e4,S.allTimeDust*.5)||1e4;}}
function buildRivals(){const el=document.getElementById("rivalList");let h="";initWeekly();const wp=Math.min(S.weeklyProgress/S.weeklyTarget,1);h+=`<div class="weekly">${wp>=1?"COMPLETE!":"WEEKLY: $"+fmt(S.weeklyTarget)}<div class="weekly-bar"><div class="weekly-bar-fill" style="width:${wp*100}%"></div></div></div>`;h+=`<div class="section-title">LEADERBOARD</div>`;const now=Date.now(),el2=(now-S.rivalSeed)/1e3;const rivals=RIVALS.map((n,i)=>{const r=[.3,.6,1,1.5,.8][i],b=[500,2e3,8e3,5e4,1e3][i];return{name:n,dust:b+el2*r*Math.pow(1.02,el2/3600)*b*.01};});const all=[...rivals,{name:"YOU",dust:S.allTimeDust,isYou:true}];all.sort((a,b)=>b.dust-a.dust);all.forEach((r,i)=>{h+=`<div class="item${r.isYou?" owned":""}"><div class="item-icon" style="font-size:14px;font-weight:700;color:${r.isYou?"#f06292":"#64748b"}">#${i+1}</div><div class="item-info"><div class="item-name">${r.name}</div><div class="item-desc">$${fmt(r.dust)}</div></div></div>`;});el.innerHTML=h;}

function buildMore(){const el=document.getElementById("moreList");let h=`<div class="section-title">ARTIFACTS (${S.artifacts.length})</div>`;if(!S.artifacts.length)h+=`<div style="text-align:center;font-size:10px;color:#475569;padding:6px">Tap to find artifacts!</div>`;const ac={};for(const a of S.artifacts){const k=a.name;ac[k]=(ac[k]||{...a,count:0});ac[k].count++;}Object.values(ac).forEach(a=>{h+=`<div class="item"><div class="item-icon">${a.icon}</div><div class="item-info"><div class="item-name">${a.name}${a.count>1?" x"+a.count:""}</div><div class="item-desc">${a.desc}</div></div></div>`;});h+=`<div class="section-title">ACHIEVEMENTS (+${((achievBonus()-1)*100).toFixed(0)}%)</div>`;for(const a of ACHIEVEMENTS)h+=`<div class="item${S.achieved[a.id]?" done":""}"><div class="item-icon">${a.icon}</div><div class="item-info"><div class="item-name">${a.name}</div><div class="item-desc">${a.desc}</div></div></div>`;el.innerHTML=h;}

// === UI ===
const dustVal=document.getElementById("dustVal"),rateVal=document.getElementById("rateVal"),novaInfo=document.getElementById("novaInfo");

// === GAME LOOP ===
let lastTick=performance.now(),achievTimer=0,autoAccum=0;
function tick(now){const dt=(now-lastTick)/1e3;lastTick=now;
// Business timers
for(let i=0;i<BIZ.length;i++){const g=S.gens[i];if(g.count>0&&g.running){g.timer+=dt;if(g.timer>=bizTime(i)){if(S.managers[i]){collectBiz(i);}else{g.timer=bizTime(i);g.running=false;}}}}
// Update timer bars directly (avoid full rebuild for perf)
for(let i=0;i<BIZ.length;i++){const g=S.gens[i];const bar=document.getElementById("tf"+i);if(bar&&g.count>0){bar.style.width=(Math.min(g.timer/bizTime(i),1)*100)+"%";}}
// Auto-tap
const ar=getAutoTapRate();if(ar>0){autoAccum+=dt;const t=Math.floor(autoAccum*ar);if(t>0){autoAccum-=t/ar;const cx=orbArea.getBoundingClientRect();for(let i=0;i<t;i++)doTap(cx.width/2,cx.height/2,true);}}
// Burst buff
const burst=S.buffs.find(b=>b.type==="autoburst");if(burst){const t=Math.floor(dt*burst.value);const cx=orbArea.getBoundingClientRect();for(let i=0;i<t;i++)doTap(cx.width/2,cx.height/2,true);}
// Salary deduction
if(sal>0&&S.dust>0)S.dust=Math.max(0,S.dust-sal);
// Reputation & demand
updateCombo(dt);updateBuffs(dt);updateBoss(dt);
if(S.wheelCooldown>0)S.wheelCooldown=Math.max(0,S.wheelCooldown-dt);
if(S.mgCooldown>0)S.mgCooldown=Math.max(0,S.mgCooldown-dt);
achievTimer+=dt;if(achievTimer>=2){achievTimer=0;checkAchievements();checkUnlocks();}
updateUI();requestAnimationFrame(tick);}

// === INIT ===
window._dbg("=== INIT START ===","#ff0");
try{
const offlineSec=load();
window._dbg("load done, offline="+offlineSec+"s","#0ff");
initRivals();initWeekly();
if(offlineSec>0)applyOffline(offlineSec);
for(let i=0;i<BIZ.length;i++)if(S.managers[i]&&S.gens[i].count>0)S.gens[i].running=true;
window._dbg("calling updateUI...","#0ff");
updateUI();
window._dbg("updateUI done, starting loop","#0f0");
requestAnimationFrame(tick);
}catch(e){window._dbg("INIT CRASH: "+e.message+" at "+e.stack,"#f44");}
schedInv();schedBoss();
setTimeout(()=>checkStreak(),500);
setInterval(save,15e3);
document.addEventListener("visibilitychange",()=>{if(document.hidden)save();});
</script>
</body>
