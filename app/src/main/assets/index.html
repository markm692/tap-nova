<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tap Empire</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0f172a;font-family:'Segoe UI',system-ui,sans-serif;color:#fff}
#game{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;padding:8px 12px env(safe-area-inset-bottom)}

/* Top bar */
.top-bar{text-align:center;padding:6px 0;background:linear-gradient(180deg,rgba(15,23,42,.9),transparent);position:relative;z-index:5}
.currency-name{font-size:10px;letter-spacing:4px;color:#94a3b8;text-transform:uppercase}
.currency-value{font-size:38px;font-weight:800;color:#4ade80;text-shadow:0 0 30px rgba(74,222,128,.3);font-family:'Courier New',monospace}
.currency-value::before{content:'$';font-size:22px;vertical-align:top;margin-right:2px;color:#22c55e}
.rate{font-size:12px;color:#22c55e;margin-top:2px}
.prestige-info{font-size:10px;color:#fbbf24;margin-top:2px}
.buff-bar{font-size:9px;color:#a78bfa;margin-top:2px;min-height:12px}

/* Tap area */
.tap-area{flex:1.2;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;overflow:hidden;min-height:0}
.tap-circle{width:140px;height:140px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 0 40px rgba(34,197,94,.3),0 0 80px rgba(34,197,94,.1),inset 0 -4px 15px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;flex-direction:column;transition:transform .08s;position:relative;z-index:2}
.tap-circle:active{transform:scale(.9)}
.tap-icon{font-size:36px}
.tap-label{font-size:11px;font-weight:700;letter-spacing:2px;margin-top:4px;color:rgba(255,255,255,.8)}
.tap-amount{position:absolute;bottom:-20px;font-size:10px;color:#86efac;opacity:.7}
.floater{position:absolute;font-weight:700;pointer-events:none;z-index:10;animation:floatUp .8s ease-out forwards}
.floater.crit{font-size:28px;color:#fbbf24;text-shadow:0 0 12px rgba(251,191,36,.6);animation:floatUpCrit .9s ease-out forwards}
.floater:not(.crit){font-size:18px;color:#4ade80;text-shadow:0 0 8px rgba(74,222,128,.4)}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-80px)}}
@keyframes floatUpCrit{0%{opacity:1;transform:translateY(0) scale(1.3)}100%{opacity:0;transform:translateY(-100px) scale(.8)}}

/* Combo */
.combo-wrap{height:20px;display:flex;align-items:center;gap:6px;margin:2px 10px}
.combo-label{font-size:12px;font-weight:700;color:#fbbf24;min-width:36px}
.combo-track{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.combo-fill{height:100%;width:0%;background:linear-gradient(90deg,#fbbf24,#ef4444);border-radius:2px;transition:width .15s}
.combo-wrap.hidden{opacity:0}

/* Screen effects */
.screen-flash{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0}
@keyframes flash{0%{opacity:.4}100%{opacity:0}}
.shake{animation:shake .15s ease}
@keyframes shake{0%,100%{transform:translate(0)}25%{transform:translate(-3px,2px)}50%{transform:translate(2px,-2px)}75%{transform:translate(-2px,1px)}}

.sep{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);margin:4px 0}

/* Tabs */
.tab-bar{display:flex;gap:2px;margin-bottom:3px}
.tab{flex:1;padding:5px 0;text-align:center;font-size:10px;font-weight:600;letter-spacing:.5px;color:#64748b;background:rgba(15,23,42,.6);border:1px solid rgba(30,41,59,.5);border-radius:6px;cursor:pointer;position:relative;transition:all .15s}
.tab.active{color:#fff;background:rgba(30,41,59,.8);border-color:rgba(74,222,128,.3)}
.tab-notif{position:absolute;top:2px;right:6px;width:6px;height:6px;border-radius:50%;background:#ef4444;display:none}
.tab-panel{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.tab-panel.active{display:flex;flex-direction:column}
.tab-panel::-webkit-scrollbar{display:none}

/* Business cards */
.biz-list{flex:1;overflow-y:auto;padding-bottom:10px}
.biz-list::-webkit-scrollbar{display:none}
.section-title{font-size:9px;letter-spacing:2px;color:#475569;text-align:center;margin:6px 0 3px}

.biz-card{width:100%;padding:10px 12px;margin-bottom:4px;background:rgba(30,41,59,.6);border:1px solid rgba(51,65,85,.5);border-radius:10px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px}
.biz-card:active{background:rgba(51,65,85,.6)}
.biz-card.disabled{opacity:.3;pointer-events:none}
.biz-card.affordable{border-color:rgba(74,222,128,.3)}
.biz-icon{font-size:24px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(15,23,42,.5);border-radius:8px;flex-shrink:0}
.biz-info{flex:1;min-width:0}
.biz-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.biz-count{color:#94a3b8;font-weight:400;font-size:11px}
.biz-rate{font-size:10px;color:#22c55e;margin-top:1px}
.biz-progress{height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin-top:4px;overflow:hidden}
.biz-progress-fill{height:100%;background:linear-gradient(90deg,#22c55e,#4ade80);border-radius:2px;transition:width .1s}
.biz-cost{font-size:12px;color:#fbbf24;font-weight:600;flex-shrink:0}

/* Special buttons */
.btn-special{width:100%;padding:10px;margin-bottom:4px;border-radius:10px;text-align:center;cursor:pointer;font-weight:600;transition:all .15s}
.btn-ipo{background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.4);color:#a78bfa}
.btn-global{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.4);color:#60a5fa}
.btn-wheel{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:#fbbf24}
.btn-wheel.ready{animation:pulse-glow 2s ease-in-out infinite}
@keyframes pulse-glow{0%,100%{box-shadow:none}50%{box-shadow:0 0 15px rgba(251,191,36,.2)}}
.btn-mini{background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.3);color:#38bdf8}

/* Achievements */
.achiev{padding:8px 10px;margin-bottom:3px;background:rgba(30,41,59,.4);border:1px solid rgba(51,65,85,.3);border-radius:8px;display:flex;gap:8px;align-items:center}
.achiev.done{border-color:rgba(251,191,36,.3);background:rgba(60,40,10,.2)}
.achiev-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.achiev-info{flex:1}
.achiev-name{font-size:11px;font-weight:600}
.achiev-desc{font-size:9px;color:#94a3b8}
.achiev-bar{height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin-top:3px;overflow:hidden}
.achiev-bar-fill{height:100%;background:linear-gradient(90deg,#22c55e,#4ade80);border-radius:2px}
.achiev.done .achiev-bar-fill{background:linear-gradient(90deg,#f59e0b,#fbbf24)}

/* Skills */
.skill{padding:8px 10px;margin-bottom:3px;background:rgba(30,41,59,.4);border:1px solid rgba(51,65,85,.3);border-radius:8px;display:flex;gap:8px;align-items:center;cursor:pointer}
.skill.owned{border-color:rgba(74,222,128,.3);background:rgba(20,60,30,.2)}
.skill.affordable{border-color:rgba(139,92,246,.4)}
.skill-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.skill-info{flex:1}
.skill-name{font-size:11px;font-weight:600}
.skill-desc{font-size:9px;color:#94a3b8}
.skill-cost{font-size:10px;color:#a78bfa;font-weight:600}
.skill.owned .skill-cost{color:#4ade80}

/* Challenges */
.challenge{padding:6px 10px;margin-bottom:3px;background:rgba(30,41,59,.4);border:1px solid rgba(51,65,85,.3);border-radius:8px}
.challenge.done{border-color:rgba(74,222,128,.3)}
.challenge-name{font-size:11px;font-weight:600}
.challenge-desc{font-size:9px;color:#94a3b8}

/* Rivals */
.rival{padding:6px 10px;margin-bottom:3px;background:rgba(30,41,59,.4);border:1px solid rgba(51,65,85,.3);border-radius:8px;display:flex;gap:8px;align-items:center}
.rival.you{border-color:rgba(74,222,128,.3)}
.rival-rank{font-size:16px;font-weight:700;width:26px;text-align:center;color:#64748b}
.rival.you .rival-rank{color:#4ade80}
.rival-name{font-size:11px;font-weight:600}
.rival-dust{font-size:9px;color:#94a3b8}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#1e293b;border:1px solid rgba(51,65,85,.8);border-radius:16px;padding:20px;text-align:center;width:88%;max-width:320px}
.modal h3{font-size:16px;color:#4ade80;margin-bottom:8px}
.modal button{padding:8px 24px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.modal .btn-primary{background:#22c55e;color:#000}
.modal .btn-secondary{background:transparent;border:1px solid rgba(100,116,139,.5);color:#94a3b8;margin-left:6px}

/* Wheel */
.wheel-container{position:relative;width:200px;height:200px;margin:10px auto}
.wheel-canvas{width:200px;height:200px}
.wheel-pointer{position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:14px solid #fbbf24;z-index:2}
.wheel-result{font-size:14px;font-weight:700;color:#4ade80;margin:6px 0;min-height:20px}

/* Streak */
.streak-days{display:flex;gap:4px;justify-content:center;margin:12px 0}
.streak-day{width:34px;height:40px;border-radius:6px;background:rgba(15,23,42,.6);border:1px solid rgba(51,65,85,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8px;color:#64748b}
.streak-day.claimed{border-color:rgba(251,191,36,.4);color:#fbbf24}
.streak-day.today{border-color:#fbbf24;box-shadow:0 0 6px rgba(251,191,36,.2)}
.streak-day .day-num{font-weight:700;font-size:10px}

/* Toast */
.toast{position:fixed;top:40px;left:50%;transform:translateX(-50%) translateY(-20px);background:#1e293b;border:1px solid rgba(251,191,36,.4);border-radius:10px;padding:8px 16px;text-align:center;z-index:100;opacity:0;pointer-events:none;transition:all .3s ease;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-title{font-size:12px;font-weight:700;color:#fbbf24}
.toast-desc{font-size:9px;color:#94a3b8;margin-top:1px}

/* Offline */
.offline-banner{position:fixed;top:0;left:0;right:0;background:rgba(15,23,42,.97);border-bottom:1px solid rgba(74,222,128,.3);padding:16px;text-align:center;z-index:100;animation:slideDown .4s ease}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
.offline-banner h3{color:#4ade80;font-size:15px}
.offline-banner p{color:#fbbf24;font-size:16px;font-family:'Courier New',monospace}
.offline-banner button{margin-top:8px;padding:6px 24px;background:#22c55e;border:none;border-radius:6px;color:#000;font-size:13px;font-weight:600;cursor:pointer}

/* Weekly */
.weekly{padding:6px 10px;margin-bottom:4px;background:rgba(20,60,40,.3);border:1px solid rgba(74,222,128,.2);border-radius:8px;text-align:center}
.weekly-bar{height:4px;background:rgba(255,255,255,.05);border-radius:2px;margin-top:3px;overflow:hidden}
.weekly-bar-fill{height:100%;background:linear-gradient(90deg,#22c55e,#4ade80);border-radius:2px}

/* Artifact drop */
.drop-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) scale(0);background:#1e293b;border:2px solid;border-radius:12px;padding:10px 20px;text-align:center;z-index:110;transition:transform .3s ease;pointer-events:none}
.drop-toast.show{transform:translateX(-50%) scale(1)}
.drop-toast.common{border-color:#94a3b8}
.drop-toast.rare{border-color:#38bdf8}
.drop-toast.epic{border-color:#a855f7}
.drop-toast.legendary{border-color:#f59e0b;box-shadow:0 0 20px rgba(245,158,11,.3)}
.drop-icon{font-size:24px}
.drop-name{font-size:13px;font-weight:700;margin-top:2px}
.drop-effect{font-size:9px;color:#94a3b8;margin-top:1px}

/* DBG */
#dbg{position:fixed;bottom:0;left:0;right:0;max-height:40%;overflow-y:auto;background:rgba(0,0,0,.95);color:#0f0;font:10px monospace;padding:6px;z-index:9999;display:none}
#dbgToggle{position:fixed;bottom:4px;right:4px;background:#ef4444;color:#fff;font:bold 9px sans-serif;padding:2px 5px;border-radius:4px;z-index:10000;cursor:pointer}
</style>
</head>
<body>
<div id="game">
  <div class="top-bar">
    <div class="currency-name">Revenue</div>
    <div class="currency-value" id="dustVal">0</div>
    <div class="rate" id="rateVal">$0/s</div>
    <div class="prestige-info" id="novaInfo"></div>
    <div class="buff-bar" id="buffBar"></div>
  </div>

  <div class="combo-wrap hidden" id="comboWrap">
    <div class="combo-label" id="comboLabel">x1</div>
    <div class="combo-track"><div class="combo-fill" id="comboFill"></div></div>
  </div>

  <div class="tap-area" id="orbArea">
    <div class="tap-circle" id="orb">
      <div class="tap-icon">$</div>
      <div class="tap-label">TAP</div>
    </div>
  </div>

  <div class="sep"></div>

  <div class="tab-bar">
    <div class="tab active" data-tab="shop">BUSINESS<div class="tab-notif" id="wheelNotif"></div></div>
    <div class="tab" data-tab="skills">PERKS</div>
    <div class="tab" data-tab="rivals">RIVALS</div>
    <div class="tab" data-tab="more">MORE</div>
  </div>

  <div class="tab-panel active" data-panel="shop"><div class="biz-list" id="shop"></div></div>
  <div class="tab-panel" data-panel="skills"><div class="biz-list" id="skillList"></div></div>
  <div class="tab-panel" data-panel="rivals"><div class="biz-list" id="rivalList"></div></div>
  <div class="tab-panel" data-panel="more"><div class="biz-list" id="moreList"></div></div>
</div>

<div id="dbg"></div><div id="dbgToggle">DBG</div>
<div class="screen-flash" id="screenFlash"></div>
<div class="toast" id="toast"><div class="toast-title" id="toastTitle"></div><div class="toast-desc" id="toastDesc"></div></div>
<div class="drop-toast" id="dropToast"><div class="drop-icon" id="dropIcon"></div><div class="drop-name" id="dropName"></div><div class="drop-effect" id="dropEffect"></div></div>

<div class="modal-overlay" id="wheelOverlay"><div class="modal"><h3>LUCKY SPIN</h3><div class="wheel-container"><div class="wheel-pointer"></div><canvas class="wheel-canvas" id="wheelCanvas" width="200" height="200"></canvas></div><div class="wheel-result" id="wheelResult"></div><button class="btn-primary" id="wheelSpinBtn">SPIN!</button><br><button class="btn-secondary" id="wheelClose">Close</button></div></div>
<div class="modal-overlay" id="streakOverlay"><div class="modal"><h3 id="streakTitle">Daily Bonus!</h3><p id="streakSubtitle" style="font-size:12px;color:#94a3b8;margin-bottom:8px"></p><div class="streak-days" id="streakDays"></div><button class="btn-primary" id="streakClaim">Claim</button></div></div>
<div class="modal-overlay" id="mgOverlay"><div class="modal"><h3 id="mgTitle"></h3><p id="mgSubtitle" style="font-size:12px;color:#94a3b8"></p><div id="mgArea" style="width:240px;height:240px;margin:8px auto;border:1px solid rgba(51,65,85,.5);border-radius:12px;position:relative;overflow:hidden"></div><div id="mgScore" style="font-size:14px;color:#fbbf24;margin-top:6px"></div><div id="mgTimer" style="font-size:12px;color:#94a3b8"></div><div id="mgResult" style="font-size:16px;font-weight:700;margin-top:8px"></div><button class="btn-primary" id="mgClose" style="display:none">Collect</button></div></div>

<script>
// =============================================================================
// DEBUG
// =============================================================================
(function(){const d=document.getElementById("dbg"),t=document.getElementById("dbgToggle");let v=false;t.addEventListener("click",()=>{v=!v;d.style.display=v?"block":"none";});function log(m,c){const e=document.createElement("div");e.style.color=c||"#0f0";e.textContent=new Date().toLocaleTimeString()+": "+m;d.appendChild(e);d.scrollTop=d.scrollHeight;if(d.children.length>80)d.removeChild(d.firstChild);}window._dbg=log;window.onerror=function(m,s,l){log("ERR: "+m+" (L"+l+")","#f44");return false;};log("Debug ready","#0ff");})();

// =============================================================================
// ACHIEVEMENTS (must be before achievBonus)
// =============================================================================
const ACHIEVEMENTS=[
{id:"tap100",name:"Getting Started",desc:"Tap 100 times",check:()=>S.totalTaps>=100,bonus:.05,icon:"\uD83D\uDC4A"},
{id:"tap1k",name:"Hustler",desc:"Tap 1,000 times",check:()=>S.totalTaps>=1e3,bonus:.1,icon:"\uD83D\uDD25"},
{id:"tap10k",name:"Workaholic",desc:"Tap 10,000 times",check:()=>S.totalTaps>=1e4,bonus:.15,icon:"\uD83D\uDCAA"},
{id:"earn1k",name:"First Thousand",desc:"Earn $1K total",check:()=>S.allTimeDust>=1e3,bonus:.05,icon:"\uD83D\uDCB5"},
{id:"earn1m",name:"Millionaire",desc:"Earn $1M total",check:()=>S.allTimeDust>=1e6,bonus:.1,icon:"\uD83D\uDCB0"},
{id:"earn1b",name:"Billionaire",desc:"Earn $1B total",check:()=>S.allTimeDust>=1e9,bonus:.15,icon:"\uD83D\uDC8E"},
{id:"biz1",name:"First Business",desc:"Buy a business",check:()=>S.gens[0].count>=1,bonus:.05,icon:"\uD83C\uDFEA"},
{id:"biz50",name:"Empire Builder",desc:"Own 50 businesses",check:()=>totalGens()>=50,bonus:.1,icon:"\uD83C\uDFD7\uFE0F"},
{id:"crit10",name:"Lucky Deals",desc:"Land 10 crits",check:()=>S.critCount>=10,bonus:.05,icon:"\uD83C\uDFAF"},
{id:"crit100",name:"Deal Machine",desc:"Land 100 crits",check:()=>S.critCount>=100,bonus:.1,icon:"\u26A1"},
{id:"inv5",name:"Investor Relations",desc:"Catch 5 investors",check:()=>S.investorsCollected>=5,bonus:.1,icon:"\uD83D\uDC54"},
{id:"inv25",name:"VIP Network",desc:"Catch 25 investors",check:()=>S.investorsCollected>=25,bonus:.15,icon:"\uD83E\uDD1D"},
{id:"ipo1",name:"IPO!",desc:"Go public once",check:()=>S.prestigeCount>=1,bonus:.1,icon:"\uD83D\uDCC8"},
{id:"ipo5",name:"Serial Entrepreneur",desc:"IPO 5 times",check:()=>S.prestigeCount>=5,bonus:.15,icon:"\uD83D\uDE80"},
{id:"combo5",name:"Momentum",desc:"Reach x5 combo",check:()=>S.comboMultiplier>=5,bonus:.05,icon:"\uD83D\uDD17"},
{id:"combo12",name:"UNSTOPPABLE",desc:"Reach x12 combo",check:()=>S.comboMultiplier>=12,bonus:.15,icon:"\uD83C\uDF2A\uFE0F"},
{id:"crisis5",name:"Crisis Manager",desc:"Handle 5 crises",check:()=>S.bossesHandled>=5,bonus:.1,icon:"\uD83D\uDEE1\uFE0F"},
{id:"crisis20",name:"Unshakeable",desc:"Handle 20 crises",check:()=>S.bossesHandled>=20,bonus:.15,icon:"\uD83C\uDFC6"},
{id:"spin10",name:"Lucky Spinner",desc:"Spin wheel 10x",check:()=>S.wheelSpins>=10,bonus:.05,icon:"\uD83C\uDFA1"},
{id:"streak7",name:"Dedicated",desc:"7-day streak",check:()=>S.dailyStreak>=7,bonus:.15,icon:"\uD83D\uDCC5"},
{id:"global1",name:"Global Mogul",desc:"Go Global once",check:()=>S.ascensionCount>=1,bonus:.2,icon:"\uD83C\uDF0D"},
];
function totalGens(){return S.gens.reduce((s,g)=>s+g.count,0);}
function checkAchievements(){for(const a of ACHIEVEMENTS){if(!S.achieved[a.id]&&a.check()){S.achieved[a.id]=true;showToast(a.name,a.desc+" | +"+(a.bonus*100)+"% all");screenFlash("rgba(251,191,36,0.3)");SFX.achievement();if(navigator.vibrate)navigator.vibrate([30,20,30]);}}}

// =============================================================================
// STATE
// =============================================================================
const BIZ_ICONS=["\uD83C\uDF4B","\uD83D\uDCBB","\uD83C\uDFEA","\uD83D\uDE9A","\uD83D\uDE80","\uD83C\uDFE2","\uD83C\uDFD7\uFE0F"];
const S={dust:0,lifetimeDust:0,allTimeDust:0,cityStars:0,mayorPoints:0,
tapLevel:0,prestigeCount:0,ascensionCount:0,totalTaps:0,
gens:[
{name:"Lemonade Stand",count:0,baseCost:10,baseRate:.5},
{name:"Freelance Gig",count:0,baseCost:100,baseRate:4},
{name:"Corner Shop",count:0,baseCost:1200,baseRate:30},
{name:"Food Truck Fleet",count:0,baseCost:15e3,baseRate:200},
{name:"Tech Startup",count:0,baseCost:2e5,baseRate:1500},
{name:"Corporation",count:0,baseCost:33e5,baseRate:12e3},
{name:"Mega Corp",count:0,baseCost:5e7,baseRate:1e5},
],
comboCount:0,comboTimer:0,comboMultiplier:1,
achieved:{},investorActive:false,critCount:0,investorsCollected:0,
wheelCooldown:0,wheelSpins:0,buffs:[],

let mgActive=false,mgInterval=null;
function startStarCatch(){mgActive=true;S.mgCooldown=180;S.mgPlayed++;const ov=document.getElementById("mgOverlay"),area=document.getElementById("mgArea");document.getElementById("mgTitle").textContent="DEAL RUSH";document.getElementById("mgSubtitle").textContent="Tap every deal!";document.getElementById("mgResult").textContent="";document.getElementById("mgClose").style.display="none";document.getElementById("mgScore").textContent="Score: 0";document.getElementById("mgTimer").textContent="10s";area.innerHTML="";ov.classList.add("show");let score=0,timeLeft=10;function spawn(){if(!mgActive)return;const s=document.createElement("div");s.style.cssText="position:absolute;width:32px;height:32px;border-radius:50%;background:#22c55e;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer";s.textContent="\uD83D\uDCB5";s.style.left=Math.random()*200+"px";s.style.top=Math.random()*200+"px";s.addEventListener("pointerdown",e=>{e.stopPropagation();score++;SFX.mgStar();s.remove();document.getElementById("mgScore").textContent="Score: "+score;});area.appendChild(s);setTimeout(()=>{if(s.parentNode)s.remove();},1200);}mgInterval=setInterval(spawn,400);const ti=setInterval(()=>{timeLeft--;document.getElementById("mgTimer").textContent=timeLeft+"s";if(timeLeft<=0){clearInterval(ti);clearInterval(mgInterval);mgActive=false;const reward=tapPower()*score*5;S.dust+=reward;S.lifetimeDust+=reward;S.allTimeDust+=reward;document.getElementById("mgResult").textContent=score+" deals! $"+fmt(reward);document.getElementById("mgClose").style.display="";if(score>=15)SFX.mgWin();else SFX.mgFail();}},1e3);}
document.getElementById("mgClose").addEventListener("click",()=>document.getElementById("mgOverlay").classList.remove("show"));

// =============================================================================
// DAILY STREAK
// =============================================================================
const STREAK_REWARDS=[{d:1,dust:100,l:"$100"},{d:2,dust:500,l:"$500"},{d:3,dust:2e3,l:"$2K"},{d:4,dust:1e4,l:"$10K"},{d:5,dust:5e4,l:"$50K"},{d:6,dust:2e5,l:"$200K"},{d:7,nova:1,dust:0,l:"Share!"}];
function getTodayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function checkDailyStreak(){const today=getTodayStr();if(S.lastClaimDay===today){S.todayClaimed=true;return;}const last=S.lastClaimDay?new Date(S.lastClaimDay):null;if(last){if(Math.floor((new Date(today)-last)/864e5)>1)S.dailyStreak=0;}S.todayClaimed=false;showStreakModal();}
function showStreakModal(){const di=S.dailyStreak%7;document.getElementById("streakTitle").textContent=S.dailyStreak>0?"Day "+(S.dailyStreak+1)+" Streak!":"Daily Bonus!";document.getElementById("streakSubtitle").textContent="Keep your streak!";const c=document.getElementById("streakDays");let h="";for(let i=0;i<7;i++){const r=STREAK_REWARDS[i];h+=`<div class="streak-day${i<di?" claimed":""}${i===di?" today":""}"><div class="day-num">D${i+1}</div><div style="font-size:8px">${r.l}</div></div>`;}c.innerHTML=h;document.getElementById("streakClaim").disabled=false;document.getElementById("streakOverlay").classList.add("show");}
document.getElementById("streakClaim").addEventListener("click",()=>{if(S.todayClaimed)return;const di=S.dailyStreak%7,r=STREAK_REWARDS[di];const dr=r.dust*Math.max(1,globalMult());S.dust+=dr;S.lifetimeDust+=dr;S.allTimeDust+=dr;if(r.nova)S.cityStars+=r.nova;S.dailyStreak++;S.lastClaimDay=getTodayStr();S.todayClaimed=true;SFX.streak();showToast("Daily!",r.nova?"+1 Share!":"$"+fmt(dr));document.getElementById("streakOverlay").classList.remove("show");save();updateUI();});

// =============================================================================
// TOAST & TABS
// =============================================================================
let toastTimer=null;
function showToast(t,d){const e=document.getElementById("toast");document.getElementById("toastTitle").textContent=t;document.getElementById("toastDesc").textContent=d;e.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>e.classList.remove("show"),2500);}
document.querySelectorAll(".tab").forEach(tab=>{tab.addEventListener("pointerdown",()=>{document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));tab.classList.add("active");document.querySelector(`[data-panel="${tab.dataset.tab}"]`).classList.add("active");if(tab.dataset.tab==="more")buildMore();if(tab.dataset.tab==="skills")buildSkillTree();if(tab.dataset.tab==="rivals")buildRivals();});});

// =============================================================================
// SAVE / LOAD
// =============================================================================
const SAVE_KEY="tapempire_save_v1";
function save(){const d={dust:S.dust,lifetimeDust:S.lifetimeDust,allTimeDust:S.allTimeDust,cityStars:S.cityStars,mayorPoints:S.mayorPoints,tapLevel:S.tapLevel,prestigeCount:S.prestigeCount,ascensionCount:S.ascensionCount,totalTaps:S.totalTaps,critCount:S.critCount,investorsCollected:S.investorsCollected,gens:S.gens.map(g=>g.count),achieved:S.achieved,skills:S.skills,wheelCooldown:S.wheelCooldown,wheelSpins:S.wheelSpins,dailyStreak:S.dailyStreak,lastClaimDay:S.lastClaimDay,bossesHandled:S.bossesHandled,mgCooldown:S.mgCooldown,mgPlayed:S.mgPlayed,rivalSeed:S.rivalSeed,weeklyTarget:S.weeklyTarget,weeklyProgress:S.weeklyProgress,weeklyWeek:S.weeklyWeek,artifacts:S.artifacts,artifactDrops:S.artifactDrops,pChallenges:S.pChallenges,pChallengesDone:S.pChallengesDone,ts:Date.now()};try{localStorage.setItem(SAVE_KEY,JSON.stringify(d));}catch(e){}}
function load(){try{const raw=localStorage.getItem(SAVE_KEY);if(!raw)return 0;const d=JSON.parse(raw);for(const k of["dust","lifetimeDust","allTimeDust","cityStars","mayorPoints","tapLevel","prestigeCount","ascensionCount","totalTaps","critCount","investorsCollected","wheelCooldown","wheelSpins","dailyStreak","bossesHandled","mgCooldown","mgPlayed","rivalSeed","weeklyTarget","weeklyProgress"])S[k]=d[k]||0;S.lastClaimDay=d.lastClaimDay||"";S.weeklyWeek=d.weeklyWeek||"";S.achieved=d.achieved||{};S.skills=d.skills||{};S.artifacts=d.artifacts||[];S.artifactDrops=d.artifactDrops||0;S.pChallenges=d.pChallenges||[];S.pChallengesDone=d.pChallengesDone||0;if(d.gens)d.gens.forEach((c,i)=>{if(S.gens[i])S.gens[i].count=c;});return d.ts?(Date.now()-d.ts)/1e3:0;}catch(e){return 0;}}

// =============================================================================
// OFFLINE
// =============================================================================
function applyOffline(elapsed){const cap=7200;elapsed=Math.min(elapsed,cap);S.wheelCooldown=Math.max(0,S.wheelCooldown-elapsed);S.mgCooldown=Math.max(0,S.mgCooldown-elapsed);const rate=totalRate();if(rate<=0||elapsed<60)return;const earned=rate*elapsed*artifactOffline();S.dust+=earned;S.lifetimeDust+=earned;S.allTimeDust+=earned;S.weeklyProgress+=earned;const div=document.createElement("div");div.className="offline-banner";const m=Math.floor(elapsed/60);div.innerHTML=`<h3>Welcome Back, Boss!</h3><p>$${fmt(earned)}</p><p style="font-size:12px;color:#94a3b8">${m} min${m!==1?"s":""} of passive income</p><button onclick="this.parentElement.remove()">Collect</button>`;document.body.appendChild(div);}

// =============================================================================
// TAP HANDLING
// =============================================================================
const orbArea=document.getElementById("orbArea"),orb=document.getElementById("orb");
function doTap(x,y,isAuto){S.totalTaps++;runTaps++;if(!isAuto)addCombo();const isMega=rollMega(),isCrit=isMega||rollCrit();let amount=tapPower()*(isAuto?1:S.comboMultiplier);if(isMega)amount*=500;else if(isCrit)amount*=getCritMult();if(isCrit){S.critCount++;runCrits++;screenShake();screenFlash(isMega?"rgba(255,200,0,0.4)":"rgba(239,68,68,0.3)");SFX.crit();if(navigator.vibrate)navigator.vibrate(isMega?[60,30,60]:[40,20,60]);}else if(!isAuto){SFX.tap();if(navigator.vibrate)navigator.vibrate(20);}S.dust+=amount;S.lifetimeDust+=amount;S.allTimeDust+=amount;S.weeklyProgress+=amount;if(S.challengeActive&&!isAuto)hitBoss();if(!isAuto)tryArtifactDrop(.0015*(1+S.comboMultiplier*.05));if(!isAuto||Math.random()<.1){const f=document.createElement("div");f.className=isCrit?"floater crit":"floater";f.textContent=(isMega?"MEGA $":isCrit?"CRIT $":"$")+fmt(amount);f.style.left=(x+(Math.random()*40-20))+"px";f.style.top=(y-20)+"px";orbArea.appendChild(f);setTimeout(()=>f.remove(),isCrit?900:800);}}
orb.addEventListener("pointerdown",e=>{e.preventDefault();const r=orbArea.getBoundingClientRect();doTap(e.clientX-r.left-20,e.clientY-r.top,false);updateUI();checkAchievements();});

// =============================================================================
// SHOP — Business Cards
// =============================================================================
const shop=document.getElementById("shop");
let bizTimers=new Array(7).fill(0); // progress timers for each business
function buildShop(){
  let h="";
  const wr=S.wheelCooldown<=0;
  h+=`<div class="btn-special btn-wheel${wr?" ready":""}" data-action="wheel">${wr?"LUCKY SPIN - Free!":"Lucky Spin ("+Math.ceil(S.wheelCooldown)+"s)"}</div>`;
  const mr=S.mgCooldown<=0;
  h+=`<div class="btn-special btn-mini" data-action="minigame">${mr?"DEAL RUSH - Play!":"Deal Rush ("+Math.ceil(S.mgCooldown)+"s)"}</div>`;
  // Tap upgrade
  const tc=tapUpgradeCost();
  h+=`<div class="biz-card${S.dust<tc?" disabled":" affordable"}" data-action="tap"><div class="biz-icon">\uD83D\uDC46</div><div class="biz-info"><div class="biz-name">Tap Power <span class="biz-count">Lv.${S.tapLevel+1}</span></div><div class="biz-rate">$${fmt(tapPower())} per tap</div></div><div class="biz-cost">$${fmt(tc)}</div></div>`;
  h+=`<div class="section-title">BUSINESSES</div>`;
  for(let i=0;i<S.gens.length;i++){
    const g=S.gens[i],c=genCost(i);
    const rate=g.baseRate*globalMult()*artifactGenMult();
    const payInterval=1/Math.max(g.baseRate,.01); // seconds per payout cycle
    h+=`<div class="biz-card${S.dust<c?" disabled":" affordable"}" data-action="gen" data-idx="${i}"><div class="biz-icon">${BIZ_ICONS[i]}</div><div class="biz-info"><div class="biz-name">${g.name} <span class="biz-count">x${g.count}</span></div><div class="biz-rate">${g.count>0?"$"+fmt(rate*g.count)+"/s":"$"+fmt(rate)+"/s each"}</div><div class="biz-progress"><div class="biz-progress-fill" id="bizProg${i}" style="width:${g.count>0?(bizTimers[i]%payInterval/payInterval*100):0}%"></div></div></div><div class="biz-cost">$${fmt(c)}</div></div>`;
  }
  const pg=prestigeGain();
  if(pg>0)h+=`<div class="btn-special btn-ipo" data-action="prestige">IPO! Reset for +${fmt(pg)} Share${pg>1?"s":""} (+${fmt(pg*10)}% all)</div>`;
  const ag=ascensionGain();
  if(ag>0)h+=`<div class="btn-special btn-global" data-action="newcity">GO GLOBAL! +${fmt(ag)} Legacy (+${fmt(ag*25)}% permanent)</div>`;
  if(S.pChallenges.length>0){h+=`<div class="section-title">RUN CHALLENGES</div>`;for(const c of S.pChallenges)h+=`<div class="challenge${c.completed?" done":""}"><div class="challenge-name">${c.completed?"\u2714 ":""}${c.name}</div><div class="challenge-desc">${c.desc}${c.completed?"":" | +"+c.reward+" Shares"}</div></div>`;}
  shop.innerHTML=h;
  document.getElementById("wheelNotif").style.display=wr?"block":"none";
}
shop.addEventListener("pointerdown",e=>{
  const btn=e.target.closest("[data-action]");if(!btn||btn.classList.contains("disabled"))return;
  const a=btn.dataset.action;
  if(a==="wheel"){document.getElementById("wheelOverlay").classList.add("show");document.getElementById("wheelSpinBtn").disabled=S.wheelCooldown>0;document.getElementById("wheelResult").textContent=S.wheelCooldown>0?"Cooldown: "+Math.ceil(S.wheelCooldown)+"s":"";drawWheel();}
  else if(a==="minigame"&&S.mgCooldown<=0)startStarCatch();
  else if(a==="tap"){const c=tapUpgradeCost();if(S.dust>=c){S.dust-=c;S.tapLevel++;SFX.buy();}}
  else if(a==="gen"){const i=parseInt(btn.dataset.idx),c=genCost(i);if(S.dust>=c){S.dust-=c;S.gens[i].count++;SFX.buy();}}
  else if(a==="prestige"){const g=prestigeGain();if(g<=0)return;if(!confirm("IPO?\n\nReset for +"+fmt(g)+" Share(s).\nEach share = +10% ALL income."))return;S.cityStars+=g;S.prestigeCount++;S.dust=0;S.lifetimeDust=0;S.tapLevel=0;S.gens.forEach(g=>g.count=0);S.comboCount=0;S.comboTimer=0;S.comboMultiplier=1;resetRunStats();rollPrestigeChallenges();tryArtifactDrop(1);screenFlash("rgba(139,92,246,0.4)");screenShake();SFX.prestige();showToast("IPO!","+"+fmt(g)+" Shares");}
  else if(a==="newcity"){const g=ascensionGain();if(g<=0)return;if(!confirm("GO GLOBAL?\n\nResets EVERYTHING.\nKeep: Legacy, Achievements.\n\n+"+fmt(g)+" Legacy (+"+fmt(g*25)+"% permanent)"))return;S.mayorPoints+=g;S.ascensionCount++;S.dust=0;S.lifetimeDust=0;S.allTimeDust=0;S.cityStars=0;S.tapLevel=0;S.prestigeCount=0;S.gens.forEach(g=>g.count=0);S.skills={};S.comboCount=0;S.comboTimer=0;S.comboMultiplier=1;resetRunStats();rollPrestigeChallenges();tryArtifactDrop(1);screenFlash("rgba(59,130,246,0.4)");screenShake();SFX.ascend();showToast("GLOBAL EXPANSION!","+"+fmt(g)+" Legacy");}
  updateUI();checkAchievements();
});

// =============================================================================
// SKILL TREE, RIVALS, MORE TABS
// =============================================================================
function buildSkillTree(){const el=document.getElementById("skillList");let html=`<div class="section-title">SHARES: ${fmt(S.cityStars)} | LEGACY: ${fmt(S.mayorPoints)}</div>`;for(const sk of SKILLS){const owned=hs(sk.id),locked=sk.req&&!hs(sk.req),affordable=!owned&&!locked&&S.cityStars>=sk.cost;html+=`<div class="skill${owned?" owned":""}${affordable?" affordable":""}${locked?" disabled":""}" data-skill="${sk.id}"><div class="skill-icon">${sk.icon}</div><div class="skill-info"><div class="skill-name">${sk.name}</div><div class="skill-desc">${sk.desc}${locked?" (Req: "+SKILLS.find(s=>s.id===sk.req).name+")":""}</div></div><div class="skill-cost">${owned?"OWNED":sk.cost+" Shares"}</div></div>`;}el.innerHTML=html;}
document.getElementById("skillList").addEventListener("pointerdown",e=>{const el=e.target.closest(".skill");if(!el)return;const id=el.dataset.skill,sk=SKILLS.find(s=>s.id===id);if(!sk||hs(id))return;if(sk.req&&!hs(sk.req))return;if(S.cityStars<sk.cost){showToast("Need "+sk.cost+" Shares","");return;}S.cityStars-=sk.cost;S.skills[id]=true;SFX.achievement();showToast("Perk Unlocked!",sk.name);buildSkillTree();updateUI();save();});

// Rivals
const RIVAL_NAMES=["StartupSteve","HustleQueen","BizKing99","TapMogul","CashFlowKid"];
function initRivals(){if(!S.rivalSeed)S.rivalSeed=Date.now();}
function getRivals(){const now=Date.now(),elapsed=(now-S.rivalSeed)/1e3;return RIVAL_NAMES.map((name,i)=>{const rate=[.3,.6,1,1.5,.8][i],base=[500,2e3,8e3,5e4,1e3][i];return{name,dust:base+elapsed*rate*Math.pow(1.02,elapsed/3600)*base*.01};});}
function getWeekStr(){return"w"+Math.floor(new Date().getTime()/(7*864e5));}
function initWeekly(){const w=getWeekStr();if(S.weeklyWeek!==w){S.weeklyWeek=w;S.weeklyProgress=0;S.weeklyTarget=Math.max(1e4,S.allTimeDust*.5)||1e4;}}
function buildRivals(){const el=document.getElementById("rivalList");let html="";initWeekly();const wp=Math.min(S.weeklyProgress/S.weeklyTarget,1);html+=`<div class="weekly"><div style="font-size:10px;color:#22c55e;font-weight:600">${wp>=1?"WEEKLY COMPLETE!":"WEEKLY CHALLENGE"}</div><div style="font-size:9px;color:#94a3b8;margin-top:2px">Earn $${fmt(S.weeklyTarget)}</div><div class="weekly-bar"><div class="weekly-bar-fill" style="width:${wp*100}%"></div></div></div>`;html+=`<div class="section-title">LEADERBOARD</div>`;const rivals=getRivals();const all=[...rivals,{name:"YOU",dust:S.allTimeDust,isYou:true}];all.sort((a,b)=>b.dust-a.dust);all.forEach((r,i)=>{html+=`<div class="rival${r.isYou?" you":""}"><div class="rival-rank">#${i+1}</div><div style="flex:1"><div class="rival-name">${r.name}</div><div class="rival-dust">$${fmt(r.dust)} lifetime</div></div></div>`;});el.innerHTML=html;}

// More tab
function buildMore(){const el=document.getElementById("moreList");let html="";html+=`<div class="section-title">ARTIFACTS (${S.artifacts.length})</div>`;if(S.artifacts.length===0)html+=`<div style="text-align:center;font-size:10px;color:#475569;padding:8px">Tap to find artifacts!</div>`;const ac={};for(const a of S.artifacts){const k=a.name+a.rarity;ac[k]=(ac[k]||{...a,count:0});ac[k].count++;}Object.values(ac).sort((a,b)=>{const ro={legendary:0,epic:1,rare:2,common:3};return ro[a.rarity]-ro[b.rarity];}).forEach(a=>{html+=`<div class="achiev${a.rarity==="legendary"?" done":""}"><div class="achiev-icon">${a.icon}</div><div class="achiev-info"><div class="achiev-name">${a.name}${a.count>1?" x"+a.count:""}</div><div class="achiev-desc">${a.desc} (${a.rarity})</div></div></div>`;});
html+=`<div class="section-title" style="margin-top:6px">ACHIEVEMENTS (+${((achievBonus()-1)*100).toFixed(0)}%)</div>`;for(const a of ACHIEVEMENTS){const done=S.achieved[a.id];html+=`<div class="achiev${done?" done":""}"><div class="achiev-icon">${a.icon}</div><div class="achiev-info"><div class="achiev-name">${a.name}</div><div class="achiev-desc">${a.desc} | +${(a.bonus*100).toFixed(0)}%</div></div></div>`;}el.innerHTML=html;}

// =============================================================================
// UI UPDATE
// =============================================================================
const dustVal=document.getElementById("dustVal"),rateVal=document.getElementById("rateVal"),novaInfo=document.getElementById("novaInfo");
function updateUI(){dustVal.textContent=fmt(S.dust);rateVal.textContent="$"+fmt(totalRate())+"/s";let info=[];if(S.cityStars>0)info.push("Shares: "+fmt(S.cityStars));if(S.mayorPoints>0)info.push("Legacy: "+fmt(S.mayorPoints)+" (+"+fmt(S.mayorPoints*25)+"%)");novaInfo.textContent=info.join(" | ");buildShop();}

// =============================================================================
// GAME LOOP
// =============================================================================
let lastTick=performance.now(),achievTimer=0,autoAccum=0;
function tick(now){const dt=(now-lastTick)/1e3;lastTick=now;
const rate=totalRate();if(rate>0){S.dust+=rate*dt;S.lifetimeDust+=rate*dt;S.allTimeDust+=rate*dt;S.weeklyProgress+=rate*dt;}
// Business progress timers
for(let i=0;i<S.gens.length;i++){if(S.gens[i].count>0)bizTimers[i]+=dt;}
const ar=getAutoTapRate();if(ar>0){autoAccum+=dt;const t=Math.floor(autoAccum*ar);if(t>0){autoAccum-=t/ar;const cx=orbArea.getBoundingClientRect();for(let i=0;i<t;i++)doTap(cx.width/2-20+Math.random()*20,cx.height/2,true);}}
const burst=S.buffs.find(b=>b.type==="autoburst");if(burst){const t=Math.floor(dt*burst.value);const cx=orbArea.getBoundingClientRect();for(let i=0;i<t;i++)doTap(cx.width/2-20+Math.random()*20,cx.height/2,true);}
updateCombo(dt);updateBuffs(dt);updateBoss(dt);
if(S.wheelCooldown>0)S.wheelCooldown=Math.max(0,S.wheelCooldown-dt);
if(S.mgCooldown>0)S.mgCooldown=Math.max(0,S.mgCooldown-dt);
runTime+=dt;
achievTimer+=dt;if(achievTimer>=2){achievTimer=0;checkAchievements();checkPrestigeChallenges();}
updateUI();requestAnimationFrame(tick);}

// =============================================================================
// INIT
// =============================================================================
window._dbg&&window._dbg("=== INIT ===","#ff0");
const offlineSec=load();
initRivals();initWeekly();
if(offlineSec>0)applyOffline(offlineSec);
if(S.pChallenges.length===0)rollPrestigeChallenges();
updateUI();
requestAnimationFrame(tick);
scheduleInvestor();scheduleBoss();
setTimeout(()=>checkDailyStreak(),500);
setInterval(save,15e3);
document.addEventListener("visibilitychange",()=>{if(document.hidden)save();});
window._dbg&&window._dbg("Init complete","#0f0");
</script>
