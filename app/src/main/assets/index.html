<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tap Nova</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0518;font-family:'Segoe UI',system-ui,sans-serif;color:#fff}
#game{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;padding:10px 14px env(safe-area-inset-bottom)}

.top-bar{text-align:center;padding:4px 0}
.currency-name{font-size:10px;letter-spacing:3px;color:#a89cdb;text-transform:uppercase}
.currency-value{font-size:36px;font-weight:700;color:#fff5d4;text-shadow:0 0 20px rgba(255,200,60,.3)}
.rate{font-size:12px;color:#6dba6d;margin-top:1px}
.nova-info{font-size:11px;color:#ff8866;margin-top:1px}
.buff-bar{font-size:10px;color:#c084fc;margin-top:2px;min-height:14px}

.combo-bar-wrap{height:20px;display:flex;align-items:center;gap:6px;margin:2px 0}
.combo-label{font-size:12px;font-weight:700;color:#fbbf24;white-space:nowrap;min-width:40px}
.combo-track{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.combo-fill{height:100%;width:0%;background:linear-gradient(90deg,#f59e0b,#ef4444);border-radius:3px;transition:width .15s}
.combo-bar-wrap.hidden{opacity:0}

.orb-area{flex:2;display:flex;align-items:center;justify-content:center;position:relative;min-height:0}
#orb{width:150px;height:150px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#c084fc,#7c3aed 50%,#4c1d95);box-shadow:0 0 40px rgba(139,92,246,.4),0 0 80px rgba(139,92,246,.2),inset 0 -8px 20px rgba(0,0,0,.3);cursor:pointer;transition:transform .08s ease;position:relative;z-index:2}
#orb:active{transform:scale(.88)}
#orb .label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.glow{position:absolute;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.2),transparent 70%);animation:pulse 2s ease-in-out infinite;z-index:1}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.12);opacity:1}}

.floater{position:absolute;font-size:22px;font-weight:700;color:#fde68a;text-shadow:0 0 8px rgba(253,230,138,.5);pointer-events:none;z-index:10;animation:floatUp .8s ease-out forwards}
.floater.crit{font-size:32px;color:#ff4444;text-shadow:0 0 16px rgba(255,60,60,.8),0 0 30px rgba(255,60,60,.4);animation:floatUpCrit .9s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-90px) scale(.8)}}
@keyframes floatUpCrit{0%{opacity:1;transform:translateY(0) scale(1.5)}20%{transform:translateY(-15px) scale(1.2)}100%{opacity:0;transform:translateY(-110px) scale(.7)}}

.screen-flash{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0}
@keyframes flash{0%{opacity:.4}100%{opacity:0}}
.shake{animation:shake .15s ease}
@keyframes shake{0%,100%{transform:translate(0)}25%{transform:translate(-4px,2px)}50%{transform:translate(3px,-3px)}75%{transform:translate(-2px,3px)}}

.meteor{position:absolute;width:46px;height:46px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fef08a,#f59e0b 50%,#b45309);box-shadow:0 0 20px rgba(245,158,11,.6),0 0 40px rgba(245,158,11,.3);cursor:pointer;z-index:20;animation:meteorFloat 3s ease-in-out infinite;pointer-events:auto}
.meteor::after{content:'';position:absolute;top:-4px;left:-4px;right:-4px;bottom:-4px;border-radius:50%;border:2px solid rgba(254,240,138,.5);animation:meteorRing 1s ease-in-out infinite}
@keyframes meteorFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-10px) rotate(180deg)}}
@keyframes meteorRing{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.3);opacity:1}}
.meteor-label{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:#fef08a;white-space:nowrap}
.meteor-timer{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:#fbbf24;white-space:nowrap}

/* Boss challenge bar */
.boss-bar{position:absolute;bottom:10px;left:10px;right:10px;z-index:30;background:rgba(20,10,40,.9);border:1px solid rgba(239,68,68,.5);border-radius:10px;padding:8px 12px;text-align:center}
.boss-name{font-size:13px;font-weight:700;color:#ef4444}
.boss-hp-track{height:8px;background:rgba(255,255,255,.1);border-radius:4px;margin:4px 0;overflow:hidden}
.boss-hp-fill{height:100%;background:linear-gradient(90deg,#ef4444,#f59e0b);border-radius:4px;transition:width .1s}
.boss-timer{font-size:10px;color:#fbbf24}
.boss-reward{font-size:10px;color:#6dba6d}

.sep{height:1px;background:linear-gradient(90deg,transparent,rgba(139,92,246,.3),transparent);margin:4px 0}

.tab-bar{display:flex;gap:3px;margin-bottom:4px}
.tab{flex:1;padding:5px 0;text-align:center;font-size:10px;font-weight:600;letter-spacing:1px;color:#7c6cb5;background:rgba(20,12,40,.6);border:1px solid rgba(100,80,180,.2);border-radius:8px;cursor:pointer;transition:all .15s;position:relative}
.tab.active{color:#fff;background:rgba(60,40,120,.6);border-color:rgba(139,92,246,.5)}
.tab-notif{position:absolute;top:2px;right:6px;width:7px;height:7px;border-radius:50%;background:#ef4444;display:none}

.tab-panel{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.tab-panel.active{display:flex;flex-direction:column}
.tab-panel::-webkit-scrollbar{display:none}

.shop{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:10px}
.shop::-webkit-scrollbar{display:none}
.section-title{font-size:10px;letter-spacing:2px;color:#7c6cb5;text-align:center;margin:5px 0 3px}

.btn{width:100%;padding:8px 12px;margin-bottom:4px;background:rgba(30,20,60,.8);border:1px solid rgba(100,80,180,.35);border-radius:10px;color:#fff;font-size:12px;text-align:left;cursor:pointer;transition:background .15s;display:flex;justify-content:space-between;align-items:center}
.btn:active{background:rgba(50,30,90,.9)}
.btn.disabled{opacity:.35;pointer-events:none}
.btn .info{display:flex;flex-direction:column;gap:1px}
.btn .name{font-weight:600;font-size:13px}
.btn .detail{font-size:10px;color:#a89cdb}
.btn .cost{font-size:12px;color:#fde68a;font-weight:600;white-space:nowrap}

.btn.prestige{background:rgba(130,20,30,.7);border-color:rgba(255,100,80,.5);text-align:center;justify-content:center;margin-top:4px}
.btn.prestige .name{color:#ffd4cc;font-size:14px}
.btn.prestige .detail{color:#ff9988;font-size:11px}

.btn.wheel-btn{background:rgba(80,20,100,.6);border-color:rgba(192,132,252,.4);text-align:center;justify-content:center;margin-bottom:8px}
.btn.wheel-btn .name{color:#c084fc}
.btn.wheel-btn.ready{border-color:rgba(192,132,252,.8);animation:wheelPulse 1.5s ease-in-out infinite}
@keyframes wheelPulse{0%,100%{box-shadow:0 0 0 rgba(192,132,252,0)}50%{box-shadow:0 0 15px rgba(192,132,252,.3)}}

/* Achievements */
.achiev{padding:8px 12px;margin-bottom:4px;background:rgba(30,20,60,.6);border:1px solid rgba(100,80,180,.2);border-radius:10px;display:flex;gap:10px;align-items:center}
.achiev.done{border-color:rgba(245,158,11,.4);background:rgba(60,40,20,.4)}
.achiev-icon{font-size:20px;width:30px;text-align:center;flex-shrink:0}
.achiev-info{flex:1;min-width:0}
.achiev-name{font-size:12px;font-weight:600}
.achiev-desc{font-size:10px;color:#a89cdb;margin-top:1px}
.achiev-reward{font-size:9px;color:#fbbf24;margin-top:1px}
.achiev-bar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:3px;overflow:hidden}
.achiev-bar-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#c084fc);border-radius:2px;transition:width .3s}
.achiev.done .achiev-bar-fill{background:linear-gradient(90deg,#f59e0b,#fbbf24)}

/* Skill tree */
.skill{padding:8px 12px;margin-bottom:4px;background:rgba(30,20,60,.6);border:1px solid rgba(100,80,180,.2);border-radius:10px;display:flex;gap:10px;align-items:center;cursor:pointer}
.skill.owned{border-color:rgba(74,222,128,.4);background:rgba(20,60,30,.3)}
.skill.affordable{border-color:rgba(192,132,252,.5)}
.skill-icon{font-size:20px;width:30px;text-align:center;flex-shrink:0}
.skill-info{flex:1}
.skill-name{font-size:12px;font-weight:600}
.skill-desc{font-size:10px;color:#a89cdb;margin-top:1px}
.skill-cost{font-size:11px;color:#ff8866;font-weight:600;white-space:nowrap}
.skill.owned .skill-cost{color:#4ade80}

/* Wheel modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.wheel-modal{background:rgba(20,12,40,.97);border:2px solid rgba(139,92,246,.5);border-radius:20px;padding:20px;text-align:center;width:90%;max-width:340px}
.wheel-title{font-size:18px;font-weight:700;color:#c084fc;margin-bottom:12px}
.wheel-container{position:relative;width:240px;height:240px;margin:0 auto 16px}
.wheel-canvas{width:240px;height:240px}
.wheel-pointer{position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:20px solid #fbbf24;z-index:2;filter:drop-shadow(0 0 4px rgba(251,191,36,.5))}
.wheel-result{font-size:16px;font-weight:700;color:#fde68a;margin:8px 0;min-height:24px}
.wheel-spin-btn{padding:10px 36px;background:#7c3aed;border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:600;cursor:pointer}
.wheel-spin-btn:disabled{opacity:.4;cursor:default}
.wheel-close{margin-top:10px;padding:6px 24px;background:transparent;border:1px solid rgba(139,92,246,.4);border-radius:8px;color:#a89cdb;font-size:13px;cursor:pointer}

/* Daily streak modal */
.streak-modal{background:rgba(20,12,40,.97);border:2px solid rgba(245,158,11,.5);border-radius:20px;padding:24px;text-align:center;width:90%;max-width:340px}
.streak-title{font-size:18px;font-weight:700;color:#fbbf24;margin-bottom:4px}
.streak-subtitle{font-size:13px;color:#a89cdb;margin-bottom:16px}
.streak-days{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.streak-day{width:38px;height:44px;border-radius:8px;background:rgba(30,20,60,.8);border:1px solid rgba(100,80,180,.3);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;color:#7c6cb5}
.streak-day.claimed{background:rgba(60,40,20,.6);border-color:rgba(245,158,11,.5);color:#fbbf24}
.streak-day.today{border-color:#fbbf24;box-shadow:0 0 8px rgba(245,158,11,.3)}
.streak-day .day-num{font-weight:700;font-size:11px}
.streak-day .day-reward{font-size:8px;margin-top:1px}
.streak-claim{padding:10px 36px;background:#f59e0b;border:none;border-radius:10px;color:#000;font-size:15px;font-weight:700;cursor:pointer}
.streak-claim:disabled{opacity:.4}

.toast{position:fixed;top:50px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(30,20,60,.95);border:1px solid rgba(245,158,11,.5);border-radius:12px;padding:8px 18px;text-align:center;z-index:100;opacity:0;pointer-events:none;transition:all .3s ease;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-title{font-size:13px;font-weight:700;color:#fbbf24}
.toast-desc{font-size:10px;color:#a89cdb;margin-top:2px}

.offline-banner{position:fixed;top:0;left:0;right:0;background:rgba(20,10,40,.97);border-bottom:1px solid rgba(139,92,246,.4);padding:16px;text-align:center;z-index:100;animation:slideDown .4s ease}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
.offline-banner h3{color:#c084fc;margin-bottom:4px;font-size:16px}
.offline-banner p{color:#fde68a;font-size:16px}
.offline-banner button{margin-top:10px;padding:7px 28px;background:#7c3aed;border:none;border-radius:8px;color:#fff;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<div id="game">
  <div class="top-bar">
    <div class="currency-name">Stardust</div>
    <div class="currency-value" id="dustVal">0</div>
    <div class="rate" id="rateVal">0/s</div>
    <div class="nova-info" id="novaInfo"></div>
    <div class="buff-bar" id="buffBar"></div>
  </div>

  <div class="combo-bar-wrap hidden" id="comboWrap">
    <div class="combo-label" id="comboLabel">x1</div>
    <div class="combo-track"><div class="combo-fill" id="comboFill"></div></div>
  </div>

  <div class="orb-area" id="orbArea">
    <div class="glow" id="glow"></div>
    <div id="orb"><div class="label">TAP</div></div>
  </div>

  <div class="sep"></div>

  <div class="tab-bar">
    <div class="tab active" data-tab="shop">SHOP<div class="tab-notif" id="wheelNotif"></div></div>
    <div class="tab" data-tab="skills">SKILLS</div>
    <div class="tab" data-tab="achievements">TROPHIES</div>
  </div>

  <div class="tab-panel active" data-panel="shop">
    <div class="shop" id="shop"></div>
  </div>

  <div class="tab-panel" data-panel="skills">
    <div class="shop" id="skillList"></div>
  </div>

  <div class="tab-panel" data-panel="achievements">
    <div class="shop" id="achievList"></div>
  </div>
</div>

<div class="screen-flash" id="screenFlash"></div>
<div class="toast" id="toast"><div class="toast-title" id="toastTitle"></div><div class="toast-desc" id="toastDesc"></div></div>

<!-- Wheel Modal -->
<div class="modal-overlay" id="wheelOverlay">
  <div class="wheel-modal">
    <div class="wheel-title">LUCKY WHEEL</div>
    <div class="wheel-container">
      <div class="wheel-pointer"></div>
      <canvas class="wheel-canvas" id="wheelCanvas" width="240" height="240"></canvas>
    </div>
    <div class="wheel-result" id="wheelResult"></div>
    <button class="wheel-spin-btn" id="wheelSpinBtn">SPIN!</button>
    <br><button class="wheel-close" id="wheelClose">Close</button>
  </div>
</div>

<!-- Daily Streak Modal -->
<div class="modal-overlay" id="streakOverlay">
  <div class="streak-modal">
    <div class="streak-title" id="streakTitle">Daily Streak!</div>
    <div class="streak-subtitle" id="streakSubtitle"></div>
    <div class="streak-days" id="streakDays"></div>
    <button class="streak-claim" id="streakClaim">Claim Reward</button>
  </div>
</div>

<script>
// =========================================================
// STATE
// =========================================================
const S = {
  dust: 0, lifetimeDust: 0, allTimeDust: 0, novaCrystals: 0,
  tapLevel: 0, prestigeCount: 0, totalTaps: 0,
  gens: [
    {name:"Asteroid Miner",   count:0, baseCost:10,       baseRate:0.5},
    {name:"Space Station",    count:0, baseCost:100,      baseRate:4},
    {name:"Lunar Colony",     count:0, baseCost:1200,     baseRate:30},
    {name:"Dyson Ring",       count:0, baseCost:15000,    baseRate:200},
    {name:"Warp Conduit",     count:0, baseCost:200000,   baseRate:1500},
    {name:"Galaxy Harvester", count:0, baseCost:3300000,  baseRate:12000},
  ],
  comboCount: 0, comboTimer: 0, comboMultiplier: 1,
  achieved: {},
  meteorActive: false,
  critCount: 0, meteorsCollected: 0,
  // Wheel
  wheelCooldown: 0, wheelSpins: 0,
  // Buffs: {type, remaining, value}
  buffs: [],
  // Daily streak
  dailyStreak: 0, lastClaimDay: "", todayClaimed: false,
  // Skills
  skills: {},
  // Boss
  bossesDefeated: 0,
  // Challenge state (not saved)
  challengeActive: false, challengeHP: 0, challengeMaxHP: 0, challengeTimer: 0, challengeReward: 0, challengeName: "",
};

// =========================================================
// SOUND ENGINE
// =========================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

const SFX = {
  tap() {
    const ctx = ensureAudio(); const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = "sine"; o.frequency.value = 660 + Math.random() * 120;
    o.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.06);
    g.gain.setValueAtTime(0.18, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.08);
  },
  crit() {
    const ctx = ensureAudio();
    const o1 = ctx.createOscillator(); const g1 = ctx.createGain();
    o1.type = "sine"; o1.frequency.setValueAtTime(150, ctx.currentTime);
    o1.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.15);
    g1.gain.setValueAtTime(0.35, ctx.currentTime);
    g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    o1.connect(g1); g1.connect(ctx.destination); o1.start(); o1.stop(ctx.currentTime + 0.2);
    const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
    o2.type = "triangle"; o2.frequency.setValueAtTime(1800, ctx.currentTime);
    o2.frequency.exponentialRampToValueAtTime(2400, ctx.currentTime + 0.1);
    g2.gain.setValueAtTime(0.12, ctx.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    o2.connect(g2); g2.connect(ctx.destination); o2.start(); o2.stop(ctx.currentTime + 0.15);
  },
  comboUp(tier) {
    const ctx = ensureAudio(); const bf = 500 + tier * 80;
    [0, 0.06, 0.12].forEach((d, i) => {
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.type = "square"; o.frequency.value = bf + i * 150;
      g.gain.setValueAtTime(0.08, ctx.currentTime + d);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d + 0.1);
      o.connect(g); g.connect(ctx.destination); o.start(ctx.currentTime + d); o.stop(ctx.currentTime + d + 0.1);
    });
  },
  buy() {
    const ctx = ensureAudio(); const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = "triangle"; o.frequency.setValueAtTime(880, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1100, ctx.currentTime + 0.05);
    o.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.12);
  },
  meteorAppear() {
    const ctx = ensureAudio();
    [0, 0.1, 0.2].forEach((d, i) => {
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.type = "sine"; o.frequency.value = 600 + i * 200;
      g.gain.setValueAtTime(0.1, ctx.currentTime + d);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d + 0.15);
      o.connect(g); g.connect(ctx.destination); o.start(ctx.currentTime + d); o.stop(ctx.currentTime + d + 0.15);
    });
  },
  meteorCollect() {
    const ctx = ensureAudio();
    [0, 0.05, 0.1, 0.15, 0.2, 0.28].forEach((d, i) => {
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.type = "sine"; o.frequency.value = 800 + i * 200;
      g.gain.setValueAtTime(0.12, ctx.currentTime + d);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d + 0.12);
      o.connect(g); g.connect(ctx.destination); o.start(ctx.currentTime + d); o.stop(ctx.currentTime + d + 0.12);
    });
  },
  achievement() {
    const ctx = ensureAudio();
    [523, 659, 784, 1047].forEach((freq, i) => {
      const d = i * 0.1; const o = ctx.createOscillator(); const g = ctx.createGain();
      o.type = "triangle"; o.frequency.value = freq;
      g.gain.setValueAtTime(0.12, ctx.currentTime + d);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d + 0.25);
      o.connect(g); g.connect(ctx.destination); o.start(ctx.currentTime + d); o.stop(ctx.currentTime + d + 0.25);
    });
  },
  prestige() {
    const ctx = ensureAudio();
    for (let i = 0; i < 5; i++) {
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.type = "sawtooth"; o.frequency.setValueAtTime(100 + i * 50, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(2000 + i * 200, ctx.currentTime + 0.4);
      g.gain.setValueAtTime(0.04, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.5);
    }
    setTimeout(() => {
      const ctx2 = ensureAudio(); const o = ctx2.createOscillator(); const g = ctx2.createGain();
      o.type = "sine"; o.frequency.setValueAtTime(80, ctx2.currentTime);
      o.frequency.exponentialRampToValueAtTime(30, ctx2.currentTime + 0.4);
      g.gain.setValueAtTime(0.3, ctx2.currentTime);

// =========================================================
// FORMAT
// =========================================================
const SUFFIXES = ["","K","M","B","T","Qa","Qi","Sx","Sp","Oc","No","Dc"];
function fmt(n) {
  if (n < 1000) return Math.floor(n).toString();
  const tier = Math.min(Math.floor(Math.log10(Math.abs(n)) / 3), SUFFIXES.length - 1);
  const sc = n / Math.pow(1000, tier);
  return (sc >= 100 ? Math.floor(sc) : sc >= 10 ? sc.toFixed(1) : sc.toFixed(2)) + SUFFIXES[tier];
}

// =========================================================
function achievBonus() {
  let b = 0;
  for (const a of ACHIEVEMENTS) { if (S.achieved[a.id]) b += a.bonus; }
  return 1 + b;
}
function prestigeMult() { return 1 + S.novaCrystals * 0.1; }
function buffMult() {
  const b = S.buffs.find(b => b.type === "2x");
  return b ? 2 : 1;
}
function globalMult() { return prestigeMult() * achievBonus() * getSynergyBonus() * buffMult(); }
function tapPower() { return (1 + S.tapLevel * 0.5) * globalMult(); }
function genCost(i) { return S.gens[i].baseCost * Math.pow(1.15, S.gens[i].count); }
function genRate(i) { return S.gens[i].baseRate * S.gens[i].count * globalMult(); }
function totalRate() { let r = 0; for (let i = 0; i < S.gens.length; i++) r += genRate(i); return r; }
function tapUpgradeCost() { return 10 * Math.pow(1.8, S.tapLevel); }
function prestigeGain() { return S.lifetimeDust < 1e6 ? 0 : Math.floor(Math.sqrt(S.lifetimeDust / 1e6)); }

function getComboTier() { let t = COMBO_TIERS[0]; for (const c of COMBO_TIERS) { if (S.comboCount >= c.taps) t = c; } return t; }
function getNextComboTier() { for (const c of COMBO_TIERS) { if (S.comboCount < c.taps) return c; } return null; }
function addCombo() {
  const prev = getComboTier();
  S.comboCount++; S.comboTimer = COMBO_DECAY;

  if (tier.mult > prev.mult) SFX.comboUp(COMBO_TIERS.indexOf(tier));
}
function updateCombo(dt) {
  if (S.comboTimer > 0) {
    S.comboTimer -= dt;
    if (S.comboTimer <= 0) { S.comboCount = 0; S.comboTimer = 0; S.comboMultiplier = 1; }
  }
  const wrap = document.getElementById("comboWrap");
  const label = document.getElementById("comboLabel");
  const fill = document.getElementById("comboFill");
  if (S.comboCount > 0) {
    wrap.classList.remove("hidden");

    label.style.color = tier.mult >= 5 ? "#ef4444" : tier.mult >= 2 ? "#f59e0b" : "#fbbf24";
    fill.style.width = next ? ((S.comboCount - (tier.taps||0)) / (next.taps - (tier.taps||0)) * 100) + "%" : "100%";
    fill.style.opacity = Math.max(0.3, S.comboTimer / COMBO_DECAY);

}

];

let wheelAngle = 0, wheelSpinning = false;
const wheelCanvas = document.getElementById("wheelCanvas");
const wheelCtx = wheelCanvas.getContext("2d");

function drawWheel() {
  const cx = 120, cy = 120, r = 110;
  const seg = WHEEL_SEGMENTS.length;
  const arc = (Math.PI * 2) / seg;
  wheelCtx.clearRect(0, 0, 240, 240);
  for (let i = 0; i < seg; i++) {
    const angle = wheelAngle + i * arc;
    wheelCtx.beginPath(); wheelCtx.moveTo(cx, cy);
    wheelCtx.arc(cx, cy, r, angle - arc / 2, angle + arc / 2);
    wheelCtx.fillStyle = WHEEL_SEGMENTS[i].color; wheelCtx.fill();
    wheelCtx.strokeStyle = "rgba(255,255,255,0.2)"; wheelCtx.lineWidth = 1; wheelCtx.stroke();
    // Label
    wheelCtx.save(); wheelCtx.translate(cx, cy); wheelCtx.rotate(angle);
    wheelCtx.fillStyle = "#fff"; wheelCtx.font = "bold 10px sans-serif"; wheelCtx.textAlign = "center";
    const lines = WHEEL_SEGMENTS[i].label.split("\n");
    lines.forEach((l, li) => wheelCtx.fillText(l, r * 0.6, -4 + li * 12));
    wheelCtx.restore();
  }
  // Center circle
  wheelCtx.beginPath(); wheelCtx.arc(cx, cy, 18, 0, Math.PI * 2);
  wheelCtx.fillStyle = "#1a0a30"; wheelCtx.fill();
  wheelCtx.strokeStyle = "#7c3aed"; wheelCtx.lineWidth = 2; wheelCtx.stroke();
}
drawWheel();

function spinWheel() {
  if (wheelSpinning || S.wheelCooldown > 0) return;
  wheelSpinning = true;
  S.wheelCooldown = getWheelCooldown(); S.wheelSpins++;
  document.getElementById("wheelSpinBtn").disabled = true;
  document.getElementById("wheelResult").textContent = "";
  SFX.wheelSpin();

  const targetSeg = Math.floor(Math.random() * WHEEL_SEGMENTS.length);
  const seg = WHEEL_SEGMENTS.length;
  const arc = (Math.PI * 2) / seg;
  // Spin 4-6 full rotations + land on target
  const targetAngle = -(targetSeg * arc) + (Math.PI * 2 * (4 + Math.random() * 2));
  const startAngle = wheelAngle;
  const duration = 3000;
  const startTime = performance.now();

  function animateSpin(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3); // ease out cubic
    wheelAngle = startAngle + targetAngle * ease;
    drawWheel();
    if (t < 1) {
      requestAnimationFrame(animateSpin);
    } else {
      wheelSpinning = false;
      const result = WHEEL_SEGMENTS[targetSeg].action();
      document.getElementById("wheelResult").textContent = result;
      SFX.wheelWin(); screenFlash("rgba(192,132,252,0.3)");
      document.getElementById("wheelSpinBtn").disabled = true;
      updateUI();
    }
  }
  requestAnimationFrame(animateSpin);
}

document.getElementById("wheelSpinBtn").addEventListener("click", spinWheel);
document.getElementById("wheelClose").addEventListener("click", () => {
  document.getElementById("wheelOverlay").classList.remove("show");
});

// =========================================================
const STREAK_REWARDS = [
  {day:1, dust:100,     label:"100"},
  {day:2, dust:500,     label:"500"},
  {day:3, dust:2000,    label:"2K"},
  {day:4, dust:10000,   label:"10K"},
  {day:5, dust:50000,   label:"50K"},
  {day:6, dust:200000,  label:"200K"},
  {day:7, nova:1, dust:0, label:"Nova!"},
];

function getTodayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

function checkDailyStreak() {
  const today = getTodayStr();
  if (S.lastClaimDay === today) { S.todayClaimed = true; return; }
  // Check if streak continues or resets
  const last = S.lastClaimDay ? new Date(S.lastClaimDay) : null;
  const now = new Date(today);
  if (last) {
    const diff = Math.floor((now - last) / 86400000);
    if (diff > 1) S.dailyStreak = 0; // Missed a day — reset
  }
  S.todayClaimed = false;
  showStreakModal();
}

function showStreakModal() {
  const overlay = document.getElementById("streakOverlay");
  const dayIdx = S.dailyStreak % 7;
  document.getElementById("streakTitle").textContent = S.dailyStreak > 0 ? "Day " + (S.dailyStreak + 1) + " Streak!" : "Daily Reward!";
  document.getElementById("streakSubtitle").textContent = S.dailyStreak > 0 ? "Keep your streak alive!" : "Welcome! Claim your reward:";
  const container = document.getElementById("streakDays");
  let html = "";
  for (let i = 0; i < 7; i++) {
    const r = STREAK_REWARDS[i];
    const claimed = i < dayIdx;
    const isToday = i === dayIdx;
    html += `<div class="streak-day${claimed ? " claimed" : ""}${isToday ? " today" : ""}">
      <div class="day-num">D${i+1}</div>
      <div class="day-reward">${r.label}</div>
    </div>`;
  }
  container.innerHTML = html;
  document.getElementById("streakClaim").disabled = false;
  overlay.classList.add("show");
}

document.getElementById("streakClaim").addEventListener("click", () => {
  if (S.todayClaimed) return;
  const dayIdx = S.dailyStreak % 7;
  const reward = STREAK_REWARDS[dayIdx];
  // Scale dust reward by current production
  const dustReward = reward.dust * Math.max(1, globalMult());
  S.dust += dustReward; S.lifetimeDust += dustReward; S.allTimeDust += dustReward;
  if (reward.nova) S.novaCrystals += reward.nova;
  S.dailyStreak++; S.lastClaimDay = getTodayStr(); S.todayClaimed = true;
  SFX.streak(); screenFlash("rgba(245,158,11,0.3)");
  if (reward.nova) showToast("STREAK BONUS!", "+1 Nova Crystal!");
  else showToast("Daily Reward!", "+" + fmt(dustReward) + " Stardust");
  document.getElementById("streakClaim").disabled = true;
  document.getElementById("streakOverlay").classList.remove("show");
  save(); updateUI();
});

// =========================================================
// ACHIEVEMENTS
// =========================================================
const ACHIEVEMENTS = [
  {id:"tap100",   name:"First Steps",    desc:"Tap 100 times",              check:()=>S.totalTaps>=100,       bonus:0.05, icon:"\u2B50"},
  {id:"tap1000",  name:"Tap Addict",     desc:"Tap 1,000 times",            check:()=>S.totalTaps>=1000,      bonus:0.10, icon:"\uD83D\uDD25"},
  {id:"tap10000", name:"Finger Fury",    desc:"Tap 10,000 times",           check:()=>S.totalTaps>=10000,     bonus:0.15, icon:"\uD83D\uDCAA"},
  {id:"dust1k",   name:"Dust Collector", desc:"Earn 1K total Stardust",     check:()=>S.allTimeDust>=1e3,     bonus:0.05, icon:"\u2728"},
  {id:"dust1m",   name:"Stardust Magnate",desc:"Earn 1M total Stardust",    check:()=>S.allTimeDust>=1e6,     bonus:0.10, icon:"\uD83D\uDCAB"},
  {id:"dust1b",   name:"Cosmic Tycoon",  desc:"Earn 1B total Stardust",     check:()=>S.allTimeDust>=1e9,     bonus:0.15, icon:"\uD83C\uDF0C"},
  {id:"gen1",     name:"Automation",     desc:"Buy first generator",        check:()=>S.gens[0].count>=1,     bonus:0.05, icon:"\u2699\uFE0F"},
  {id:"gen50",    name:"Factory Floor",  desc:"Own 50 total generators",    check:()=>totalGens()>=50,        bonus:0.10, icon:"\uD83C\uDFED"},
  {id:"crit10",   name:"Lucky Strikes",  desc:"Land 10 critical taps",      check:()=>S.critCount>=10,        bonus:0.05, icon:"\uD83C\uDFAF"},
  {id:"crit100",  name:"Crit Machine",   desc:"Land 100 critical taps",     check:()=>S.critCount>=100,       bonus:0.10, icon:"\u26A1"},
  {id:"meteor5",  name:"Meteor Hunter",  desc:"Catch 5 golden meteors",     check:()=>S.meteorsCollected>=5,  bonus:0.10, icon:"\u2604\uFE0F"},
  {id:"meteor25", name:"Cosmic Catcher", desc:"Catch 25 golden meteors",    check:()=>S.meteorsCollected>=25, bonus:0.15, icon:"\uD83E\uDE90"},
  {id:"prestige1",name:"Supernova",      desc:"Prestige for the first time",check:()=>S.prestigeCount>=1,     bonus:0.10, icon:"\uD83D\uDCA5"},
  {id:"prestige5",name:"Serial Exploder",desc:"Prestige 5 times",           check:()=>S.prestigeCount>=5,     bonus:0.15, icon:"\uD83C\uDF1F"},
  {id:"combo5",   name:"Combo Starter",  desc:"Reach x5 combo",             check:()=>S.comboMultiplier>=5,   bonus:0.05, icon:"\uD83D\uDD17"},
  {id:"combo12",  name:"MAXIMUM COMBO",  desc:"Reach x12 combo",            check:()=>S.comboMultiplier>=12,  bonus:0.15, icon:"\uD83C\uDF2A\uFE0F"},
  {id:"boss5",    name:"Boss Slayer",    desc:"Defeat 5 bosses",            check:()=>S.bossesDefeated>=5,    bonus:0.10, icon:"\u2694\uFE0F"},
  {id:"boss20",   name:"Titan Crusher",  desc:"Defeat 20 bosses",           check:()=>S.bossesDefeated>=20,   bonus:0.15, icon:"\uD83D\uDDE1\uFE0F"},
  {id:"spin10",   name:"Lucky Spinner",  desc:"Spin the wheel 10 times",    check:()=>S.wheelSpins>=10,       bonus:0.05, icon:"\uD83C\uDFA1"},
  {id:"streak7",  name:"Dedicated",      desc:"7-day login streak",         check:()=>S.dailyStreak>=7,       bonus:0.15, icon:"\uD83D\uDCC5"},
];

function totalGens() { return S.gens.reduce((s, g) => s + g.count, 0); }

function checkAchievements() {
  for (const a of ACHIEVEMENTS) {
    if (!S.achieved[a.id] && a.check()) {
      S.achieved[a.id] = true;
      showToast("Achievement: " + a.name, a.desc + " | +" + (a.bonus * 100) + "% all");
      screenFlash("rgba(245,158,11,0.3)"); SFX.achievement();
      if (navigator.vibrate) navigator.vibrate([30, 20, 30, 20, 30]);
    }
  }
}

function buildAchievements() {
  const el = document.getElementById("achievList");
  let html = `<div class="section-title">BONUS: +${((achievBonus()-1)*100).toFixed(0)}%</div>`;
  for (const a of ACHIEVEMENTS) {
    const done = S.achieved[a.id];
    let p = done ? 1 : 0;
    if (!done) {
      const m = a.desc.match(/[\d,]+/);
      const target = m ? parseInt(m[0].replace(/,/g,"")) : 1;
      if (a.id.startsWith("tap")) p = S.totalTaps / target;
      else if (a.id.startsWith("dust")) { const t = a.desc.includes("1K")?1e3:a.desc.includes("1M")?1e6:1e9; p = S.allTimeDust/t; }
      else if (a.id.startsWith("crit")) p = S.critCount/target;
      else if (a.id.startsWith("meteor")) p = S.meteorsCollected/target;
      else if (a.id.startsWith("prestige")) p = S.prestigeCount/target;
      else if (a.id==="gen1") p = S.gens[0].count;
      else if (a.id==="gen50") p = totalGens()/50;
      else if (a.id==="combo5") p = S.comboMultiplier/5;
      else if (a.id==="combo12") p = S.comboMultiplier/12;
      else if (a.id.startsWith("boss")) p = S.bossesDefeated/target;
      else if (a.id==="spin10") p = S.wheelSpins/10;
      else if (a.id==="streak7") p = S.dailyStreak/7;
      p = Math.min(p, 1);
    }
    html += `<div class="achiev${done?" done":""}"><div class="achiev-icon">${a.icon}</div><div class="achiev-info">
      <div class="achiev-name">${a.name}</div><div class="achiev-desc">${a.desc}</div>
      <div class="achiev-reward">${done?"UNLOCKED":"Reward"}: +${(a.bonus*100).toFixed(0)}%</div>
      <div class="achiev-bar"><div class="achiev-bar-fill" style="width:${p*100}%"></div></div></div></div>`;
  }
  el.innerHTML = html;
}

// =========================================================
// SKILL TREE UI
// =========================================================
function buildSkillTree() {
  const el = document.getElementById("skillList");
  let html = `<div class="section-title">NOVA CRYSTALS: ${fmt(S.novaCrystals)}</div>`;
  for (const sk of SKILLS) {
    const owned = hasSkill(sk.id);
    const locked = sk.req && !hasSkill(sk.req);
    const affordable = !owned && !locked && S.novaCrystals >= sk.cost;
    let cls = "skill";
    if (owned) cls += " owned";
    else if (affordable) cls += " affordable";
    else if (locked) cls += " disabled";
    html += `<div class="${cls}" data-skill="${sk.id}">
      <div class="skill-icon">${sk.icon}</div><div class="skill-info">
      <div class="skill-name">${sk.name}</div>
      <div class="skill-desc">${sk.desc}${locked?" (Requires "+SKILLS.find(s=>s.id===sk.req).name+")":""}</div></div>
      <div class="skill-cost">${owned?"OWNED":sk.cost+" NC"}</div></div>`;
  }
  el.innerHTML = html;
}

document.getElementById("skillList").addEventListener("pointerdown", e => {
  const el = e.target.closest(".skill");
  if (!el) return;
  const id = el.dataset.skill;
  const sk = SKILLS.find(s => s.id === id);
  if (!sk || hasSkill(id)) return;
  if (sk.req && !hasSkill(sk.req)) return;
  if (S.novaCrystals < sk.cost) { showToast("Not enough", "Need " + sk.cost + " Nova Crystals"); return; }
  S.novaCrystals -= sk.cost;
  S.skills[id] = true;
  SFX.achievement(); screenFlash("rgba(74,222,128,0.3)");
  showToast("Skill Unlocked!", sk.name);
  buildSkillTree(); updateUI(); save();
});

// =========================================================
// TOAST
// =========================================================
let toastTimer = null;
function showToast(title, desc) {
  const t = document.getElementById("toast");
  document.getElementById("toastTitle").textContent = title;
  document.getElementById("toastDesc").textContent = desc;
  t.classList.add("show"); clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2500);
}

// =========================================================
// TABS
// =========================================================
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("pointerdown", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.querySelector(`[data-panel="${tab.dataset.tab}"]`).classList.add("active");
    if (tab.dataset.tab === "achievements") buildAchievements();
    if (tab.dataset.tab === "skills") buildSkillTree();
  });
});

// =========================================================
// SAVE / LOAD
// =========================================================
const SAVE_KEY = "tapnova_save_v3";
function save() {
  const d = {
    dust:S.dust, lifetimeDust:S.lifetimeDust, allTimeDust:S.allTimeDust,
    novaCrystals:S.novaCrystals, tapLevel:S.tapLevel,
    prestigeCount:S.prestigeCount, totalTaps:S.totalTaps,
    critCount:S.critCount, meteorsCollected:S.meteorsCollected,
    gens:S.gens.map(g=>g.count), achieved:S.achieved,
    skills:S.skills, wheelCooldown:S.wheelCooldown, wheelSpins:S.wheelSpins,
    dailyStreak:S.dailyStreak, lastClaimDay:S.lastClaimDay,
    bossesDefeated:S.bossesDefeated,
    ts:Date.now()
  };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(d)); } catch(e) {}
}
function load() {
  try {
    // Try v3 first, fallback to v2
    let raw = localStorage.getItem(SAVE_KEY) || localStorage.getItem("tapnova_save_v2");
    if (!raw) return 0;
    const d = JSON.parse(raw);
    S.dust=d.dust||0; S.lifetimeDust=d.lifetimeDust||0; S.allTimeDust=d.allTimeDust||0;
    S.novaCrystals=d.novaCrystals||0; S.tapLevel=d.tapLevel||0;
    S.prestigeCount=d.prestigeCount||0; S.totalTaps=d.totalTaps||0;
    S.critCount=d.critCount||0; S.meteorsCollected=d.meteorsCollected||0;
    S.achieved=d.achieved||{}; S.skills=d.skills||{};
    S.wheelCooldown=d.wheelCooldown||0; S.wheelSpins=d.wheelSpins||0;
    S.dailyStreak=d.dailyStreak||0; S.lastClaimDay=d.lastClaimDay||"";
    S.bossesDefeated=d.bossesDefeated||0;
    if (d.gens) d.gens.forEach((c,i)=>{ if(S.gens[i]) S.gens[i].count=c; });
    return d.ts ? (Date.now()-d.ts)/1000 : 0;
  } catch(e) { return 0; }
}

// =========================================================
// OFFLINE
// =========================================================
function applyOffline(elapsed) {
  const cap = 7200; elapsed = Math.min(elapsed, cap);
  // Reduce wheel cooldown by elapsed time
  S.wheelCooldown = Math.max(0, S.wheelCooldown - elapsed);
  const rate = totalRate();
  if (rate <= 0 || elapsed < 60) return;
  const earned = rate * elapsed;
  S.dust += earned; S.lifetimeDust += earned; S.allTimeDust += earned;
  showOfflineBanner(earned, elapsed);
}
function showOfflineBanner(earned, elapsed) {
  const div = document.createElement("div"); div.className = "offline-banner";
  const mins = Math.floor(elapsed / 60);
  div.innerHTML = `<h3>Welcome Back!</h3><p>+${fmt(earned)} Stardust</p><p style="font-size:12px;color:#a89cdb">${mins} min${mins!==1?"s":""} away</p><button onclick="this.parentElement.remove()">Collect</button>`;
  document.body.appendChild(div);
}

// =========================================================
// TAP HANDLING
// =========================================================
const orbArea = document.getElementById("orbArea");
const orb = document.getElementById("orb");

function doTap(x, y, isAuto) {
  S.totalTaps++;
  if (!isAuto) addCombo();
  const isMega = rollMegaCrit();
  const isCrit = isMega || rollCrit();
  let amount = tapPower() * (isAuto ? 1 : S.comboMultiplier);
  if (isMega) { amount *= 500; }
  else if (isCrit) { amount *= getCritMult(); }

  if (isCrit) {
    S.critCount++;
    screenShake(); screenFlash(isMega ? "rgba(255,200,0,0.5)" : "rgba(255,60,60,0.35)");
    SFX.crit();
    if (navigator.vibrate) navigator.vibrate(isMega ? [60,30,60,30,60] : [40,20,60]);
  } else if (!isAuto) {
    SFX.tap();
    if (navigator.vibrate) navigator.vibrate(20);
  }

  S.dust += amount; S.lifetimeDust += amount; S.allTimeDust += amount;

  // Hit boss
  if (S.challengeActive && !isAuto) hitBoss();

  // Floating text
  if (!isAuto || Math.random() < 0.15) {
    const f = document.createElement("div");
    f.className = isCrit ? "floater crit" : "floater";
    if (isMega) { f.textContent = "MEGA +" + fmt(amount); f.style.color = "#fef08a"; }
    else f.textContent = (isCrit ? "CRIT +" : "+") + fmt(amount);
    f.style.left = (x + (Math.random()*40-20)) + "px";
    f.style.top = (y - 20) + "px";
    orbArea.appendChild(f);
    setTimeout(() => f.remove(), isCrit ? 900 : 800);
  }

  updateOrbVisuals();
}

orb.addEventListener("pointerdown", e => {
  e.preventDefault();
  const rect = orbArea.getBoundingClientRect();
  doTap(e.clientX - rect.left - 30, e.clientY - rect.top, false);
  updateUI(); checkAchievements();
});

function updateOrbVisuals() {
  const m = S.comboMultiplier; const glow = document.getElementById("glow");
  if (m >= 8) {
    orb.style.boxShadow = "0 0 50px rgba(239,68,68,.5),0 0 100px rgba(239,68,68,.3),inset 0 -8px 20px rgba(0,0,0,.3)";
    glow.style.background = "radial-gradient(circle,rgba(239,68,68,.3),transparent 70%)";
  } else if (m >= 3) {
    orb.style.boxShadow = "0 0 50px rgba(245,158,11,.4),0 0 90px rgba(245,158,11,.2),inset 0 -8px 20px rgba(0,0,0,.3)";
    glow.style.background = "radial-gradient(circle,rgba(245,158,11,.25),transparent 70%)";
  } else {
    orb.style.boxShadow = "0 0 40px rgba(139,92,246,.4),0 0 80px rgba(139,92,246,.2),inset 0 -8px 20px rgba(0,0,0,.3)";
    glow.style.background = "radial-gradient(circle,rgba(139,92,246,.2),transparent 70%)";
  }
}

// =========================================================
// SHOP
// =========================================================
const shop = document.getElementById("shop");

function buildShop() {
  let html = "";

  // Wheel button
  const wheelReady = S.wheelCooldown <= 0;
  const wheelText = wheelReady ? "SPIN NOW!" : Math.ceil(S.wheelCooldown) + "s";
  html += `<div class="btn wheel-btn${wheelReady ? " ready" : ""}" data-action="wheel">
    <div class="info"><div class="name">Lucky Wheel</div>
    <div class="detail">${wheelReady ? "Free spin available!" : "Cooldown: " + wheelText}</div></div></div>`;

  // Tap upgrade
  const tCost = tapUpgradeCost();
  html += `<div class="btn${S.dust<tCost?" disabled":""}" data-action="tap">
    <div class="info"><div class="name">Tap Power Lv.${S.tapLevel+1}</div>
    <div class="detail">+${fmt(tapPower())} per tap</div></div>
    <div class="cost">${fmt(tCost)}</div></div>`;

  html += `<div class="section-title" style="margin-top:6px">GENERATORS</div>`;
  for (let i = 0; i < S.gens.length; i++) {
    const g = S.gens[i]; const cost = genCost(i);
    html += `<div class="btn${S.dust<cost?" disabled":""}" data-action="gen" data-idx="${i}">
      <div class="info"><div class="name">${g.name} <span style="color:#a89cdb">x${g.count}</span></div>
      <div class="detail">+${fmt(g.baseRate*globalMult())}/s each</div></div>
      <div class="cost">${fmt(cost)}</div></div>`;
  }

  const pg = prestigeGain();
  if (pg > 0) {
    html += `<div class="btn prestige" data-action="prestige">
      <div class="info"><div class="name">GO SUPERNOVA</div>
      <div class="detail">Reset for +${fmt(pg)} Crystal${pg>1?"s":""} (+${fmt(pg*10)}% all)</div></div></div>`;
  }
  shop.innerHTML = html;

  // Wheel notif dot
  document.getElementById("wheelNotif").style.display = wheelReady ? "block" : "none";
}

shop.addEventListener("pointerdown", e => {
  const btn = e.target.closest(".btn");
  if (!btn || btn.classList.contains("disabled")) return;
  const action = btn.dataset.action;
  if (action === "wheel") {
    document.getElementById("wheelOverlay").classList.add("show");
    document.getElementById("wheelSpinBtn").disabled = S.wheelCooldown > 0;
    document.getElementById("wheelResult").textContent = S.wheelCooldown > 0 ? "Cooldown: " + Math.ceil(S.wheelCooldown) + "s" : "";
    drawWheel();
  } else if (action === "tap") {
    const cost = tapUpgradeCost();
    if (S.dust >= cost) { S.dust -= cost; S.tapLevel++; SFX.buy(); }
  } else if (action === "gen") {
    const i = parseInt(btn.dataset.idx); const cost = genCost(i);
    if (S.dust >= cost) { S.dust -= cost; S.gens[i].count++; SFX.buy(); }
  } else if (action === "prestige") {
    const gain = prestigeGain(); if (gain <= 0) return;
    if (!confirm("Go Supernova?\n\nReset for +" + fmt(gain) + " Nova Crystal(s).\nEach = +10% ALL production.")) return;
    S.novaCrystals += gain; S.prestigeCount++;
    S.dust = 0; S.lifetimeDust = 0; S.tapLevel = 0;
    S.gens.forEach(g => g.count = 0);
    S.comboCount = 0; S.comboTimer = 0; S.comboMultiplier = 1;
    screenFlash("rgba(255,200,100,0.5)"); screenShake(); SFX.prestige();
    showToast("SUPERNOVA!", "+" + fmt(gain) + " Nova Crystals"); checkAchievements();
  }
  updateUI(); checkAchievements();
});

// =========================================================
// UI UPDATE
// =========================================================
const dustVal = document.getElementById("dustVal");
const rateVal = document.getElementById("rateVal");
const novaInfo = document.getElementById("novaInfo");

function updateUI() {
  dustVal.textContent = fmt(S.dust);
  rateVal.textContent = fmt(totalRate()) + "/s";
  const nc = S.novaCrystals; const ab = ((achievBonus()-1)*100).toFixed(0);
  let info = "";
  if (nc > 0) info += "Nova: " + fmt(nc) + " (+" + fmt(nc*10) + "%)";
  if (parseInt(ab) > 0) info += (info ? " | " : "") + "Achiev: +" + ab + "%";
  novaInfo.textContent = info;
  buildShop();
}

// =========================================================
// GAME LOOP
// =========================================================
let lastTick = performance.now(), achievTimer = 0, autoTapAccum = 0;

function tick(now) {
  const dt = (now - lastTick) / 1000; lastTick = now;

  // Passive income
  const rate = totalRate();
  if (rate > 0) { S.dust += rate*dt; S.lifetimeDust += rate*dt; S.allTimeDust += rate*dt; }

  // Auto-tap (skill)
  const autoRate = getAutoTapRate();
  if (autoRate > 0) {
    autoTapAccum += dt;
    const taps = Math.floor(autoTapAccum * autoRate);
    if (taps > 0) {
      autoTapAccum -= taps / autoRate;
      const cx = orbArea.getBoundingClientRect();
      for (let i = 0; i < taps; i++) doTap(cx.width/2 - 30 + Math.random()*20, cx.height/2 - 20, true);
    }
  }

  // Auto-burst buff
  const burst = S.buffs.find(b => b.type === "autoburst");
  if (burst) {
    autoTapAccum += dt; // already covered above, but burst adds more
    const taps = Math.floor(dt * burst.value);
    const cx = orbArea.getBoundingClientRect();
    for (let i = 0; i < taps; i++) doTap(cx.width/2 - 30 + Math.random()*20, cx.height/2 - 20, true);
  }

  updateCombo(dt);
  updateBuffs(dt);
  updateBoss(dt);

  // Wheel cooldown
  if (S.wheelCooldown > 0) S.wheelCooldown = Math.max(0, S.wheelCooldown - dt);

  // Periodic checks
  achievTimer += dt;
  if (achievTimer >= 2) { achievTimer = 0; checkAchievements(); }

  updateUI();
  requestAnimationFrame(tick);
}

// =========================================================
// INIT
// =========================================================
const offlineSec = load();
if (offlineSec > 0) applyOffline(offlineSec);
updateUI(); updateOrbVisuals();
requestAnimationFrame(tick);
scheduleMeteor();
scheduleBoss();

// Daily streak check (after a brief delay so UI is ready)
setTimeout(() => checkDailyStreak(), 500);

setInterval(save, 15000);
document.addEventListener("visibilitychange", () => { if (document.hidden) save(); });
</script>
