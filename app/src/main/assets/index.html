<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tap City</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0a1628;font-family:'Segoe UI',system-ui,sans-serif;color:#fff}
#game{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;padding:8px 12px env(safe-area-inset-bottom)}

.top-bar{text-align:center;padding:3px 0}
.currency-name{font-size:9px;letter-spacing:3px;color:#8badc9;text-transform:uppercase}
.currency-value{font-size:34px;font-weight:700;color:#fff5d4;text-shadow:0 0 20px rgba(255,200,60,.3)}
.rate{font-size:11px;color:#6dba6d;margin-top:1px}
.nova-info{font-size:10px;color:#ff8866;margin-top:1px}
.buff-bar{font-size:9px;color:#60a5fa;margin-top:1px;min-height:12px}

.combo-bar-wrap{height:18px;display:flex;align-items:center;gap:6px;margin:2px 0}
.combo-label{font-size:11px;font-weight:700;color:#fbbf24;white-space:nowrap;min-width:36px}
.combo-track{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.combo-fill{height:100%;width:0%;background:linear-gradient(90deg,#f59e0b,#ef4444);border-radius:2px;transition:width .15s}
.combo-bar-wrap.hidden{opacity:0}

.orb-area{flex:2;position:relative;min-height:0;overflow:hidden;cursor:pointer}

/* Sky — transitions driven by JS day/night cycle */
.city-sky{position:absolute;inset:0;z-index:0}
.city-stars-bg{position:absolute;inset:0;z-index:0;transition:opacity .5s ease}
.city-star-dot{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:.3;animation:twinkle 3s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.5}}
/* Sun/moon */
.city-sun{position:absolute;border-radius:50%;z-index:1;pointer-events:none}

/* Isometric scene — perspective tilt on entire ground plane */
.city-scene{position:absolute;bottom:0;left:-10%;right:-10%;top:30%;z-index:2;
  transform:perspective(300px) rotateX(35deg);transform-origin:bottom center;
  transition:transform .08s ease}
.orb-area:active .city-scene{transform:perspective(300px) rotateX(36deg) scale(.98)}

/* Isometric ground plane */
.city-ground-plane{position:absolute;inset:0;
  background:
    linear-gradient(0deg,#1a2a1a 0%,#1e3520 30%,#1a2e1a 60%,#162818 100%);
  z-index:0}
/* Grid lines on ground */
.city-ground-plane::before{content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 24px,rgba(255,255,255,.04) 24px,rgba(255,255,255,.04) 25px),
    repeating-linear-gradient(90deg,transparent,transparent 24px,rgba(255,255,255,.04) 24px,rgba(255,255,255,.04) 25px);
  z-index:1}

/* City grid */
.city{position:absolute;inset:0;pointer-events:none;overflow:visible}

/* Road strip across ground */
.city-road{position:absolute;bottom:8%;left:0;right:0;height:8%;background:#3a3a3a;z-index:40}
.city-road::before{content:'';position:absolute;top:45%;left:0;right:0;height:10%;
  background:repeating-linear-gradient(90deg,#fbbf24 0,#fbbf24 12px,transparent 12px,transparent 24px);opacity:.4}
.city-road::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:rgba(255,255,255,.08)}
.city-sidewalk{position:absolute;bottom:16%;left:0;right:0;height:3%;background:#4a4a3a;z-index:39}
.city-sidewalk-top{position:absolute;bottom:75%;left:0;right:0;height:2%;background:#3a3a30;z-index:5;opacity:.5}

/* Terrain row separators — subtle block lines */
.terrain-row{position:absolute;left:0;right:0;height:1px;z-index:1;border-top:1px solid rgba(255,255,255,.03)}

/* Buildings — isometric 3D */
.bldg{position:absolute;transition:height .4s ease}
.bldg-body{width:100%;height:100%;border-radius:1px 1px 0 0;position:relative;overflow:hidden}
.bldg-side{position:absolute;top:0;width:5px;height:100%;opacity:.55;border-radius:0 1px 0 0}
.bldg-top{position:absolute;left:0;height:5px;border-radius:1px;transform:skewX(-45deg);transform-origin:bottom left;opacity:.3;background:#fff}

/* Vehicles */
.vehicle{position:absolute;bottom:6px;height:4px;z-index:5;border-radius:1px;pointer-events:none}
.vehicle-l{animation:driveL linear forwards}
.vehicle-r{animation:driveR linear forwards}
@keyframes driveL{from{left:-20px}to{left:110%}}
@keyframes driveR{from{right:-20px}to{right:110%}}
.headlight{position:absolute;top:0;width:3px;height:3px;border-radius:50%;background:#fef08a;opacity:0}
.headlight.on{opacity:.8;box-shadow:0 0 4px rgba(254,240,138,.6)}

/* Smoke */
.smoke{position:absolute;z-index:6;pointer-events:none;border-radius:50%;background:rgba(200,200,210,.25);animation:smokeRise 3s ease-out forwards}
@keyframes smokeRise{0%{opacity:.4;transform:translateY(0) scale(.5)}50%{opacity:.2;transform:translateY(-20px) scale(1)}100%{opacity:0;transform:translateY(-40px) scale(1.5)}}

/* Flying elements */
.plane{position:absolute;z-index:6;pointer-events:none;font-size:8px;animation:flyAcross linear forwards}
@keyframes flyAcross{from{left:-30px}to{left:110%}}
.bird{position:absolute;z-index:6;pointer-events:none;width:6px;height:2px;border-top:1px solid rgba(80,60,40,.6);border-left:2px solid transparent;border-right:2px solid transparent;animation:flyBird linear forwards}
@keyframes flyBird{from{left:-10px}to{left:110%}}
.heli{position:absolute;z-index:6;pointer-events:none;font-size:7px;animation:heliHover 2s ease-in-out infinite}
@keyframes heliHover{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* People */
.person{position:absolute;bottom:12px;width:2px;height:5px;z-index:5;border-radius:1px 1px 0 0;pointer-events:none}
.person-l{animation:walkL linear forwards}
.person-r{animation:walkR linear forwards}
@keyframes walkL{from{left:-5px}to{left:110%}}
@keyframes walkR{from{right:-5px}to{right:110%}}

/* Light poles */
.lamppost{position:absolute;bottom:11px;width:1px;height:14px;background:#475569;z-index:5;pointer-events:none}
.lamppost::after{content:'';position:absolute;top:-1px;left:-3px;width:7px;height:3px;border-radius:2px;background:#64748b}
.lamppost-glow{position:absolute;top:-6px;left:-5px;width:11px;height:10px;border-radius:50%;background:radial-gradient(circle,rgba(254,240,138,.3),transparent 70%);opacity:0}
.lamppost-glow.on{opacity:1}
.bldg-windows{display:flex;flex-wrap:wrap;gap:2px;padding:3px 2px;justify-content:center;align-content:flex-start}
.bldg-win{width:5px;height:6px;border-radius:1px}
.bldg-win.lit{box-shadow:0 0 4px rgba(253,230,138,.5)}
.bldg-antenna{width:2px;height:10px;background:#64748b;position:absolute;top:-10px;left:50%;transform:translateX(-50%)}
.bldg-antenna::after{content:'';position:absolute;top:-3px;left:-2px;width:6px;height:6px;border-radius:50%;background:#ef4444;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.crane{position:absolute;top:-22px;left:50%;transform:translateX(-50%);width:2px;height:22px;background:#94a3b8}
.crane::before{content:'';position:absolute;top:0;left:-10px;width:22px;height:2px;background:#94a3b8}
.crane::after{content:'';position:absolute;top:2px;right:-10px;width:1px;height:14px;background:#64748b;border-bottom:3px solid #fbbf24}

/* Tap label overlay */
.tap-hint{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,.2);z-index:5;text-shadow:0 1px 4px rgba(0,0,0,.5)}

/* Legacy orb - hidden but kept for JS refs */
#orb{display:none}
.glow{display:none}

.floater{position:absolute;font-size:20px;font-weight:700;color:#fde68a;text-shadow:0 0 8px rgba(253,230,138,.5);pointer-events:none;z-index:10;animation:floatUp .8s ease-out forwards}
.floater.crit{font-size:30px;color:#ff4444;text-shadow:0 0 16px rgba(255,60,60,.8),0 0 30px rgba(255,60,60,.4);animation:floatUpCrit .9s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(.8)}}
@keyframes floatUpCrit{0%{opacity:1;transform:translateY(0) scale(1.5)}20%{transform:translateY(-15px) scale(1.2)}100%{opacity:0;transform:translateY(-100px) scale(.7)}}

.screen-flash{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0}
@keyframes flash{0%{opacity:.4}100%{opacity:0}}
.shake{animation:shake .15s ease}
@keyframes shake{0%,100%{transform:translate(0)}25%{transform:translate(-4px,2px)}50%{transform:translate(3px,-3px)}75%{transform:translate(-2px,3px)}}

.investor{position:absolute;width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fef08a,#f59e0b 50%,#b45309);box-shadow:0 0 20px rgba(245,158,11,.6);cursor:pointer;z-index:20;animation:investorFloat 3s ease-in-out infinite;pointer-events:auto}
.investor::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(254,240,138,.5);animation:investorRing 1s ease-in-out infinite}
@keyframes investorFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes investorRing{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.3);opacity:1}}
.investor-label{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:#fef08a;white-space:nowrap}
.investor-timer{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:8px;color:#fbbf24;white-space:nowrap}

.boss-bar{position:absolute;bottom:8px;left:8px;right:8px;z-index:30;background:rgba(10,18,35,.92);border:1px solid rgba(239,68,68,.5);border-radius:10px;padding:6px 10px;text-align:center}
.boss-name{font-size:12px;font-weight:700;color:#ef4444}
.boss-hp-track{height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin:3px 0;overflow:hidden}
.boss-hp-fill{height:100%;background:linear-gradient(90deg,#ef4444,#f59e0b);border-radius:3px;transition:width .1s}
.boss-timer{font-size:9px;color:#fbbf24}

/* Mini-game overlay */
.minigame-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center}
.minigame-overlay.show{display:flex}
.mg-title{font-size:20px;font-weight:700;color:#60a5fa;margin-bottom:8px}
.mg-subtitle{font-size:12px;color:#8badc9;margin-bottom:12px}
.mg-area{width:280px;height:280px;position:relative;border:2px solid rgba(59,130,246,.3);border-radius:16px;background:rgba(10,18,35,.8);overflow:hidden}
.mg-score{font-size:16px;font-weight:700;color:#fde68a;margin-top:10px}
.mg-timer{font-size:13px;color:#fbbf24;margin-top:4px}
.mg-star{position:absolute;width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fef08a,#f59e0b);box-shadow:0 0 12px rgba(245,158,11,.5);cursor:pointer;transition:transform .1s;display:flex;align-items:center;justify-content:center;font-size:18px}
.mg-star:active{transform:scale(.8)}
.mg-node{position:absolute;width:50px;height:50px;border-radius:50%;border:3px solid rgba(59,130,246,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .2s}
.mg-node.lit{background:rgba(59,130,246,.4);border-color:#60a5fa;box-shadow:0 0 15px rgba(59,130,246,.5)}
.mg-node.wrong{background:rgba(239,68,68,.3);border-color:#ef4444}
.mg-node.correct{background:rgba(74,222,128,.3);border-color:#4ade80}
.mg-result{font-size:18px;font-weight:700;margin-top:12px}
.mg-close{margin-top:12px;padding:8px 28px;background:#3b82f6;border:none;border-radius:8px;color:#fff;font-size:14px;cursor:pointer}

.sep{height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,.3),transparent);margin:3px 0}

.tab-bar{display:flex;gap:2px;margin-bottom:3px}
.tab{flex:1;padding:4px 0;text-align:center;font-size:9px;font-weight:600;letter-spacing:.5px;color:#6b8ab5;background:rgba(12,22,42,.6);border:1px solid rgba(50,80,140,.2);border-radius:6px;cursor:pointer;transition:all .15s;position:relative}
.tab.active{color:#fff;background:rgba(30,60,100,.6);border-color:rgba(59,130,246,.5)}
.tab-notif{position:absolute;top:1px;right:4px;width:6px;height:6px;border-radius:50%;background:#ef4444;display:none}

.tab-panel{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
.tab-panel.active{display:flex;flex-direction:column}
.tab-panel::-webkit-scrollbar{display:none}
.shop{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
.shop::-webkit-scrollbar{display:none}
.section-title{font-size:9px;letter-spacing:2px;color:#6b8ab5;text-align:center;margin:4px 0 2px}

.btn{width:100%;padding:7px 10px;margin-bottom:3px;background:rgba(18,30,52,.8);border:1px solid rgba(50,80,140,.35);border-radius:10px;color:#fff;font-size:11px;text-align:left;cursor:pointer;transition:background .15s;display:flex;justify-content:space-between;align-items:center}
.btn:active{background:rgba(50,30,90,.9)}
.btn.disabled{opacity:.35;pointer-events:none}
.btn .info{display:flex;flex-direction:column;gap:1px}
.btn .name{font-weight:600;font-size:12px}
.btn .detail{font-size:9px;color:#8badc9}
.btn .cost{font-size:11px;color:#fde68a;font-weight:600;white-space:nowrap}

.btn.prestige{background:rgba(130,20,30,.7);border-color:rgba(255,100,80,.5);text-align:center;justify-content:center;margin-top:3px}
.btn.prestige .name{color:#ffd4cc;font-size:13px}
.btn.prestige .detail{color:#ff9988;font-size:10px}
.btn.new city{background:rgba(20,80,100,.7);border-color:rgba(56,189,248,.5);text-align:center;justify-content:center;margin-top:3px}
.btn.new city .name{color:#7dd3fc;font-size:13px}
.btn.new city .detail{color:#38bdf8;font-size:10px}

.btn.wheel-btn{background:rgba(20,50,80,.6);border-color:rgba(96,165,250,.4);text-align:center;justify-content:center}
.btn.wheel-btn .name{color:#60a5fa}
.btn.wheel-btn.ready{border-color:rgba(96,165,250,.8);animation:wp 1.5s ease-in-out infinite}
@keyframes wp{0%,100%{box-shadow:none}50%{box-shadow:0 0 12px rgba(96,165,250,.3)}}

.btn.mg-btn{background:rgba(20,60,80,.6);border-color:rgba(56,189,248,.4);text-align:center;justify-content:center}
.btn.mg-btn .name{color:#38bdf8}
.btn.mg-btn.ready{border-color:rgba(56,189,248,.8);animation:mgp 1.5s ease-in-out infinite}
@keyframes mgp{0%,100%{box-shadow:none}50%{box-shadow:0 0 12px rgba(56,189,248,.3)}}

.achiev{padding:6px 10px;margin-bottom:3px;background:rgba(18,30,52,.6);border:1px solid rgba(50,80,140,.2);border-radius:8px;display:flex;gap:8px;align-items:center}
.achiev.done{border-color:rgba(245,158,11,.4);background:rgba(60,40,20,.4)}
.achiev-icon{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.achiev-info{flex:1;min-width:0}
.achiev-name{font-size:11px;font-weight:600}
.achiev-desc{font-size:9px;color:#8badc9}
.achiev-reward{font-size:8px;color:#fbbf24;margin-top:1px}
.achiev-bar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:2px;overflow:hidden}
.achiev-bar-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#60a5fa);border-radius:2px;transition:width .3s}
.achiev.done .achiev-bar-fill{background:linear-gradient(90deg,#f59e0b,#fbbf24)}

.skill{padding:6px 10px;margin-bottom:3px;background:rgba(18,30,52,.6);border:1px solid rgba(50,80,140,.2);border-radius:8px;display:flex;gap:8px;align-items:center;cursor:pointer}
.skill.owned{border-color:rgba(74,222,128,.4);background:rgba(20,60,30,.3)}
.skill.affordable{border-color:rgba(96,165,250,.5)}
.skill-icon{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.skill-info{flex:1}
.skill-name{font-size:11px;font-weight:600}
.skill-desc{font-size:9px;color:#8badc9}
.skill-cost{font-size:10px;color:#ff8866;font-weight:600;white-space:nowrap}
.skill.owned .skill-cost{color:#4ade80}

/* Orb stages visual */
.orb-stage{padding:6px 10px;margin-bottom:3px;background:rgba(18,30,52,.6);border:1px solid rgba(50,80,140,.2);border-radius:8px;display:flex;gap:10px;align-items:center}
.orb-stage.current{border-color:rgba(96,165,250,.5);background:rgba(30,60,100,.3)}
.orb-stage.locked{opacity:.4}
.orb-preview{width:32px;height:32px;border-radius:50%;flex-shrink:0}
.orb-stage-info{flex:1}
.orb-stage-name{font-size:11px;font-weight:600}
.orb-stage-req{font-size:9px;color:#8badc9}

/* Rival leaderboard */
.rival{padding:6px 10px;margin-bottom:3px;background:rgba(18,30,52,.6);border:1px solid rgba(50,80,140,.2);border-radius:8px;display:flex;gap:10px;align-items:center}
.rival.you{border-color:rgba(59,130,246,.5);background:rgba(30,60,100,.3)}
.rival-rank{font-size:16px;font-weight:700;width:26px;text-align:center;color:#8badc9;flex-shrink:0}
.rival.you .rival-rank{color:#60a5fa}
.rival-info{flex:1}
.rival-name{font-size:11px;font-weight:600}
.rival-dust{font-size:9px;color:#8badc9}
.rival-rate{font-size:9px;color:#6dba6d}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.wheel-modal{background:rgba(12,22,42,.97);border:2px solid rgba(59,130,246,.5);border-radius:16px;padding:16px;text-align:center;width:88%;max-width:320px}
.wheel-title{font-size:16px;font-weight:700;color:#60a5fa;margin-bottom:10px}
.wheel-container{position:relative;width:220px;height:220px;margin:0 auto 12px}
.wheel-canvas{width:220px;height:220px}
.wheel-pointer{position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:16px solid #fbbf24;z-index:2}
.wheel-result{font-size:14px;font-weight:700;color:#fde68a;margin:6px 0;min-height:20px}
.wheel-spin-btn{padding:8px 30px;background:#3b82f6;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.wheel-spin-btn:disabled{opacity:.4}
.wheel-close{margin-top:8px;padding:5px 20px;background:transparent;border:1px solid rgba(59,130,246,.4);border-radius:6px;color:#8badc9;font-size:12px;cursor:pointer}

.streak-modal{background:rgba(12,22,42,.97);border:2px solid rgba(245,158,11,.5);border-radius:16px;padding:20px;text-align:center;width:88%;max-width:320px}
.streak-title{font-size:16px;font-weight:700;color:#fbbf24;margin-bottom:3px}
.streak-subtitle{font-size:12px;color:#8badc9;margin-bottom:12px}
.streak-days{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.streak-day{width:34px;height:40px;border-radius:6px;background:rgba(18,30,52,.8);border:1px solid rgba(50,80,140,.3);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8px;color:#6b8ab5}
.streak-day.claimed{background:rgba(60,40,20,.6);border-color:rgba(245,158,11,.5);color:#fbbf24}
.streak-day.today{border-color:#fbbf24;box-shadow:0 0 6px rgba(245,158,11,.3)}
.streak-day .day-num{font-weight:700;font-size:10px}
.streak-claim{padding:8px 30px;background:#f59e0b;border:none;border-radius:8px;color:#000;font-size:14px;font-weight:700;cursor:pointer}
.streak-claim:disabled{opacity:.4}

.toast{position:fixed;top:40px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(18,30,52,.95);border:1px solid rgba(245,158,11,.5);border-radius:10px;padding:6px 14px;text-align:center;z-index:100;opacity:0;pointer-events:none;transition:all .3s ease;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-title{font-size:12px;font-weight:700;color:#fbbf24}
.toast-desc{font-size:9px;color:#8badc9;margin-top:1px}

.offline-banner{position:fixed;top:0;left:0;right:0;background:rgba(10,18,35,.97);border-bottom:1px solid rgba(59,130,246,.4);padding:14px;text-align:center;z-index:100;animation:slideDown .4s ease}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
.offline-banner h3{color:#60a5fa;margin-bottom:3px;font-size:15px}
.offline-banner p{color:#fde68a;font-size:15px}
.offline-banner button{margin-top:8px;padding:6px 24px;background:#3b82f6;border:none;border-radius:6px;color:#fff;font-size:13px;cursor:pointer}

/* Weekly challenge banner */

</style>
</head>

<script>
// =============================================================================
// STATE
// =============================================================================
const S={dust:0,lifetimeDust:0,allTimeDust:0,cityStars:0,mayorPoints:0,
tapLevel:0,prestigeCount:0,ascensionCount:0,totalTaps:0,
gens:[
{name:"Hot Dog Stand",count:0,baseCost:10,baseRate:.5},
{name:"Coffee Shop",count:0,baseCost:100,baseRate:4},
{name:"Apartment Block",count:0,baseCost:1200,baseRate:30},
{name:"Shopping Mall",count:0,baseCost:15e3,baseRate:200},
{name:"Tech Campus",count:0,baseCost:2e5,baseRate:1500},
{name:"Financial District",count:0,baseCost:33e5,baseRate:12e3},
{name:"Mega Tower",count:0,baseCost:5e7,baseRate:1e5},
],
comboCount:0,comboTimer:0,comboMultiplier:1,
achieved:{},investorActive:false,critCount:0,investorsCollected:0,
wheelCooldown:0,wheelSpins:0,buffs:[],
dailyStreak:0,lastClaimDay:"",todayClaimed:false,
skills:{},bossesHandleed:0,
challengeActive:false,challengeHP:0,challengeMaxHP:0,challengeTimer:0,challengeReward:0,challengeName:"",
mgCooldown:0,mgPlayed:0,
// Rivals
rivalSeed:0,weeklyTarget:0,weeklyProgress:0,weeklyWeek:"",
// Orb stage
orbStage:0,
// Artifacts
artifacts:[],artifactDrops:0,
// Prestige challenges
pChallenges:[],pChallengesDone:0,
// Music
musicOn:false,
};

// =============================================================================
// SOUND ENGINE
// =============================================================================
let audioCtx=null;
function ac(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume();return audioCtx;}
function osc(type,freq,dur,vol,freqEnd,delay){
const c=ac(),t=c.currentTime+(delay||0),o=c.createOscillator(),g=c.createGain();
o.type=type;o.frequency.setValueAtTime(freq,t);
if(freqEnd)o.frequency.exponentialRampToValueAtTime(freqEnd,t+dur*.8);
g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+dur);
}
const SFX={
tap(){osc("sine",660+Math.random()*120,.08,.18,400);},
crit(){osc("sine",150,.2,.35,50);osc("triangle",1800,.15,.12,2400);},
comboUp(t){for(let i=0;i<3;i++)osc("square",500+t*80+i*150,.1,.08,0,i*.06);},
buy(){osc("triangle",880,.12,.15,1100);},
investorAppear(){for(let i=0;i<3;i++)osc("sine",600+i*200,.15,.1,0,i*.1);},
investorCollect(){for(let i=0;i<6;i++)osc("sine",800+i*200,.12,.12,0,i*.05);},
achievement(){[523,659,784,1047].forEach((f,i)=>osc("triangle",f,.25,.12,0,i*.1));},
prestige(){for(let i=0;i<5;i++)osc("sawtooth",100+i*50,.5,.04,2e3+i*200);setTimeout(()=>osc("sine",80,.5,.3,30),350);},
wheelSpin(){for(let i=0;i<12;i++)setTimeout(()=>osc("sine",400+i*50,.06,.06),i*(150+i*15));},
wheelWin(){[659,784,988,1319].forEach((f,i)=>osc("sine",f,.3,.15,0,i*.08));},
bossAppear(){osc("sawtooth",200,.2,.12);osc("sawtooth",150,.2,.12,0,.15);},
bossHit(){osc("square",200+Math.random()*100,.06,.1,100);},
bossHandle(){[523,659,784,1047,1319].forEach((f,i)=>osc("triangle",f,.3,.14,0,i*.06));},
streak(){[440,554,659,880].forEach((f,i)=>osc("sine",f,.2,.12,0,i*.12));},
ascend(){for(let i=0;i<8;i++)osc("sine",200+i*100,.6,.06,1e3+i*200,i*.08);setTimeout(()=>{osc("sine",60,.8,.35,20);osc("sine",1200,.6,.15,2400,.1);},600);},
mgStar(){osc("sine",900+Math.random()*300,.08,.12);},
mgWin(){[784,988,1175,1568].forEach((f,i)=>osc("triangle",f,.2,.1,0,i*.08));},
mgFail(){osc("sine",300,.3,.12,100);},
};

// =============================================================================
// FORMAT
// =============================================================================
const SUFFIXES=["","K","M","B","T","Qa","Qi","Sx","Sp","Oc","No","Dc","Ud","Dd"];
function fmt(n){if(n<1e3)return Math.floor(n).toString();const t=Math.min(Math.floor(Math.log10(Math.abs(n))/3),SUFFIXES.length-1);const s=n/Math.pow(1e3,t);return(s>=100?Math.floor(s):s>=10?s.toFixed(1):s.toFixed(2))+SUFFIXES[t];}

// =============================================================================
// ORB VISUAL STAGES
// =============================================================================
const ORB_STAGES=[
{name:"Empty Lot",req:0,bg:"radial-gradient(circle at 35% 35%,#94a3b8,#475569 50%,#1e293b)",glow:"rgba(71,85,105,.2)",shadow:"rgba(71,85,105,.4)"},
{name:"Small Town",req:1e3,bg:"radial-gradient(circle at 35% 35%,#60a5fa,#3b82f6 50%,#1e3a5f)",glow:"rgba(59,130,246,.25)",shadow:"rgba(59,130,246,.5)"},
{name:"Suburb",req:1e5,bg:"radial-gradient(circle at 35% 35%,#4ade80,#16a34a 40%,#14532d)",glow:"rgba(22,163,74,.3)",shadow:"rgba(74,222,128,.4)"},
{name:"Town Center",req:1e7,bg:"radial-gradient(circle at 30% 30%,#67e8f9,#0891b2 45%,#164e63)",glow:"rgba(8,145,178,.3)",shadow:"rgba(103,232,249,.4)"},
{name:"Business District",req:1e9,bg:"radial-gradient(circle at 35% 35%,#fde68a,#ca8a04 40%,#713f12)",glow:"rgba(202,138,4,.3)",shadow:"rgba(253,230,138,.4)"},
{name:"Downtown",req:1e11,bg:"radial-gradient(circle at 35% 35%,#f59e0b,#ea580c 50%,#7c2d12)",glow:"rgba(234,88,12,.3)",shadow:"rgba(245,158,11,.5)"},
{name:"Skyline City",req:1e13,bg:"radial-gradient(circle at 35% 35%,#818cf8,#4f46e5 45%,#312e81)",glow:"rgba(79,70,229,.3)",shadow:"rgba(129,140,248,.4)"},
{name:"Megacity",req:1e15,bg:"radial-gradient(circle at 35% 35%,#e2e8f0,#475569 50%,#0f172a)",glow:"rgba(71,85,105,.4)",shadow:"rgba(226,232,240,.3)"},
{name:"Metropolis",req:1e18,bg:"radial-gradient(circle at 35% 35%,#fef08a,#3b82f6 40%,#1e1b4b)",glow:"rgba(254,240,138,.3)",shadow:"rgba(59,130,246,.5)"},
{name:"Global Capital",req:1e21,bg:"radial-gradient(circle at 35% 35%,#fff,#f59e0b 30%,#3b82f6 60%,#0a1628)",glow:"rgba(255,255,255,.25)",shadow:"rgba(245,158,11,.5)"},
];

function updateOrbStage(){
  let stage=0;
  for(let i=ORB_STAGES.length-1;i>=0;i--){if(S.allTimeDust>=ORB_STAGES[i].req){stage=i;break;}}
  if(stage!==S.orbStage){
    S.orbStage=stage;
    showToast("City Upgraded!",ORB_STAGES[stage].name);
    screenFlash("rgba(96,165,250,0.4)");SFX.achievement();
  }
  applyOrbVisuals();
}
function applyOrbVisuals(){ /* legacy - city replaces orb visuals */ }

// =============================================================================
// CITY RENDERER
// =============================================================================
const BLDG_STYLES=[
  {w:22,maxH:40,  color:"#dc2626",winColor:"#fef08a"},  // Hot Dog Stand
  {w:26,maxH:60,  color:"#92400e",winColor:"#fde68a"},  // Coffee Shop
  {w:28,maxH:100, color:"#64748b",winColor:"#fef9c3"},  // Apartment Block
  {w:34,maxH:70,  color:"#475569",winColor:"#fef08a"},  // Shopping Mall
  {w:24,maxH:130, color:"#0ea5e9",winColor:"#e0f2fe"},  // Tech Campus
  {w:22,maxH:160, color:"#1e3a5f",winColor:"#fde68a"},  // Financial District
  {w:28,maxH:190, color:"#334155",winColor:"#f0f9ff"},  // Mega Tower
];
// 4 depth rows on isometric ground plane (% positions within tilted scene)
const GRID_ROWS=[
  {bottom:.72, scale:.50, zBase:5,  max:8, xShift:10},  // far back
  {bottom:.52, scale:.65, zBase:12, max:7, xShift:0},
  {bottom:.34, scale:.82, zBase:20, max:6, xShift:8},
  {bottom:.18, scale:1,   zBase:30, max:6, xShift:2},   // front
];
let lastCityHash="";

function renderCity(){
  const hash=S.gens.map(g=>g.count).join(",")+getDayPhase();
  if(hash===lastCityHash)return;
  lastCityHash=hash;

  const cv=document.getElementById("cityView");
  const area=cv.getBoundingClientRect();
  const areaW=area.width||300;
  const areaH=area.height||200;
  const totalCount=S.gens.reduce((s,g)=>s+g.count,0);

  if(totalCount===0){
    cv.innerHTML='<div style="position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,.15);font-size:11px;white-space:nowrap">Tap to start building!</div>';
    return;
  }

  // Collect buildings from generators
  let allBldgs=[];
  S.gens.forEach((gen,gi)=>{
    const style=BLDG_STYLES[gi];
    const num=Math.min(gen.count, gi<2 ? Math.ceil(gen.count/2) : Math.ceil(gen.count/3), 7);
    for(let b=0;b<num;b++){
      const hScale=.4+Math.min(gen.count,20)/20*.6;
      allBldgs.push({gi,style,hScale,isNew:gen.count<=2&&b===num-1,seed:gi*100+b});
    }
  });

  // Distribute across 4 rows — tall buildings toward back
  const numRows=GRID_ROWS.length;
  const rows=Array.from({length:numRows},()=>[]);
  allBldgs.forEach(b=>{
    let pref;
    if(b.gi>=5) pref=0;      // Financial, Mega → back
    else if(b.gi>=3) pref=1;  // Mall, Tech → second row
    else if(b.gi>=1) pref=2;  // Coffee, Apt → third row
    else pref=3;              // Hot Dog → front
    for(let offset=0;offset<numRows;offset++){
      for(const try_r of [pref+offset,pref-offset]){
        if(try_r>=0&&try_r<numRows&&rows[try_r].length<GRID_ROWS[try_r].max){
          rows[try_r].push(b);return;
        }
      }
    }
  });

  const phase=getDayPhase();
  const litRate=phase==="night"?.72:phase==="dusk"?.5:phase==="dawn"?.32:.1;
  const offColor=phase==="day"?"rgba(150,175,200,.25)":"rgba(70,90,110,.3)";
  let html='';

  // Terrain row markers
  for(let r=0;r<numRows;r++){
    const gr=GRID_ROWS[r];
    html+=`<div class="terrain-row" style="bottom:${gr.bottom*100}%"></div>`;
  }

  // Render back to front (row 0 first)
  for(let r=0;r<numRows;r++){
    const gr=GRID_ROWS[r];
    const bldgs=rows[r];
    if(bldgs.length===0)continue;

    const slotW=Math.floor((areaW-gr.xShift*2)/Math.max(bldgs.length,1));
    const sideW=Math.round(4*gr.scale);
    const topH=Math.round(4*gr.scale);

    bldgs.forEach((b,i)=>{
      const w=Math.round(b.style.w*gr.scale);
      const rawH=b.style.maxH*b.hScale*(0.65+((b.seed*7)%10)/10*.35);
      const h=Math.max(6,Math.round(rawH*gr.scale));
      const x=gr.xShift+i*slotW+Math.round((slotW-w)/2);
      const bottomPx=Math.round(gr.bottom*areaH);

      // Windows — scale count with building size
      const winR=Math.max(1,Math.floor(h/8));
      const winC=Math.max(1,Math.floor(w/7));
      let wins='';
      for(let wr=0;wr<winR;wr++){
        for(let wc=0;wc<winC;wc++){
          const lit=Math.random()<litRate;
          wins+=`<div class="bldg-win${lit?' lit':''}" style="background:${lit?b.style.winColor:offColor}"></div>`;
        }
      }

      // Side color (darker)
      const sc=b.style.color.replace('#','');
      const dr=Math.max(0,parseInt(sc.substr(0,2),16)-55);
      const dg=Math.max(0,parseInt(sc.substr(2,2),16)-55);
      const db=Math.max(0,parseInt(sc.substr(4,2),16)-55);

      const hasAntenna=h>35&&b.gi>=4;
      const hasCrane=b.isNew&&gr.scale>.5;
      const zi=gr.zBase+i;

      html+=`<div class="bldg" style="width:${w}px;height:${h}px;left:${x}px;bottom:${bottomPx}px;z-index:${zi}">
        ${hasAntenna?'<div class="bldg-antenna"></div>':''}
        ${hasCrane?'<div class="crane"></div>':''}
        <div class="bldg-body" style="background:${b.style.color}">
          <div class="bldg-windows">${wins}</div>
        </div>
        <div class="bldg-side" style="background:rgb(${dr},${dg},${db});right:-${sideW}px;width:${sideW}px"></div>
        ${h>10?`<div class="bldg-top" style="top:-${topH}px;right:-${sideW}px;height:${topH}px"></div>`:''}
      </div>`;
    });
  }
  cv.innerHTML=html;
}

// Seed background stars
function initCityStars(){
  const bg=document.getElementById("cityStarsBg");
  let html='';
  for(let i=0;i<25;i++){
    html+=`<div class="city-star-dot" style="left:${Math.random()*100}%;top:${Math.random()*60}%;animation-delay:${Math.random()*3}s"></div>`;
  }
  bg.innerHTML=html;
}

// Animate window lights (call occasionally)
let windowFlickerTimer=0;
function flickerWindows(dt){
  windowFlickerTimer+=dt;
  if(windowFlickerTimer<2)return;
  windowFlickerTimer=0;
  const wins=document.querySelectorAll(".bldg-win");
  const phase=getDayPhase();
  const litChance=phase==="night"?.7:phase==="dusk"?.5:phase==="dawn"?.4:.15;
  wins.forEach(w=>{
    if(Math.random()<.08){
      const wasLit=w.classList.contains("lit");
      if(wasLit&&Math.random()>litChance){w.classList.remove("lit");w.style.background=phase==="day"?"rgba(140,160,180,.25)":"rgba(100,120,140,.3)";}
      else if(!wasLit&&Math.random()<litChance){w.classList.add("lit");w.style.background="#fef08a";}
    }
  });
}

// =============================================================================
// DAY/NIGHT CYCLE — continuous sun arc
// =============================================================================
const DAY_CYCLE=120; // seconds per full cycle
let dayTimer=0;
let lastDayPhase="";

// p: 0→1 continuous. 0=sunrise, 0.25=noon, 0.5=sunset, 0.75=midnight
function getDayProgress(){return(dayTimer%DAY_CYCLE)/DAY_CYCLE;}
function getDayPhase(){
  const p=getDayProgress();
  if(p<.15)return"dawn";if(p<.45)return"day";if(p<.6)return"dusk";return"night";
}

// Lerp between two hex colors
function lerpColor(a,b,t){
  const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16);
  const r1=(pa>>16)&255,g1=(pa>>8)&255,b1=pa&255;
  const r2=(pb>>16)&255,g2=(pb>>8)&255,b2=pb&255;
  const r=Math.round(r1+(r2-r1)*t),g=Math.round(g1+(g2-g1)*t),b3=Math.round(b1+(b2-b1)*t);
  return`#${((1<<24)+(r<<16)+(g<<8)+b3).toString(16).slice(1)}`;
}

// Sky color stops at key points (p=0..1)
const SKY_KEYS=[
  {p:0,   top:"#1a1040",mid:"#d97706",bot:"#fef3c7",ground:"#2a2520",road:"#3a3025",stars:0.1},  // sunrise
  {p:.15, top:"#1565c0",mid:"#42a5f5",bot:"#e3f2fd",ground:"#3a5a40",road:"#606060",stars:0},     // morning
  {p:.3,  top:"#1e88e5",mid:"#90caf9",bot:"#e3f2fd",ground:"#3a5a40",road:"#606060",stars:0},     // noon
  {p:.45, top:"#1565c0",mid:"#64b5f6",bot:"#bbdefb",ground:"#3a5a40",road:"#505050",stars:0},     // afternoon
  {p:.55, top:"#4a1a5a",mid:"#c2185b",bot:"#ff8f00",ground:"#2a2025",road:"#352a20",stars:.15},   // sunset
  {p:.65, top:"#1a1045",mid:"#4a1a5a",bot:"#ef6c00",ground:"#1a1820",road:"#2a2520",stars:.4},    // late dusk
  {p:.75, top:"#050a18",mid:"#0a1628",bot:"#152a45",ground:"#141e2e",road:"#222e3e",stars:1},     // midnight
  {p:.9,  top:"#050a18",mid:"#0f1830",bot:"#152a45",ground:"#141e2e",road:"#222e3e",stars:1},     // late night
  {p:1,   top:"#1a1040",mid:"#d97706",bot:"#fef3c7",ground:"#2a2520",road:"#3a3025",stars:.1},    // wraps to sunrise
];

function interpSkyKey(p){
  // Find surrounding keys
  let a=SKY_KEYS[0],b=SKY_KEYS[1];
  for(let i=0;i<SKY_KEYS.length-1;i++){
    if(p>=SKY_KEYS[i].p&&p<=SKY_KEYS[i+1].p){a=SKY_KEYS[i];b=SKY_KEYS[i+1];break;}
  }
  const t=(p-a.p)/(b.p-a.p||1);
  return{
    top:lerpColor(a.top,b.top,t),
    mid:lerpColor(a.mid,b.mid,t),
    bot:lerpColor(a.bot,b.bot,t),
    ground:lerpColor(a.ground,b.ground,t),
    road:lerpColor(a.road,b.road,t),
    stars:a.stars+(b.stars-a.stars)*t,
  };
}

function updateDayNight(dt){
  dayTimer+=dt;
  const p=getDayProgress();
  const phase=getDayPhase();

  // Sun/moon position: continuous arc
  // Sun visible p=0..0.5 (rises left, arcs overhead, sets right)
  // Moon visible p=0.5..1.0 (same arc pattern)
  const sun=document.getElementById("citySun");
  if(sun){
    const isSun=p<.55;
    const arcP=isSun?p/.55:(p-.55)/.45; // 0→1 within sun/moon half
    // Horizontal: 10%→90% left to right
    const x=10+arcP*80;
    // Vertical: parabolic arc, lowest at edges (horizon), highest at middle
    const yArc=1-4*Math.pow(arcP-.5,2); // 0 at edges, 1 at peak
    const y=80-yArc*70; // 80% at horizon, 10% at peak
    // Only show when above horizon (y < 82)
    if(y<82){
      sun.style.display="block";
      sun.style.left=x+"%";
      sun.style.top=y+"%";
      if(isSun){
        // Sun color shifts: orange near horizon, yellow at peak
        const warmth=1-yArc; // 1 at horizon, 0 at peak
        const size=26+warmth*8;
        sun.style.width=size+"px";sun.style.height=size+"px";
        const r=255,g3=Math.round(245-warmth*100),b4=Math.round(157-warmth*120);
        sun.style.background=`rgb(${r},${g3},${b4})`;
        sun.style.boxShadow=`0 0 ${20+warmth*20}px rgba(${r},${g3},${b4},.6),0 0 ${40+warmth*30}px rgba(${r},${g3},${b4},.2)`;
      }else{
        // Moon: silvery white, smaller
        sun.style.width="20px";sun.style.height="20px";
        sun.style.background="#e2e8f0";
        sun.style.boxShadow="0 0 15px rgba(226,232,240,.4),0 0 30px rgba(226,232,240,.15)";
      }
    }else{
      sun.style.display="none";
    }
  }

  // Sky, stars, ground: interpolate every frame
  const sk=interpSkyKey(p);
  const sky=document.getElementById("citySky");
  if(sky)sky.style.background=`linear-gradient(180deg,${sk.top} 0%,${sk.mid} 55%,${sk.bot} 100%)`;
  const stars=document.getElementById("cityStarsBg");
  if(stars)stars.style.opacity=sk.stars;
  const ground=document.querySelector(".city-ground");
  if(ground)ground.style.background=sk.ground;
  const road=document.querySelector(".city-road");
  if(road)road.style.background=sk.road;

  // Phase change: re-render buildings for window lighting
  if(phase!==lastDayPhase){lastDayPhase=phase;lastCityHash="";spawnLampposts();}
}

// CITY LIFE — vehicles, smoke, planes, people, lampposts
// =============================================================================
const cityLifeEl=document.getElementById("cityLife");
let lifeTimer=0;

function updateCityLife(dt){
  lifeTimer+=dt;
  if(lifeTimer<1.5)return; // spawn check every 1.5s
  lifeTimer=0;
  const pop=S.gens.reduce((s,g)=>s+g.count,0);
  if(pop===0)return;
  const phase=getDayPhase();
  const isNight=phase==="night"||phase==="dusk";

  // Vehicles — more as city grows
  if(Math.random()<Math.min(.4,.05+pop*.02)){
    const car=document.createElement("div");
    const goRight=Math.random()<.5;
    const colors=["#ef4444","#3b82f6","#fbbf24","#fff","#94a3b8","#22c55e"];
    car.className="vehicle "+(goRight?"vehicle-l":"vehicle-r");
    car.style.width=(8+Math.random()*6)+"px";
    car.style.background=colors[Math.floor(Math.random()*colors.length)];
    const dur=4+Math.random()*4;
    car.style.animationDuration=dur+"s";
    // Headlights at night
    if(isNight){
      const hl=document.createElement("div");
      hl.className="headlight on";
      hl.style[goRight?"right":"left"]="-2px";
      car.appendChild(hl);
    }
    cityLifeEl.appendChild(car);
    setTimeout(()=>car.remove(),(dur+.5)*1e3);
  }

  // People — walk on sidewalk
  if(Math.random()<Math.min(.3,.03+pop*.015)){
    const p=document.createElement("div");
    const goRight=Math.random()<.5;
    p.className="person "+(goRight?"person-l":"person-r");
    const pColors=["#f59e0b","#3b82f6","#ef4444","#8b5cf6","#64748b","#ec4899"];
    p.style.background=pColors[Math.floor(Math.random()*pColors.length)];
    const dur=6+Math.random()*6;
    p.style.animationDuration=dur+"s";
    cityLifeEl.appendChild(p);
    setTimeout(()=>p.remove(),(dur+.5)*1e3);
  }

  // Smoke — from taller buildings
  if(pop>5&&Math.random()<.2){
    const sm=document.createElement("div");
    sm.className="smoke";
    sm.style.width=(4+Math.random()*4)+"px";
    sm.style.height=sm.style.width;
    sm.style.left=(15+Math.random()*70)+"%";
    sm.style.bottom=(40+Math.random()*30)+"%";
    cityLifeEl.appendChild(sm);
    setTimeout(()=>sm.remove(),3200);
  }

  // Flying elements
  if(pop>10&&Math.random()<.08){
    const type=Math.random();
    if(type<.4){
      // Plane
      const pl=document.createElement("div");
      pl.className="plane";
      pl.textContent=Math.random()<.5?"\u2708":"\u2708";
      pl.style.top=(5+Math.random()*25)+"%";
      pl.style.color=isNight?"rgba(255,255,255,.4)":"rgba(60,60,80,.5)";
      const dur=8+Math.random()*6;
      pl.style.animationDuration=dur+"s";
      cityLifeEl.appendChild(pl);
      setTimeout(()=>pl.remove(),(dur+1)*1e3);
    }else if(type<.7&&!isNight){
      // Birds (daytime only) — group of 3-5
      for(let i=0;i<3+Math.floor(Math.random()*3);i++){
        const bd=document.createElement("div");
        bd.className="bird";
        bd.style.top=(8+Math.random()*20+i*2)+"%";
        const dur=5+Math.random()*4;
        bd.style.animationDuration=dur+"s";
        bd.style.animationDelay=(i*.3)+"s";
        cityLifeEl.appendChild(bd);
        setTimeout(()=>bd.remove(),(dur+2)*1e3);
      }
    }else if(pop>20){
      // Helicopter near tall buildings
      const h=document.createElement("div");
      h.className="heli";
      h.textContent="\uD83D\uDE81";
      h.style.left=(30+Math.random()*40)+"%";
      h.style.top=(10+Math.random()*20)+"%";
      cityLifeEl.appendChild(h);
      setTimeout(()=>h.remove(),8e3);
    }
  }
}

// Lampposts — placed once per phase change, along sidewalk
function spawnLampposts(){
  document.querySelectorAll(".lamppost").forEach(l=>l.remove());
  const pop=S.gens.reduce((s,g)=>s+g.count,0);
  if(pop<3)return;
  const phase=getDayPhase();
  const isNight=phase==="night"||phase==="dusk";
  const count=Math.min(Math.floor(pop/3),8);
  for(let i=0;i<count;i++){
    const lp=document.createElement("div");
    lp.className="lamppost";
    lp.style.left=(8+i*(84/count))+"%";
    const glow=document.createElement("div");
    glow.className="lamppost-glow"+(isNight?" on":"");
    lp.appendChild(glow);
    cityLifeEl.appendChild(lp);
  }
}

const pCanvas=document.getElementById("particleCanvas");
const pCtx=pCanvas.getContext("2d");
let particles=[];
function resizeParticleCanvas(){const r=document.getElementById("orbArea").getBoundingClientRect();pCanvas.width=r.width;pCanvas.height=r.height;}
setTimeout(resizeParticleCanvas,0);window.addEventListener("resize",resizeParticleCanvas);

function spawnParticles(x,y,count,color,speed,size){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2;
    const spd=speed*(.5+Math.random());
    particles.push({x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,life:1,decay:.02+Math.random()*.02,size:size*(.5+Math.random()),color});
  }
}
function spawnRing(x,y,color){
  particles.push({x,y,vx:0,vy:0,life:1,decay:.015,size:20,color,ring:true,ringSize:10});
}
function updateParticles(dt){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  particles=particles.filter(p=>{
    p.life-=p.decay;if(p.life<=0)return false;
    p.x+=p.vx;p.y+=p.vy;p.vy+=.3;// gravity
    if(p.ring){
      p.ringSize+=3;
      pCtx.beginPath();pCtx.arc(p.x,p.y,p.ringSize,0,Math.PI*2);
      pCtx.strokeStyle=p.color.replace(/[\d.]+\)$/,p.life*.6+")");
      pCtx.lineWidth=2;pCtx.stroke();
    }else{
      pCtx.globalAlpha=p.life;
      pCtx.fillStyle=p.color;
      pCtx.beginPath();pCtx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);pCtx.fill();
    }
    pCtx.globalAlpha=1;
    return true;
  });
}

let musicNodes=null;
const musicToggle=document.getElementById("musicToggle");
function startMusic(){
  if(musicNodes)return;
  const ctx=ac();
  const master=ctx.createGain();master.gain.value=.08;master.connect(ctx.destination);
  const chords=[
    [[130.81,164.81,196],[110,138.59,164.81]],// C3,E3,G3 / A2,C#3,E3
    [[146.83,185,220],[123.47,155.56,185]],// D3,F#3,A3 / B2,D#3,F#3
    [[164.81,207.65,246.94],[138.59,174.61,207.65]],// E3,G#3,B3 / C#3,F3,G#3
  ];
  const stageChord=chords[Math.min(Math.floor(S.orbStage/3),chords.length-1)];
  const oscs=[];
  stageChord.forEach((chord,ci)=>{
    chord.forEach(freq=>{
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.type=ci===0?"sine":"triangle";
      o.frequency.value=freq;
      g.gain.value=.3;
      // Slow LFO
      const lfo=ctx.createOscillator();const lfoG=ctx.createGain();
      lfo.frequency.value=.1+Math.random()*.15;lfoG.gain.value=freq*.02;
      lfo.connect(lfoG);lfoG.connect(o.frequency);lfo.start();
      o.connect(g);g.connect(master);o.start();
      oscs.push({o,g,lfo});
    });
  });
  // Slow chord transition
  let chordIdx=0;
  const chordInterval=setInterval(()=>{
    chordIdx=(chordIdx+1)%stageChord.length;
    const chord=stageChord[chordIdx];
    oscs.forEach((n,i)=>{
      const freq=chord[i%chord.length];
      n.o.frequency.exponentialRampToValueAtTime(freq,ac().currentTime+4);
    });
  },8000);
  musicNodes={oscs,master,chordInterval};
}
function stopMusic(){
  if(!musicNodes)return;
  clearInterval(musicNodes.chordInterval);
  musicNodes.oscs.forEach(n=>{n.o.stop();n.lfo.stop();});
  musicNodes.master.disconnect();
  musicNodes=null;
}
musicToggle.addEventListener("click",()=>{
  S.musicOn=!S.musicOn;
  if(S.musicOn){startMusic();musicToggle.textContent="MUSIC ON";musicToggle.classList.add("on");}
  else{stopMusic();musicToggle.textContent="MUSIC OFF";musicToggle.classList.remove("on");}
});

const RIVAL_NAMES=["CityKing99","UrbanGrinder","MetroQueen","MayorTapZ","CashLord420"];
function initRivals(){if(!S.rivalSeed)S.rivalSeed=Date.now();}
function getRivals(){
  const now=Date.now(),elapsed=(now-S.rivalSeed)/1e3;
  return RIVAL_NAMES.map((name,i)=>{
    const rate=[.3,.6,1,1.5,.8][i];
    const base=[500,2e3,8e3,5e4,1e3][i];
    const dust=base+elapsed*rate*Math.pow(1.02,elapsed/3600)*base*.01;
    return{name,dust,rate:rate*base*.01};
  });
}
function getWeekStr(){const d=new Date();const w=Math.floor(d.getTime()/(7*864e5));return"w"+w;}

{id:"combo5",name:"Momentum",desc:"Reach x5 combo",check:()=>S.comboMultiplier>=5,bonus:.05,icon:"\uD83D\uDD17"},
{id:"combo12",name:"MAX MOMENTUM",desc:"Reach x12 combo",check:()=>S.comboMultiplier>=12,bonus:.15,icon:"\uD83C\uDF2A\uFE0F"},
{id:"boss5",name:"Crisis Manager",desc:"Handle 5 bosses",check:()=>S.bossesHandleed>=5,bonus:.1,icon:"\u2694\uFE0F"},
{id:"boss20",name:"Crisis Expert",desc:"Handle 20 bosses",check:()=>S.bossesHandleed>=20,bonus:.15,icon:"\uD83D\uDDE1\uFE0F"},
{id:"spin10",name:"Wheel Spinner",desc:"Spin wheel 10 times",check:()=>S.wheelSpins>=10,bonus:.05,icon:"\uD83C\uDFA1"},
{id:"streak7",name:"Daily Grind",desc:"7-day streak",check:()=>S.dailyStreak>=7,bonus:.15,icon:"\uD83D\uDCC5"},
{id:"new city1",name:"Global Reach",desc:"New City once",check:()=>S.ascensionCount>=1,bonus:.2,icon:"\uD83C\uDF00"},
];
function totalGens(){return S.gens.reduce((s,g)=>s+g.count,0);}
function checkAchievements(){for(const a of ACHIEVEMENTS){if(!S.achieved[a.id]&&a.check()){S.achieved[a.id]=true;showToast("Achievement: "+a.name,"+"+(a.bonus*100)+"% all");screenFlash("rgba(245,158,11,0.3)");SFX.achievement();if(navigator.vibrate)navigator.vibrate([30,20,30,20,30]);}}}

// =============================================================================
// SKILL TREE UI
// =============================================================================
function buildSkillTree(){
  const el=document.getElementById("skillList");let html=`<div class="section-title">CITY STARS: ${fmt(S.cityStars)} | MAYOR POINTS: ${fmt(S.mayorPoints)}</div>`;
  for(const sk of SKILLS){
    const owned=hs(sk.id),locked=sk.req&&!hs(sk.req),affordable=!owned&&!locked&&S.cityStars>=sk.cost;
    html+=`<div class="skill${owned?" owned":""}${affordable?" affordable":""}${locked?" disabled":""}" data-skill="${sk.id}">
      <div class="skill-icon">${sk.icon}</div><div class="skill-info">
      <div class="skill-name">${sk.name}</div><div class="skill-desc">${sk.desc}${locked?" (Req: "+SKILLS.find(s=>s.id===sk.req).name+")":""}</div></div>
      <div class="skill-cost">${owned?"OWNED":sk.cost+" CS"}</div></div>`;
  }
  el.innerHTML=html;
}
document.getElementById("skillList").addEventListener("pointerdown",e=>{
  const el=e.target.closest(".skill");if(!el)return;const id=el.dataset.skill,sk=SKILLS.find(s=>s.id===id);
  if(!sk||hs(id))return;if(sk.req&&!hs(sk.req))return;
  if(S.cityStars<sk.cost){showToast("Need "+sk.cost+" CS","");return;}
  S.cityStars-=sk.cost;S.skills[id]=true;SFX.achievement();screenFlash("rgba(74,222,128,0.3)");
  showToast("Skill!",sk.name);buildSkillTree();updateUI();save();
});

// =============================================================================
// DAILY STREAK
// =============================================================================
const STREAK_REWARDS=[{d:1,dust:100,l:"100"},{d:2,dust:500,l:"500"},{d:3,dust:2e3,l:"2K"},{d:4,dust:1e4,l:"10K"},{d:5,dust:5e4,l:"50K"},{d:6,dust:2e5,l:"200K"},{d:7,nova:1,dust:0,l:"Star!"}];
function getTodayStr(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function checkDailyStreak(){const today=getTodayStr();if(S.lastClaimDay===today){S.todayClaimed=true;return;}const last=S.lastClaimDay?new Date(S.lastClaimDay):null;if(last){const diff=Math.floor((new Date(today)-last)/864e5);if(diff>1)S.dailyStreak=0;}S.todayClaimed=false;showStreakModal();}
function showStreakModal(){const di=S.dailyStreak%7;document.getElementById("streakTitle").textContent=S.dailyStreak>0?"Day "+(S.dailyStreak+1)+" Streak!":"Daily Reward!";document.getElementById("streakSubtitle").textContent="Keep it alive!";const c=document.getElementById("streakDays");let h="";for(let i=0;i<7;i++){const r=STREAK_REWARDS[i];h+=`<div class="streak-day${i<di?" claimed":""}${i===di?" today":""}"><div class="day-num">D${i+1}</div><div class="day-reward">${r.l}</div></div>`;}c.innerHTML=h;document.getElementById("streakClaim").disabled=false;document.getElementById("streakOverlay").classList.add("show");}
document.getElementById("streakClaim").addEventListener("click",()=>{if(S.todayClaimed)return;const di=S.dailyStreak%7,r=STREAK_REWARDS[di];const dr=r.dust*Math.max(1,globalMult());S.dust+=dr;S.lifetimeDust+=dr;S.allTimeDust+=dr;if(r.nova)S.cityStars+=r.nova;S.dailyStreak++;S.lastClaimDay=getTodayStr();S.todayClaimed=true;SFX.streak();screenFlash("rgba(245,158,11,0.3)");showToast("Daily!",r.nova?"+1 City Star!":"+"+fmt(dr));document.getElementById("streakOverlay").classList.remove("show");save();updateUI();});

// =============================================================================
// TOAST & TABS
// =============================================================================
let toastTimer=null;
function showToast(t,d){const e=document.getElementById("toast");document.getElementById("toastTitle").textContent=t;document.getElementById("toastDesc").textContent=d;e.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>e.classList.remove("show"),2500);}
document.querySelectorAll(".tab").forEach(tab=>{tab.addEventListener("pointerdown",()=>{document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));tab.classList.add("active");document.querySelector(`[data-panel="${tab.dataset.tab}"]`).classList.add("active");if(tab.dataset.tab==="more")buildMore();if(tab.dataset.tab==="skills")buildSkillTree();if(tab.dataset.tab==="rivals")buildRivals();});});

// =============================================================================
// SAVE / LOAD
// =============================================================================
const SAVE_KEY="tapnova_save_v5";
function save(){const d={dust:S.dust,lifetimeDust:S.lifetimeDust,allTimeDust:S.allTimeDust,cityStars:S.cityStars,mayorPoints:S.mayorPoints,tapLevel:S.tapLevel,prestigeCount:S.prestigeCount,ascensionCount:S.ascensionCount,totalTaps:S.totalTaps,critCount:S.critCount,investorsCollected:S.investorsCollected,gens:S.gens.map(g=>g.count),achieved:S.achieved,skills:S.skills,wheelCooldown:S.wheelCooldown,wheelSpins:S.wheelSpins,dailyStreak:S.dailyStreak,lastClaimDay:S.lastClaimDay,bossesHandleed:S.bossesHandleed,mgCooldown:S.mgCooldown,mgPlayed:S.mgPlayed,rivalSeed:S.rivalSeed,weeklyTarget:S.weeklyTarget,weeklyProgress:S.weeklyProgress,weeklyWeek:S.weeklyWeek,orbStage:S.orbStage,artifacts:S.artifacts,artifactDrops:S.artifactDrops,pChallenges:S.pChallenges,pChallengesDone:S.pChallengesDone,musicOn:S.musicOn,ts:Date.now()};try{localStorage.setItem(SAVE_KEY,JSON.stringify(d));}catch(e){}}
function load(){try{let raw=localStorage.getItem(SAVE_KEY)||localStorage.getItem("tapnova_save_v4")||localStorage.getItem("tapnova_save_v3")||localStorage.getItem("tapnova_save_v2");if(!raw)return 0;const d=JSON.parse(raw);for(const k of["dust","lifetimeDust","allTimeDust","cityStars","mayorPoints","tapLevel","prestigeCount","ascensionCount","totalTaps","critCount","investorsCollected","wheelCooldown","wheelSpins","dailyStreak","bossesHandleed","mgCooldown","mgPlayed","rivalSeed","weeklyTarget","weeklyProgress","orbStage"])S[k]=d[k]||0;S.lastClaimDay=d.lastClaimDay||"";S.weeklyWeek=d.weeklyWeek||"";S.achieved=d.achieved||{};S.skills=d.skills||{};S.artifacts=d.artifacts||[];S.artifactDrops=d.artifactDrops||0;S.pChallenges=d.pChallenges||[];S.pChallengesDone=d.pChallengesDone||0;S.musicOn=d.musicOn||false;if(d.gens)d.gens.forEach((c,i)=>{if(S.gens[i])S.gens[i].count=c;});return d.ts?(Date.now()-d.ts)/1e3:0;}catch(e){return 0;}}

// =============================================================================
// OFFLINE
// =============================================================================
function applyOffline(elapsed){const cap=7200;elapsed=Math.min(elapsed,cap);S.wheelCooldown=Math.max(0,S.wheelCooldown-elapsed);S.mgCooldown=Math.max(0,S.mgCooldown-elapsed);const rate=totalRate();if(rate<=0||elapsed<60)return;const earned=rate*elapsed*artifactOffline();S.dust+=earned;S.lifetimeDust+=earned;S.allTimeDust+=earned;S.weeklyProgress+=earned;const div=document.createElement("div");div.className="offline-banner";const m=Math.floor(elapsed/60);div.innerHTML=`<h3>Welcome Back!</h3><p>+${fmt(earned)} Cash</p><p style="font-size:12px;color:#8badc9">${m} min${m!==1?"s":""} away</p><button onclick="this.parentElement.remove()">Collect</button>`;document.body.appendChild(div);}

// =============================================================================
// TAP HANDLING
// =============================================================================
const orbArea=document.getElementById("orbArea"),orb=document.getElementById("orb");
function doTap(x,y,isAuto){
  S.totalTaps++;runTaps++;if(!isAuto)addCombo();
  const isMega=rollMega(),isCrit=isMega||rollCrit();
  let amount=tapPower()*(isAuto?1:S.comboMultiplier);
  if(isMega)amount*=500;else if(isCrit)amount*=getCritMult();
  if(isCrit){S.critCount++;runCrits++;screenShake();screenFlash(isMega?"rgba(255,200,0,0.5)":"rgba(255,60,60,0.35)");SFX.crit();if(navigator.vibrate)navigator.vibrate(isMega?[60,30,60,30,60]:[40,20,60]);
    // Crit particles
    const pr=orbArea.getBoundingClientRect();spawnParticles(x+40,y+20,isMega?25:14,isMega?"rgba(255,200,0,0.9)":"rgba(255,80,80,0.8)",isMega?8:5,isMega?5:3);if(isMega)spawnRing(x+40,y+20,"rgba(255,200,0,0.6)");
  }else if(!isAuto){SFX.tap();if(navigator.vibrate)navigator.vibrate(20);
    // Tap particles
    const cm=S.comboMultiplier;const pc=cm>=5?"rgba(239,68,68,0.7)":cm>=2?"rgba(245,158,11,0.7)":"rgba(96,165,250,0.6)";
    spawnParticles(x+40,y+20,3+Math.floor(cm),pc,2+cm*.3,2);
  }
  S.dust+=amount;S.lifetimeDust+=amount;S.allTimeDust+=amount;S.weeklyProgress+=amount;
  if(S.challengeActive&&!isAuto)hitBoss();
  // Artifact drop chance: 0.15% per tap, higher at combo
  if(!isAuto)tryArtifactDrop(.0015*(1+S.comboMultiplier*.05));
  if(!isAuto||Math.random()<.1){const f=document.createElement("div");f.className=isCrit?"floater crit":"floater";f.textContent=(isMega?"MEGA +":isCrit?"CRIT +":"+")+fmt(amount);if(isMega)f.style.color="#fef08a";f.style.left=(x+(Math.random()*40-20))+"px";f.style.top=(y-20)+"px";orbArea.appendChild(f);setTimeout(()=>f.remove(),isCrit?900:800);}
}
// Tap on city area (replaces orb tap)
orbArea.addEventListener("pointerdown",e=>{if(e.target.closest(".investor"))return;e.preventDefault();const r=orbArea.getBoundingClientRect();doTap(e.clientX-r.left-30,e.clientY-r.top,false);updateUI();checkAchievements();});
function updateOrbVisuals(){
  // Combo override: flash sky temporarily handled by screenFlash, not sky override
  // Day/night cycle handles sky via updateDayNight()
  renderCity();
}

// =============================================================================
// SHOP
// =============================================================================
const shop=document.getElementById("shop");
function buildShop(){
  let h="";
  // Wheel
  const wr=S.wheelCooldown<=0;
  h+=`<div class="btn wheel-btn${wr?" ready":""}" data-action="wheel"><div class="info"><div class="name">Lucky Wheel</div><div class="detail">${wr?"Free spin!":"CD: "+Math.ceil(S.wheelCooldown)+"s"}</div></div></div>`;
  // Mini-game
  const mr=S.mgCooldown<=0;
  h+=`<div class="btn mg-btn${mr?" ready":""}" data-action="minigame"><div class="info"><div class="name">Mini-Game</div><div class="detail">${mr?"Play now!":"CD: "+Math.ceil(S.mgCooldown)+"s"}</div></div></div>`;
  // Tap upgrade
  const tc=tapUpgradeCost();
  h+=`<div class="btn${S.dust<tc?" disabled":""}" data-action="tap"><div class="info"><div class="name">Tap Lv.${S.tapLevel+1}</div><div class="detail">+${fmt(tapPower())}/tap</div></div><div class="cost">${fmt(tc)}</div></div>`;
  h+=`<div class="section-title">GENERATORS</div>`;
  for(let i=0;i<S.gens.length;i++){const g=S.gens[i],c=genCost(i);h+=`<div class="btn${S.dust<c?" disabled":""}" data-action="gen" data-idx="${i}"><div class="info"><div class="name">${g.name} <span style="color:#8badc9">x${g.count}</span></div><div class="detail">+${fmt(g.baseRate*globalMult())}/s</div></div><div class="cost">${fmt(c)}</div></div>`;}
  // Prestige
  const pg=prestigeGain();
  if(pg>0)h+=`<div class="btn prestige" data-action="prestige"><div class="info"><div class="name">GO SUPERSTAR</div><div class="detail">+${fmt(pg)} Crystal${pg>1?"s":""}</div></div></div>`;
  // New City
  const ag=ascensionGain();
  if(ag>0)h+=`<div class="btn new city" data-action="new city"><div class="info"><div class="name">NEW CITY</div><div class="detail">Reset ALL for +${fmt(ag)} Mayor Points (+${fmt(ag*25)}% all)</div></div></div>`;
  // Prestige challenges
  if(S.pChallenges.length>0){
    h+=`<div class="section-title">RUN CHALLENGES</div>`;
    for(const c of S.pChallenges){
      h+=`<div class="challenge${c.completed?" done":""}"><div class="challenge-name">${c.completed?"\u2714 ":""}${c.name}</div><div class="challenge-desc">${c.desc}</div><div class="challenge-reward">${c.completed?"Completed!":"Reward: +"+c.reward+" CS"}</div></div>`;
    }
  }
  shop.innerHTML=h;
  document.getElementById("wheelNotif").style.display=wr?"block":"none";
}
shop.addEventListener("pointerdown",e=>{
  const btn=e.target.closest(".btn");if(!btn||btn.classList.contains("disabled"))return;
  const a=btn.dataset.action;
  if(a==="wheel"){document.getElementById("wheelOverlay").classList.add("show");document.getElementById("wheelSpinBtn").disabled=S.wheelCooldown>0;document.getElementById("wheelResult").textContent=S.wheelCooldown>0?"CD: "+Math.ceil(S.wheelCooldown)+"s":"";drawWheel();}
  else if(a==="minigame"){if(S.mgCooldown>0)return;if(Math.random()<.5)startStarCatch();else startPatternMemory();}
  else if(a==="tap"){const c=tapUpgradeCost();if(S.dust>=c){S.dust-=c;S.tapLevel++;SFX.buy();}}
  else if(a==="gen"){const i=parseInt(btn.dataset.idx),c=genCost(i);if(S.dust>=c){S.dust-=c;S.gens[i].count++;SFX.buy();}}
  else if(a==="prestige"){const g=prestigeGain();if(g<=0)return;if(!confirm("New District?\n+"+fmt(g)+" City Star(s)"))return;S.cityStars+=g;S.prestigeCount++;S.dust=0;S.lifetimeDust=0;S.tapLevel=0;S.gens.forEach(g=>g.count=0);S.comboCount=0;S.comboTimer=0;S.comboMultiplier=1;resetRunStats();rollPrestigeChallenges();tryArtifactDrop(1);screenFlash("rgba(255,200,100,0.5)");screenShake();SFX.prestige();showToast("NEW DISTRICT!","+"+fmt(g)+" Crystals");}
  else if(a==="new city"){const g=ascensionGain();if(g<=0)return;if(!confirm("NEW CITY?\n\nResets EVERYTHING (dust, generators, city stars, skills).\nYou keep: Mayor Points, Achievements.\n\n+"+fmt(g)+" Mayor Points (+"+fmt(g*25)+"% permanent)"))return;S.mayorPoints+=g;S.ascensionCount++;S.dust=0;S.lifetimeDust=0;S.allTimeDust=0;S.cityStars=0;S.tapLevel=0;S.prestigeCount=0;S.gens.forEach(g=>g.count=0);S.skills={};S.comboCount=0;S.comboTimer=0;S.comboMultiplier=1;resetRunStats();rollPrestigeChallenges();tryArtifactDrop(1);screenFlash("rgba(56,189,248,0.5)");screenShake();SFX.ascend();showToast("NEW CITY!","+"+fmt(g)+" Mayor Points");}
  updateUI();checkAchievements();
});

// =============================================================================
// UI UPDATE
// =============================================================================
const dustVal=document.getElementById("dustVal"),rateVal=document.getElementById("rateVal"),novaInfo=document.getElementById("novaInfo");
function updateUI(){
  dustVal.textContent=fmt(S.dust);rateVal.textContent=fmt(totalRate())+"/s";
  let info=[];
  if(S.cityStars>0)info.push("NC:"+fmt(S.cityStars));
  if(S.mayorPoints>0)info.push("CE:"+fmt(S.mayorPoints)+" (+"+fmt(S.mayorPoints*25)+"%)");
  novaInfo.textContent=info.join(" | ");
  buildShop();
}

// =============================================================================
// GAME LOOP
// =============================================================================
let lastTick=performance.now(),achievTimer=0,autoAccum=0,orbStageTimer=0;
function tick(now){
  const dt=(now-lastTick)/1e3;lastTick=now;
  const rate=totalRate();
  if(rate>0){S.dust+=rate*dt;S.lifetimeDust+=rate*dt;S.allTimeDust+=rate*dt;S.weeklyProgress+=rate*dt;}
  // Auto-tap
  const ar=getAutoTapRate();
  if(ar>0){autoAccum+=dt;const t=Math.floor(autoAccum*ar);if(t>0){autoAccum-=t/ar;const cx=orbArea.getBoundingClientRect();for(let i=0;i<t;i++)doTap(cx.width/2-30+Math.random()*20,cx.height/2-20,true);}}
  // Burst buff
  const burst=S.buffs.find(b=>b.type==="autoburst");
  if(burst){const t=Math.floor(dt*burst.value);const cx=orbArea.getBoundingClientRect();for(let i=0;i<t;i++)doTap(cx.width/2-30+Math.random()*20,cx.height/2-20,true);}
  updateCombo(dt);updateBuffs(dt);updateBoss(dt);
  if(S.wheelCooldown>0)S.wheelCooldown=Math.max(0,S.wheelCooldown-dt);
  if(S.mgCooldown>0)S.mgCooldown=Math.max(0,S.mgCooldown-dt);
  // City + stage + day/night
  orbStageTimer+=dt;if(orbStageTimer>=3){orbStageTimer=0;updateOrbStage();}
  updateDayNight(dt);
  updateCityLife(dt);
  renderCity();
  updateParticles(dt);
  flickerWindows(dt);
  runTime+=dt;
  achievTimer+=dt;if(achievTimer>=2){achievTimer=0;checkAchievements();checkPrestigeChallenges();}
  updateUI();requestAnimationFrame(tick);
}

// =============================================================================
// INIT
// =============================================================================
const offlineSec=load();
initRivals();initWeekly();
if(offlineSec>0)applyOffline(offlineSec);
updateOrbStage();applyOrbVisuals();initCityStars();renderCity();spawnLampposts();updateUI();
if(S.pChallenges.length===0)rollPrestigeChallenges();
if(S.musicOn){startMusic();musicToggle.textContent="MUSIC ON";musicToggle.classList.add("on");}
requestAnimationFrame(tick);
scheduleInvestor();scheduleBoss();
setTimeout(()=>checkDailyStreak(),500);
setInterval(save,15e3);
document.addEventListener("visibilitychange",()=>{if(document.hidden)save();});
</script>
